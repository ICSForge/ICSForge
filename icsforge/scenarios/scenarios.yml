    description: Uses BACnet ReadFile service to download files from BACnet File objects, which some controllers use to store trend logs, alarm histories, and configuration data. These File objects constitute an information repository of operational history that reveals production patterns, alarm frequency, and system configuration without requiring filesystem-level access.
