      note: Write control values via internet BACnet access
  T0822__external_remote__dnp3:
    title: T0822 – External Remote Services — Internet-exposed DNP3 access
    description: Accesses a DNP3 outstation or gateway exposed on TCP/20000 through an internet connection. ICS-CERT advisories document internet-exposed DNP3 RTUs in water, electric, and oil/gas utilities. Without Secure Authentication configured, the attacker connects as a master station from the internet and issues read and control commands to field devices.
    tactic: Initial Access
    technique: T0822
    steps:
    - type: pcap
      proto: dnp3
      technique: T0822
      style: read_class1
      count: 5
      interval: 1s
      note: 'Internet-exposed DNP3: read all process data as master'
    - type: pcap
      proto: dnp3
      technique: T0822
      style: direct_operate
      count: 3
      interval: 2s
      note: Issue control commands via internet DNP3 connection
  T0822__external_remote__iec104:
    title: T0822 – External Remote Services — Internet-exposed IEC-104 access
    description: Accesses an RTU or gateway exposed on TCP/2404 through an internet connection. Internet-exposed IEC-104 endpoints are common in electric utilities, particularly in Eastern Europe, Middle East, and Asia. IEC-104 has no authentication in its standard form — any internet-connected attacker can connect as a master station and issue commands.
    tactic: Initial Access
    technique: T0822
    steps:
    - type: pcap
      proto: iec104
      technique: T0822
      style: interrogation
      count: 1
      interval: 1s
      note: 'Internet-exposed IEC-104: general interrogation as master'
    - type: pcap
      proto: iec104
      technique: T0822
      style: single_command
      count: 3
      interval: 2s
      note: Issue control commands via internet IEC-104 access
    - type: pcap
      proto: iec104
      technique: T0822
      style: setpoint_float
      count: 3
      interval: 1s
      note: Write setpoints via unauthenticated internet connection
  T0822__external_remote__modbus:
    title: T0822 – External Remote Services — Internet-exposed Modbus/TCP access
    description: Accesses a PLC or gateway exposed on TCP/502 through an internet connection. Modbus is the most commonly internet-exposed OT protocol — Shodan finds hundreds of thousands of accessible endpoints. With no authentication, any internet client can read all registers and write to all coils and holding registers as if they were the local SCADA master.
    tactic: Initial Access
    technique: T0822
    steps:
    - type: pcap
      proto: modbus
      technique: T0822
      style: read_holding
      count: 10
      interval: 0.3s
      note: 'Internet-exposed Modbus: read all holding registers'
    - type: pcap
      proto: modbus
      technique: T0822
      style: read_coils
      count: 5
      interval: 0.3s
      note: Read all coil states via internet connection
    - type: pcap
      proto: modbus
      technique: T0822
      style: write_multiple_registers
      count: 5
      interval: 1s
      note: Write setpoints via unauthenticated internet Modbus
  T0839__module_firmware__mqtt:
    title: T0839 – Module Firmware — MQTT OTA firmware update delivery
    description: Publishes a malicious firmware image to the OTA update topic of an MQTT-connected field device. IoT/ICS devices with MQTT OTA capability download and apply firmware from the configured broker topic. An attacker with broker access can deliver a modified firmware that persists through power cycles, adds covert functionality, or alters I/O behaviour.
    tactic: Impair Process Control
    technique: T0839
    steps:
    - type: pcap
      proto: mqtt
      technique: T0839
      style: publish_firmware
      count: 3
      interval: 2s
      note: Publish malicious firmware to OTA update topic
    - type: pcap
      proto: mqtt
      technique: T0839
      style: subscribe_telemetry
      count: 3
      interval: 10s
      note: Monitor device reboot and firmware activation
  T0839__module_firmware__opcua:
    title: T0839 – Module Firmware — OPC UA firmware file write
    description: Uses OPC UA FileType write services to upload a modified firmware binary to a controller that exposes its firmware as an OPC UA file node. Some IEC 61131-3 runtimes and field device OPC UA servers expose firmware update as a file write followed by a method call to activate. The modified firmware is applied on next restart.
    tactic: Impair Process Control
    technique: T0839
    steps:
    - type: pcap
      proto: opcua
      technique: T0839
      style: browse
      count: 1
      interval: 0s
      note: Browse for firmware file node
    - type: pcap
      proto: opcua
      technique: T0839
      style: write_large_blob
      count: 5
      interval: 2s
      note: Write modified firmware via OPC UA FileType
    - type: pcap
      proto: opcua
      technique: T0839
      style: call_method
      count: 1
      interval: 3s
      note: Call firmware activation method
  T0839__module_firmware__bacnet:
    title: T0839 – Module Firmware — BACnet ReinitializeDevice firmware window
    description: Sends BACnet ReinitializeDevice with reinitializedStateOfDevice=startbackup to trigger a firmware update window. Some BACnet controllers interpret this service as the beginning of a firmware backup/restore sequence, entering a state that accepts a new firmware image. The device halts normal operation and waits for a firmware image from any BACnet client.
    tactic: Impair Process Control
    technique: T0839
    steps:
    - type: pcap
      proto: bacnet
      technique: T0839
      style: reinitialize_device
      count: 1
      interval: 0s
      note: 'ReinitializeDevice: trigger firmware update window'
    - type: pcap
      proto: bacnet
      technique: T0839
      style: write_file
      count: 3
      interval: 5s
      note: Upload modified firmware via BACnet WriteFile
  T0845__program_upload__bacnet:
    title: T0845 – Program Upload — BACnet file and programme read
    description: Uses BACnet ReadFile service to download programme files and configuration data from BACnet File objects. BACnet controllers that support file objects expose their application programme, setpoint tables, and schedule configurations as downloadable files. The attacker analyses these offline to find exploitable logic and parameter ranges.
    tactic: Collection
    technique: T0845
    steps:
    - type: pcap
      proto: bacnet
      technique: T0845
      style: read_file
      count: 5
      interval: 1s
      note: 'ReadFile: download programme and configuration files'
    - type: pcap
      proto: bacnet
      technique: T0845
      style: read_property_multi
      count: 5
      interval: 0.5s
      note: Read all object properties to reconstruct programme
  T0845__program_upload__modbus:
    title: T0845 – Program Upload — Modbus complete register map read
    description: 'Reads the complete Modbus register map: all holding registers (FC03), input registers (FC04), coil status (FC01), and discrete inputs (FC02). The register map is the programme — it contains all setpoints, calibration constants, alarm thresholds, PID parameters, and process values. A complete read is a full programme state upload.'
    tactic: Collection
    technique: T0845
    steps:
    - type: pcap
      proto: modbus
      technique: T0845
      style: io_image_read
      count: 5
      interval: 0.2s
      note: Read complete I/O image for programme state upload
    - type: pcap
      proto: modbus
      technique: T0845
      style: read_holding
      count: 10
      interval: 0.1s
      note: 'Full holding register dump: all programme parameters'
    - type: pcap
      proto: modbus
      technique: T0845
      style: report_block
      count: 3
      interval: 0.5s
      note: FC43 Device ID for programme version identification
  T0857__system_firmware__mqtt:
    title: T0857 – System Firmware — MQTT OTA system firmware replacement
    description: Delivers a complete system firmware replacement to a field device or gateway via its MQTT OTA update mechanism. Unlike module firmware (T0839), system firmware replaces the entire device operating environment — boot loader, RTOS, and application stack. The modified system firmware provides persistent covert access that survives configuration resets.
    tactic: Inhibit Response Function
    technique: T0857
    steps:
    - type: pcap
      proto: mqtt
      technique: T0857
      style: publish_firmware
      count: 1
      interval: 0s
      note: Publish complete system firmware replacement via OTA
    - type: pcap
      proto: mqtt
      technique: T0857
      style: subscribe_telemetry
      count: 3
      interval: 30s
      note: Monitor for firmware reboot completion
  T0857__system_firmware__opcua:
    title: T0857 – System Firmware — OPC UA system firmware file replacement
    description: Writes a complete system firmware binary to an OPC UA server's firmware file node, then calls the firmware activation method. System-level firmware delivered via OPC UA replaces the controller's complete operating environment. The OPC UA file write path bypasses engineering-tool-level access controls that protect traditional firmware update interfaces.
    tactic: Inhibit Response Function
    technique: T0857
    steps:
    - type: pcap
      proto: opcua
      technique: T0857
      style: browse
      count: 1
      interval: 0s
      note: Browse for system firmware file nodes
    - type: pcap
      proto: opcua
      technique: T0857
      style: write_large_blob
      count: 5
      interval: 3s
      note: Write complete system firmware binary via OPC UA FileType
    - type: pcap
      proto: opcua
      technique: T0857
      style: call_method
      count: 1
      interval: 5s
      note: Activate system firmware replacement
  T0857__system_firmware__bacnet:
    title: T0857 – System Firmware — BACnet system firmware via file write
    description: Uses BACnet WriteFile service to upload a modified system firmware image to a controller's file object after triggering firmware mode via ReinitializeDevice. Some BACnet implementations support full system firmware replacement via file services. The replacement survives power cycles and configuration resets.
    tactic: Inhibit Response Function
    technique: T0857
    steps:
    - type: pcap
      proto: bacnet
      technique: T0857
      style: reinitialize_device
      count: 1
      interval: 0s
      note: 'ReinitializeDevice: enter system firmware update mode'
    - type: pcap
      proto: bacnet
      technique: T0857
      style: write_file
      count: 5
      interval: 2s
      note: Write system firmware image via BACnet WriteFile
  T0857__system_firmware__dnp3:
    title: T0857 – System Firmware — DNP3 system firmware via file transfer
    description: Uses DNP3 file transfer (FC 25 Open, FC 29 Write) during the restart window to deliver a complete system firmware image to an RTU. Several RTU vendors (SEL, GE, Schweitzer) support full system firmware replacement via DNP3 file transfer as an alternative to serial firmware update tools. The uploaded image activates on next complete restart.
    tactic: Inhibit Response Function
    technique: T0857
    steps:
    - type: pcap
      proto: dnp3
      technique: T0857
      style: warm_restart
      count: 1
      interval: 0s
      note: Warm Restart to open system firmware update window
    - type: pcap
      proto: dnp3
      technique: T0857
      style: file_open
      count: 3
      interval: 1s
      note: Open file session for system firmware delivery
    - type: pcap
      proto: dnp3
      technique: T0857
      style: cold_restart
      count: 1
      interval: 10s
      note: Cold Restart to activate uploaded system firmware
  T0866__exploit_remote__modbus:
    title: T0866 – Exploitation of Remote Services — Modbus internal service exploit
    description: From inside the OT network, sends malformed Modbus frames with out-of-range function codes and oversized data to Modbus slaves. Unlike T0819 (internet-facing), this exploits Modbus services reached by lateral movement within the OT network. Internal Modbus slaves often have even less validation than internet-exposed ones as they are assumed trusted.
    tactic: Lateral Movement
    technique: T0866
    steps:
    - type: pcap
      proto: modbus
      technique: T0866
      style: exception_probe
      count: 5
      interval: 0.5s
      note: 'Internal Modbus: malformed FC probing for service bugs'
    - type: pcap
      proto: modbus
      technique: T0866
      style: diagnostic
      count: 5
      interval: 0.3s
      note: FC08 sub-function probing internal service paths
  T0866__exploit_remote__iec104:
    title: T0866 – Exploitation of Remote Services — IEC-104 internal RTU exploit
    description: From inside the control network, sends malformed IEC-104 APDUs with invalid TypeIDs, oversized information objects, and invalid COT values to internal RTUs. Internal RTUs behind substation firewalls receive no external input validation scrutiny and often run unpatched firmware — internal network access from a compromised SCADA workstation exposes these services.
    tactic: Lateral Movement
    technique: T0866
    steps:
    - type: pcap
      proto: iec104
      technique: T0866
      style: meas_inject
      count: 5
      interval: 0.5s
      note: 'Internal IEC-104: malformed ASDU probing RTU firmware'
    - type: pcap
      proto: iec104
      technique: T0866
      style: testfr
      count: 5
      interval: 0.5s
      note: Malformed TESTFR sequences probing session handling
  T0866__exploit_remote__iec61850:
    title: T0866 – Exploitation of Remote Services — IEC 61850 internal IED exploit
    description: From inside the process bus segment (reached by lateral movement), sends malformed GOOSE frames with invalid BER encoding, inconsistent field lengths, and out-of-range confRev values. Internal IEDs on the process bus have no filtering — they must process every GOOSE frame matching their subscription, making them vulnerable to BER parsing bugs.
    tactic: Lateral Movement
    technique: T0866
    steps:
    - type: pcap
      proto: iec61850
      technique: T0866
      style: trip_inject
      count: 5
      interval: 0.5s
      note: Malformed GOOSE BER probing internal IED firmware
    - type: pcap
      proto: iec61850
      technique: T0866
      style: spoof_measurement
      count: 5
      interval: 0.5s
      note: Malformed measurement data probing parser paths
  T0866__exploit_remote__mqtt:
    title: T0866 – Exploitation of Remote Services — MQTT broker internal exploit
    description: From inside the OT network, sends malformed MQTT packets targeting known vulnerability classes in MQTT broker implementations — oversized client IDs, malformed topic filters, and invalid QoS values. Internal MQTT brokers reached by lateral movement from the corporate network are often less hardened than internet-facing services.
    tactic: Lateral Movement
    technique: T0866
    steps:
    - type: pcap
      proto: mqtt
      technique: T0866
      style: will_message
      count: 3
      interval: 0.5s
      note: 'Internal MQTT: malformed will message probing broker'
    - type: pcap
      proto: mqtt
      technique: T0866
      style: publish_dos
      count: 5
      interval: 0.2s
      note: Oversized publish payloads probing broker validation
  T0866__exploit_remote__opcua:
    title: T0866 – Exploitation of Remote Services — OPC UA internal server exploit
    description: From inside the OT network, sends malformed OPC UA browse requests with invalid node IDs, cyclical references, and oversized request bodies. Internal OPC UA servers serving engineering workstations and SCADA historians are reached by lateral movement and may run versions with known CVEs not patched due to OT change-control processes.
    tactic: Lateral Movement
    technique: T0866
    steps:
    - type: pcap
      proto: opcua
      technique: T0866
      style: malformed_browse
      count: 5
      interval: 0.5s
      note: 'Internal OPC UA: malformed browse probing server'
    - type: pcap
      proto: opcua
      technique: T0866
      style: native_raw
      count: 5
      interval: 0.5s
      note: Raw malformed OPC UA frames probing session handling
  T0866__exploit_remote__bacnet:
    title: T0866 – Exploitation of Remote Services — BACnet internal controller exploit
    description: From inside the building or OT network, sends malformed BACnet confirmed service requests with invalid property identifiers and oversized APDU bodies to internal BACnet controllers. Internal BACnet devices are reached by lateral movement from the IT/corporate network through building integration gateways — they receive no external filtering.
    tactic: Lateral Movement
    technique: T0866
    steps:
    - type: pcap
      proto: bacnet
      technique: T0866
      style: private_transfer
      count: 5
      interval: 0.5s
      note: 'Internal BACnet: malformed Private Transfer probing'
    - type: pcap
      proto: bacnet
      technique: T0866
      style: read_property
      count: 5
      interval: 0.3s
      note: Invalid property reads probing internal validation
  T0866__exploit_remote__profinet:
    title: T0866 – Exploitation of Remote Services — PROFINET internal DCP exploit
    description: From inside the production network, sends malformed PROFINET DCP frames with invalid block types, oversized station names (>240 bytes), and malformed IP parameter blocks. PROFINET IO devices on the process bus lack external-network filtering and may have insufficient validation in their DCP stack — reachable after lateral movement from the office network.
    tactic: Lateral Movement
    technique: T0866
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0866
      style: identify
      count: 5
      interval: 0.3s
      note: Malformed DCP identify probing internal device stack
    - type: pcap
      proto: profinet_dcp
      technique: T0866
      style: factory_reset
      count: 1
      interval: 2s
      note: Unexpected factory reset testing internal access control
  T0867__lateral_tool__bacnet:
    title: T0867 – Lateral Tool Transfer — BACnet file write for tool delivery
    description: Uses BACnet WriteFile service to upload a tool or payload to a BACnet controller's file object. BACnet File objects on some controllers map to filesystem locations that are executed or loaded by the controller application. The attacker uses the legitimate BACnet file transfer mechanism to move a tool from a compromised engineering workstation to a field controller.
    tactic: Lateral Movement
    technique: T0867
    steps:
    - type: pcap
      proto: bacnet
      technique: T0867
      style: read_file
      count: 1
      interval: 0s
      note: 'ReadFile: identify existing files before upload'
    - type: pcap
      proto: bacnet
      technique: T0867
      style: write_file
      count: 5
      interval: 1s
      note: 'WriteFile: upload attacker tool via BACnet file service'
  T0867__lateral_tool__dnp3:
    title: T0867 – Lateral Tool Transfer — DNP3 file transfer for tool delivery
    description: Uses DNP3 file transfer services to upload a tool or payload to an RTU. The DNP3 file transfer mechanism (FC 25-29) provides authenticated or unauthenticated file upload to RTU storage. RTU-resident scripts or configuration files that reference uploaded content can execute attacker tools after the next device restart.
    tactic: Lateral Movement
    technique: T0867
    steps:
    - type: pcap
      proto: dnp3
      technique: T0867
      style: file_open
      count: 1
      interval: 0s
      note: Open DNP3 file transfer session for tool upload
    - type: pcap
      proto: dnp3
      technique: T0867
      style: write
      count: 5
      interval: 0.5s
      note: Write tool payload blocks via DNP3 file transfer
  T0867__lateral_tool__mqtt:
    title: T0867 – Lateral Tool Transfer — MQTT firmware publish for tool delivery
    description: Uses the MQTT OTA firmware channel to deliver an attacker tool disguised as a firmware update. The broker forwards the published firmware payload to all subscribed devices on the target topic. Devices that process the payload store it in their update buffer — effectively receiving the attacker's tool via the legitimate MQTT OTA path.
    tactic: Lateral Movement
    technique: T0867
    steps:
    - type: pcap
      proto: mqtt
      technique: T0867
      style: publish_firmware
      count: 3
      interval: 2s
      note: Publish attacker tool disguised as firmware update
    - type: pcap
      proto: mqtt
      technique: T0867
      style: subscribe_telemetry
      count: 3
      interval: 10s
      note: Monitor delivery confirmation from target device
  T0867__lateral_tool__opcua:
    title: T0867 – Lateral Tool Transfer — OPC UA large blob write for tool delivery
    description: Uses OPC UA write_large_blob to transfer an attacker tool or payload to an OPC UA server's file node. OPC UA FileType nodes on some servers map to filesystem locations accessible to the controller application. The attacker uses OPC UA's legitimate file write capability to move tools between OT network segments without using conventional file transfer protocols.
    tactic: Lateral Movement
    technique: T0867
    steps:
    - type: pcap
      proto: opcua
      technique: T0867
      style: browse
      count: 1
      interval: 0s
      note: Browse for writable file nodes on target server
    - type: pcap
      proto: opcua
      technique: T0867
      style: write_large_blob
      count: 5
      interval: 2s
      note: Write attacker tool via OPC UA file transfer
  T0886__remote_services__bacnet:
    title: T0886 – Remote Services — BACnet as lateral movement vector
    description: Uses BACnet/IP as a lateral movement service — connects to BACnet controllers reachable from a compromised workstation and uses the legitimate BACnet master-slave protocol to pivot into the building or OT network. BACnet devices are often dual-homed between IT and OT segments, making them effective lateral movement targets.
