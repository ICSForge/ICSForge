      count: 5
      interval: 0.5s
      note: Read all class data to map configuration
  T0821__modify_controller_tasking__enip:
    title: T0821 – Modify Controller Tasking — EtherNet/IP programme download
    description: Downloads a modified programme to a ControlLogix PLC via EtherNet/IP. The attacker uses boot_firmware service to upload a modified binary that changes task execution priorities, scan times, or task-to-programme assignments. Modified tasking can cause legitimate safety tasks to execute less frequently than required, weakening protection response time.
    tactic: Execution
    technique: T0821
    steps:
    - type: pcap
      proto: enip
      technique: T0821
      style: stop_device
      count: 1
      interval: 0s
      note: 'CIP Stop: put PLC in STOP before download'
    - type: pcap
      proto: enip
      technique: T0821
      style: boot_firmware
      count: 3
      interval: 2s
      note: Download modified programme/task configuration
    - type: pcap
      proto: enip
      technique: T0821
      style: start_device
      count: 1
      interval: 5s
      note: 'CIP Start: execute modified tasking'
  T0821__modify_controller_tasking__opcua:
    title: T0821 – Modify Controller Tasking — OPC UA task parameter write
    description: Uses OPC UA write services to modify controller task parameters exposed on the OPC UA server — scan cycle time, task priority, watchdog timeout. Increasing the scan time of a safety task from 10ms to 1000ms degrades protection response time by 100x without stopping the task, making the change difficult to detect during normal operation.
    tactic: Execution
    technique: T0821
    steps:
    - type: pcap
      proto: opcua
      technique: T0821
      style: browse
      count: 1
      interval: 0s
      note: Browse for task configuration nodes
    - type: pcap
      proto: opcua
      technique: T0821
      style: write_value
      count: 3
      interval: 1s
      note: Modify task scan time and priority parameters
  T0821__modify_controller_tasking__dnp3:
    title: T0821 – Modify Controller Tasking — DNP3 class assignment change
    description: Uses DNP3 Assign Class command (FC 22) to reassign data objects to different reporting classes, fundamentally altering how the outstation reports events to the SCADA master. Moving critical alarm points from Class 1 (fastest reporting) to Class 3 (slowest) delays alarm delivery — a change in tasking that degrades protection response without disabling it.
    tactic: Execution
    technique: T0821
    steps:
    - type: pcap
      proto: dnp3
      technique: T0821
      style: assign_class
      count: 5
      interval: 0.5s
      note: Reassign critical alarm points to slower class
    - type: pcap
      proto: dnp3
      technique: T0821
      style: disable_unsolicited
      count: 1
      interval: 2s
      note: Disable unsolicited reporting for targeted objects
  T0806__brute_force_io__dnp3:
    title: T0806 – Brute Force I/O — DNP3 output state sweep
    description: Sends DNP3 Direct Operate commands in rapid succession, cycling all binary and analog output objects through their full range of states. This brute-forces every possible output combination, causing connected actuators to receive conflicting commands. Physical equipment (valves, breakers, motors) may respond to intermediate states, producing erratic or damaging behaviour.
    tactic: Impair Process Control
    technique: T0806
    steps:
    - type: pcap
      proto: dnp3
      technique: T0806
      style: direct_operate
      count: 20
      interval: 0.05s
      note: Rapid output cycling — binary output sweep
    - type: pcap
      proto: dnp3
      technique: T0806
      style: direct_operate
      count: 20
      interval: 0.05s
      note: Analog output sweep across full range
  T0806__brute_force_io__enip:
    title: T0806 – Brute Force I/O — EtherNet/IP output tag sweep
    description: Writes rapidly cycling values to ControlLogix output tags, sweeping digital outputs through TRUE/FALSE and analog outputs through their configured engineering unit range. The PLC applies each value to the physical I/O modules on successive scan cycles, causing connected field devices to respond to every intermediate output state.
    tactic: Impair Process Control
    technique: T0806
    steps:
    - type: pcap
      proto: enip
      technique: T0806
      style: write_tag
      count: 30
      interval: 0.05s
      note: Rapid output tag write sweep (digital and analog)
  T0806__brute_force_io__s7comm:
    title: T0806 – Brute Force I/O — S7comm output register sweep
    description: Writes rapidly alternating values to the Siemens S7 output process image (Q area) via S7comm Write Variable. Each write is immediately reflected in the physical output modules on the next scan cycle. By sweeping all output bytes between 0x00 and 0xFF, the attacker forces all digital outputs through all possible states, overwhelming connected field devices.
    tactic: Impair Process Control
    technique: T0806
    steps:
    - type: pcap
      proto: s7comm
      technique: T0806
      style: write_outputs
      count: 30
      interval: 0.02s
      note: Sweep all output bytes through all states
    - type: pcap
      proto: s7comm
      technique: T0806
      style: write_inputs
      count: 10
      interval: 0.05s
      note: Write process image inputs to corrupt feedback
  T0838__alarm_settings__bacnet:
    title: T0838 – Modify Alarm Settings — BACnet High/Low-Limit write
    description: Writes extreme values to BACnet Analog Input High-Limit (property 45) and Low-Limit (property 59) to effectively disable alarm reporting. Setting High-Limit to 9999.0 and Low-Limit to -9999.0 on a 0-100 sensor means the BACnet device never generates a TO-HIGH-LIMIT or TO-LOW-LIMIT alarm event, regardless of actual process value.
    tactic: Inhibit Response Function
    technique: T0838
    steps:
    - type: pcap
      proto: bacnet
      technique: T0838
      style: write_property
      count: 5
      interval: 0.5s
      note: Write extreme High-Limit and Low-Limit to disable alarms
  T0838__alarm_settings__enip:
    title: T0838 – Modify Alarm Settings — EtherNet/IP alarm threshold write
    description: Writes alarm deadband and limit values in ControlLogix alarm tags via EtherNet/IP. FactoryTalk alarm thresholds are stored in PLC tags; by writing the high-high limit to the maximum engineering value, the attacker prevents the HMI from triggering alarms even during severe process deviations. The alarm configuration change is not logged unless audit mode is explicitly enabled.
    tactic: Inhibit Response Function
    technique: T0838
    steps:
    - type: pcap
      proto: enip
      technique: T0838
      style: write_tag
      count: 5
      interval: 0.5s
      note: Overwrite alarm limit tags to disable threshold alarms
  T0849__masquerading__dnp3:
    title: T0849 – Masquerading — DNP3 source address spoofing
    description: Sends DNP3 frames with a spoofed source address matching the legitimate SCADA master's DNP3 address. Outstations that do not validate source address against a whitelist will accept commands from the spoofed address as legitimate master commands. The attacker's requests are indistinguishable from the real SCADA master at the DNP3 application layer.
    tactic: Evasion
    technique: T0849
    steps:
    - type: pcap
      proto: dnp3
      technique: T0849
      style: direct_operate
      count: 5
      interval: 1s
      note: Direct Operate with spoofed master address
    - type: pcap
      proto: dnp3
      technique: T0849
      style: read_class1
      count: 5
      interval: 0.5s
      note: Read commands with spoofed master identity
  T0849__masquerading__enip:
    title: T0849 – Masquerading — EtherNet/IP sender context spoofing
    description: Sends EtherNet/IP encapsulation headers with the sender context bytes matching those used by the legitimate SCADA/HMI system. While the TCP connection source IP still differs, at the CIP application layer the attacker's frames appear to originate from the trusted engineering workstation — potentially bypassing CIP-layer access controls.
    tactic: Evasion
    technique: T0849
    steps:
    - type: pcap
      proto: enip
      technique: T0849
      style: list_identity
      count: 3
      interval: 0.5s
      note: List Identity with spoofed engineering workstation context
    - type: pcap
      proto: enip
      technique: T0849
      style: write_tag
      count: 5
      interval: 1s
      note: Write tags impersonating trusted EWS session
  T0849__masquerading__s7comm:
    title: T0849 – Masquerading — S7comm COTP source TSAP spoofing
    description: Sends S7comm connections with TSAP (Transport Service Access Point) values matching those of the legitimate WinCC SCADA workstation or Step7/TIA Portal engineering software. S7 PLCs often trust specific TSAP values as indicators of authorised clients. By spoofing these values, the attacker's S7comm session appears to originate from a trusted engineering tool.
    tactic: Evasion
    technique: T0849
    steps:
    - type: pcap
      proto: s7comm
      technique: T0849
      style: setup
      count: 1
      interval: 0s
      note: S7comm setup with spoofed engineering WS TSAP
    - type: pcap
      proto: s7comm
      technique: T0849
      style: read_db
      count: 5
      interval: 0.5s
      note: Read DB impersonating WinCC identity
    - type: pcap
      proto: s7comm
      technique: T0849
      style: write_db
      count: 3
      interval: 1s
      note: Write operations under spoofed trusted identity
  T0846__remote_sys_discovery__modbus:
    title: T0846 – Remote System Discovery — Modbus device ID sweep
    description: Sends Modbus FC43 Read Device Identification requests to enumerate connected devices. FC43 returns vendor name, product code, firmware version, and product serial number. Unlike T0840 which maps connections, this specifically retrieves device identity strings — knowing the exact firmware version allows the attacker to target known CVEs.
    tactic: Discovery
    technique: T0846
    steps:
    - type: pcap
      proto: modbus
      technique: T0846
      style: report_block
      count: 5
      interval: 0.3s
      note: FC43/14 Device ID request to all unit IDs
    - type: pcap
