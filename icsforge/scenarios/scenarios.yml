  T0811__data_repos__iec61850:
    title: T0811 – Data from Information Repositories — IEC 61850 GOOSE dataset harvest
    description: Captures all GOOSE multicast traffic to reconstruct the complete IED dataset configuration and historical state changes. GOOSE frames include stNum (state change count) and sqNum (keep-alive sequence) which together form a historical record of all protection events since last IED restart — an implicit time-series information repository of the substation's protection history.
