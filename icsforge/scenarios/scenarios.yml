  T0803__block_command__mqtt:
    title: T0803 – Block Command Message — MQTT broker flood blocks SCADA commands
    description: Floods the MQTT broker with high-rate publish messages, exhausting its message queue. SCADA command messages published to device command topics are queued behind the flood and either dropped or delivered with delays exceeding the controller's command timeout. The SCADA master's commands never reach the field devices — a network-visible block of command messages.
