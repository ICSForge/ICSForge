      interval: 0.5s
      note: Read system state using valid credentials
    - type: pcap
      proto: s7comm
      technique: T0859
      style: read_all_dbs
      count: 5
      interval: 0.5s
      note: Full DB access as legitimate engineering account
  T0859__valid_accounts__iec104:
    title: T0859 – Valid Accounts — IEC-104 legitimate master station session
    description: Establishes an IEC-104 session using valid IP address credentials — in standard IEC-104, the master IP is the credential. The attacker spoofs or operates from a machine with an IP on the RTU's allowlist, gaining full master station access including general interrogation, control commands, and setpoint writes as a valid authenticated master.
    tactic: Lateral Movement
    technique: T0859
    steps:
