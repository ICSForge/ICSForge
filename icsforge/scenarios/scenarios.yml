      count: 3
      interval: 1s
      note: Write new password via CIP Set_Attribute
  T0891__hardcoded_creds__bacnet:
    title: T0891 – Hardcoded Credentials — BACnet unauthenticated access (no auth)
    description: BACnet/IP has no authentication in its base specification. The 'hardcoded credential' in BACnet is the complete absence of any credential requirement — this is a design-time hardcoded decision by the standard. Any device on the network can issue WriteProperty commands with no password, certificate, or challenge-response required.
    tactic: Lateral Movement
    technique: T0891
    steps:
    - type: pcap
      proto: bacnet
      technique: T0891
      style: who_is
      count: 1
      interval: 0s
      note: Discover devices with no credential required
    - type: pcap
      proto: bacnet
      technique: T0891
      style: write_property
      count: 5
      interval: 1s
      note: Write control values using hardcoded null auth
  T0891__hardcoded_creds__dnp3:
    title: T0891 – Hardcoded Credentials — DNP3 authentication bypass
    description: Uses the DNP3 default authentication bypass (no SA configured) to issue control commands as a master station. DNP3 Secure Authentication is optional; in the vast majority of deployments the hardcoded credential is no credential at all. This scenario demonstrates exploiting the default-unauthenticated DNP3 design.
    tactic: Lateral Movement
    technique: T0891
    steps:
    - type: pcap
      proto: dnp3
