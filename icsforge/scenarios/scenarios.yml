    description: Uses PROFINET DCP frames with EtherType 0x8892 (the standard PROFINET EtherType) to blend attack traffic with legitimate IO controller communication. Process bus switches passing PROFINET multicast frames forward these transparently. The attacker uses the allowed PROFINET EtherType to issue management commands while appearing as normal IO controller traffic.
