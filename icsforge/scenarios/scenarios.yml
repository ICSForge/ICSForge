    - type: pcap
      proto: opcua
      technique: T0802
      style: create_sub
      count: 10
      interval: 1s
      note: Create OPC UA subscriptions covering all process variable nodes
  T0802__automated_collection__profinet:
    title: T0802 – Automated Collection — PROFINET cyclic I/O image capture
    description: Captures PROFINET cyclic I/O frames from the process bus at the IO controller polling rate. Each cycle delivers the complete output and input process image of all IO devices. Automated collection at the cyclic rate (typically 1–16ms) provides a high-resolution time series of the entire plant's physical I/O state.
    tactic: Collection
    technique: T0802
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0802
      style: identify
      count: 5
      interval: 0.5s
      note: Identify all IO devices for collection targeting
    - type: pcap
      proto: profinet_dcp
      technique: T0802
      style: get_ip
      count: 5
      interval: 0.5s
      note: Map IP addresses for cyclic I/O stream capture
  T0802__automated_collection__s7comm:
    title: T0802 – Automated Collection — S7comm cyclic DB read
    description: Reads all S7 data blocks at the PLC scan rate (typically 10–100ms) using rapid successive Read Variable requests. Automated at the scan rate, this captures every change to process variables — setpoints, counters, timers, PID states — building a time series equivalent to what the WinCC historian records, without any historian access.
    tactic: Collection
    technique: T0802
    steps:
    - type: pcap
      proto: s7comm
      technique: T0802
      style: read_all_dbs
      count: 10
      interval: 0.1s
      note: Cyclic DB read at scan rate for process telemetry
    - type: pcap
      proto: s7comm
      technique: T0802
      style: read_inputs
      count: 10
      interval: 0.1s
      note: Read input process image for physical I/O state
  T0881__service_stop__iec61850:
    title: T0881 – Service Stop — IEC 61850 GOOSE bus saturation stops IED services
    description: Floods the IEC 61850 process bus with protection_block GOOSE frames at a rate that overwhelms IED message queues. The IEDs' GOOSE receive service halts under load — they stop processing incoming frames and cannot publish their own GOOSE. This effectively stops the protection and measurement services of all IEDs on the bus.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: iec61850
      technique: T0881
      style: protection_block
      count: 50
      interval: 0.005s
      note: GOOSE flood overloading IED receive queues
    - type: pcap
      proto: iec61850
      technique: T0881
      style: protection_block
      count: 50
      interval: 0.005s
      note: Sustain flood to maintain service stop
  T0881__service_stop__modbus:
    title: T0881 – Service Stop — Modbus slave service saturation
    description: Sends FC08 Restart Communications Option (sub-function 1) followed by sustained high-rate read requests. The restart option disrupts the Modbus application service, and the subsequent flood prevents recovery. The slave's communication service stops responding to the legitimate SCADA master while remaining physically powered.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: modbus
      technique: T0881
      style: diagnostic
      count: 1
      interval: 0s
      note: 'FC08/SF01: Restart Communication Option'
    - type: pcap
      proto: modbus
      technique: T0881
      style: read_holding
      count: 30
      interval: 0.02s
      note: Flood to prevent service recovery
  T0881__service_stop__mqtt:
    title: T0881 – Service Stop — MQTT broker service exhaustion
    description: Floods the MQTT broker with high-rate publish messages across many topics, exhausting its message queue and connection handling capacity. When the broker's service threads are saturated, legitimate clients cannot publish or receive — all MQTT-connected field device telemetry and command paths stop functioning.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: mqtt
      technique: T0881
      style: publish_dos
      count: 50
      interval: 0.005s
      note: Flood broker to exhaust service capacity
    - type: pcap
      proto: mqtt
      technique: T0881
      style: publish_dos
      count: 50
      interval: 0.005s
      note: Sustain to keep broker service stopped
  T0881__service_stop__profinet:
    title: T0881 – Service Stop — PROFINET IO device service stop via factory reset
    description: Sends PROFINET DCP Factory Reset to IO devices to force them into unconfigured state, stopping their cyclic I/O service. The IO controller detects the IO device as missing and raises a diagnostic alarm. The physical outputs go to failsafe state. The PROFINET application service on the device is fully stopped pending reconfiguration.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0881
      style: factory_reset
      count: 1
      interval: 0s
      note: 'Factory reset: stop IO device cyclic service'
    - type: pcap
      proto: profinet_dcp
      technique: T0881
      style: identify
      count: 3
      interval: 10s
      note: Confirm device in unconfigured (stopped) state
  T0827__loss_of_control__iec61850:
    title: T0827 – Loss of Control — IEC 61850 trip injection blocks operator commands
    description: Injects GOOSE trip frames at high stNum to IEDs configured for direct GOOSE-based interlocking. IEDs that receive a higher-stNum trip cannot be overridden by the SCADA control system until the stNum wraps. During this window the operator cannot issue control commands to the affected switchgear — a complete loss of control of the substation bay.
    tactic: Impact
    technique: T0827
    steps:
    - type: pcap
      proto: iec61850
      technique: T0827
      style: trip_inject
      count: 5
      interval: 0.2s
      note: Inject high-stNum trip to block SCADA control
    - type: pcap
      proto: iec61850
      technique: T0827
      style: trip_inject
      count: 10
      interval: 0.5s
      note: Sustain trip injection to maintain control denial
  T0827__loss_of_control__mqtt:
    title: T0827 – Loss of Control — MQTT command topic flooding
    description: Publishes malformed or conflicting commands to field device command topics at high rate. Devices that process commands serially are unable to clear their command queues — legitimate SCADA commands are delayed indefinitely or rejected as the queue overflows. The SCADA operator loses the ability to issue effective control commands.
    tactic: Impact
    technique: T0827
    steps:
    - type: pcap
      proto: mqtt
      technique: T0827
      style: publish_command
      count: 30
      interval: 0.02s
      note: Flood command topics to starve SCADA commands
    - type: pcap
      proto: mqtt
      technique: T0827
      style: publish_dos
      count: 30
      interval: 0.02s
      note: Sustain flood to maintain loss of control
  T0827__loss_of_control__opcua:
    title: T0827 – Loss of Control — OPC UA write flooding blocks SCADA writes
    description: Floods an OPC UA server with write requests to process variable nodes, saturating the server's write queue. The OPC UA server serialises write operations — when overwhelmed, legitimate SCADA write requests from the operator workstation are queued indefinitely. The operator cannot adjust setpoints or issue commands through the OPC UA interface.
