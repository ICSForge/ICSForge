  T0856__spoof_reporting__modbus_coil:
    title: T0856 – Spoof Reporting Message — Modbus status coil spoofing
    description: Injects Modbus Write Single Coil responses to falsify digital input status, making equipment appear online when offline or vice versa. Attackers inject these as unsolicited responses to fool polling masters.
    tactic: Impair Process Control
    technique: T0856
    steps:
    - type: pcap
      proto: modbus
      technique: T0856
      style: write_single_coil
      count: 4
      interval: 0.3s
      note: Modbus coil status spoof injection
    - type: pcap
