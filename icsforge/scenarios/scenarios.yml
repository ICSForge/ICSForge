    - type: pcap
      proto: dnp3
      technique: T0886
      style: direct_operate
      count: 5
      interval: 1s
      note: Execute control commands via lateral DNP3 pivot
  T0886__remote_services__enip:
    title: T0886 – Remote Services — EtherNet/IP as lateral movement vector
    description: Uses EtherNet/IP CIP sessions to move laterally from a compromised device to PLCs and I/O modules on the EtherNet/IP network. Engineering workstations, HMIs, and data gateways with EtherNet/IP access can reach all PLCs in the subnet. The attacker uses the legitimate CIP session mechanism to pivot to additional controllers.
