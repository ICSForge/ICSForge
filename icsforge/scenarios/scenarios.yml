      style: browse
      count: 2
      interval: 0.5s
      note: OPC UA namespace for I/O mapping
  T0832__manipulation_of_view__iec104:
    title: T0832 – Manipulation of View — IEC-104 measurement inject
    description: Injects a forged IEC-104 measurement (M_ME_NC_1 short float) into the station bus. Receiving SCADA systems accept the spoofed analog value as a legitimate spontaneous transmission and update the operator display. The real field value is masked for the duration of the attack.
    tactic: Impact
    technique: T0832
    steps:
    - type: pcap
      proto: iec104
      technique: T0832
      style: meas_inject
      count: 3
      interval: 0.5s
      note: Inject false sensor reading
    - type: pcap
      proto: iec104
      technique: T0832
      style: meas_inject
      count: 3
      interval: 5s
      note: Sustain spoofed display value
  T0832__manipulation_of_view__s7comm_db:
    title: T0832 – Manipulation of View — S7comm data block write
    description: Writes a tampered value into a Siemens S7 data block that the WinCC/SCADA HMI reads for display. The HMI continuously reads the DB; the attacker writes a false value (e.g., 0 pressure on a live vessel) before each expected poll cycle, masking the real physical state.
    tactic: Impact
    technique: T0832
    steps:
    - type: pcap
      proto: s7comm
      technique: T0832
      style: write_db
      count: 1
      interval: 0s
      note: Write false value to HMI display DB
    - type: pcap
      proto: s7comm
      technique: T0832
      style: write_db
      count: 5
      interval: 1s
      note: Sustain write at HMI poll interval
  T0832__manipulation_of_view__enip_tag:
    title: T0832 – Manipulation of View — EtherNet/IP tag write
    description: Writes a false value to a ControlLogix CIP tag via EtherNet/IP SendRRData. The Rockwell SCADA / FactoryTalk View reads this tag for the operator display. Attacker overwrites with a safe-looking value while the physical process is in a fault state, masking the real condition.
    tactic: Impact
    technique: T0832
    steps:
    - type: pcap
      proto: enip
      technique: T0832
      style: write_tag
      count: 1
      interval: 0s
      note: Write false tag to ControlLogix
    - type: pcap
      proto: enip
      technique: T0832
      style: write_tag
      count: 5
      interval: 2s
      note: Periodic re-write to maintain spoof
  T0856__spoof_reporting__bacnet_i_am:
    title: T0856 – Spoof Reporting Message — BACnet IAm broadcast spoof
    description: Broadcasts a forged BACnet IAm response with the device ID and object properties of a legitimate BAS controller. SCADA systems that rely on passive IAm discovery will update their device table with the spoofed identity, directing subsequent polling to the attacker's device or accepting the attacker's property values as authoritative.
    tactic: Impair Process Control
    technique: T0856
    steps:
    - type: pcap
      proto: bacnet
      technique: T0856
      style: i_am
      count: 3
      interval: 1s
      note: Broadcast forged IAm with spoofed device identity
  T0856__spoof_reporting__modbus_write:
    title: T0856 – Spoof Reporting Message — Modbus false output report
    description: Writes a false value to a Modbus holding register that the SCADA master periodically polls for status reporting. The forged value (e.g., sensor reading within normal range) is presented to operators as a valid process measurement, suppressing legitimate alarms.
    tactic: Impair Process Control
    technique: T0856
    steps:
    - type: pcap
      proto: modbus
      technique: T0856
      style: write_single_register
      count: 5
      interval: 0.5s
      note: Write false report value before each SCADA poll
  T0856__spoof_reporting__s7comm_write:
    title: T0856 – Spoof Reporting Message — S7comm output data tamper
    description: Uses S7comm Write Variable (Function Group 5) to inject a false value into the output register of a Siemens S7-300/400/1500 PLC. The SCADA master reads this register as part of its reporting cycle and transmits the spoofed value upstream to operators and historians.
    tactic: Impair Process Control
    technique: T0856
    steps:
    - type: pcap
      proto: s7comm
      technique: T0856
      style: write_outputs
      count: 5
      interval: 1s
      note: Inject false value into S7 output register
  T0856__spoof_reporting__enip_write:
    title: T0856 – Spoof Reporting Message — EtherNet/IP tag value spoof
    description: Writes a manipulated value to a CIP tag in a ControlLogix controller that feeds into the site reporting system. The Historian and upstream SCADA record the attacker's value, producing false operational reports and potentially masking an ongoing process deviation.
    tactic: Impair Process Control
    technique: T0856
    steps:
    - type: pcap
      proto: enip
      technique: T0856
      style: write_tag
      count: 5
      interval: 1s
      note: Overwrite reporting tag in ControlLogix
  T0888__remote_sys_info__dnp3_link:
    title: T0888 – Remote System Info Discovery — DNP3 delay measurement
    description: Sends DNP3 Delay Measurement requests (FC 23) to a range of addresses. RTUs that respond reveal their presence and transmission delay, allowing the attacker to map the DNP3 network topology and identify active devices before targeting specific RTUs for deeper exploitation.
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: dnp3
      technique: T0888
      style: delay_measure
      count: 5
      interval: 0.2s
      note: Probe RTU addresses via DNP3 Delay Measure (FC23)
  T0888__remote_sys_info__iec104_interrogation:
    title: T0888 – Remote System Info Discovery — IEC-104 general interrogation
    description: 'Sends IEC-104 General Interrogation Command (C_IC_NA_1, type 100) which requests the RTU to transmit the current value of all measured and status points. The response reveals the complete process data set: all measured values, binary states, counters, and device capability information.'
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: iec104
      technique: T0888
      style: interrogation
      count: 1
      interval: 0s
      note: Send C_IC_NA_1 general interrogation
    - type: pcap
      proto: iec104
      technique: T0888
      style: counter_interr
      count: 1
      interval: 2s
      note: Follow with counter interrogation (C_CI_NA_1)
  T0888__remote_sys_info__mqtt_sys:
    title: T0888 – Remote System Info Discovery — MQTT $SYS topic probe
    description: Connects to an MQTT broker and subscribes to the $SYS/# topic hierarchy. Most brokers publish broker version, client count, topic statistics, and uptime to $SYS. This reveals broker software, configuration details, connected client count, and message throughput — intelligence for planning a targeted attack against the ICS MQTT infrastructure.
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: mqtt
      technique: T0888
      style: auto
      count: 1
      interval: 0s
      note: Connect to broker
    - type: pcap
      proto: mqtt
      technique: T0888
      style: subscribe_all
      count: 3
      interval: 0.5s
      note: Subscribe to $SYS/# for broker info
  T0888__remote_sys_info__profinet_dcp:
    title: T0888 – Remote System Info Discovery — PROFINET DCP device info query
    description: Sends PROFINET DCP Get requests to enumerate a specific device's station name, IP configuration, device type and vendor. Unlike the multicast Identify-All used in T0840, this targets a known device to extract detailed configuration and firmware information for attack planning.
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0888
      style: get_name
      count: 1
      interval: 0s
      note: 'DCP Get: station name'
    - type: pcap
      proto: profinet_dcp
      technique: T0888
      style: get_ip
      count: 1
      interval: 0.5s
      note: 'DCP Get: IP configuration'
    - type: pcap
      proto: profinet_dcp
      technique: T0888
      style: identify_unicast
      count: 1
      interval: 1s
      note: 'DCP Identify unicast: full device profile'
  T0888__remote_sys_info__iec61850_probe:
    title: T0888 – Remote System Info Discovery — IEC 61850 GOOSE IED probe
    description: Sends GOOSE frames with the test flag set to the IEC 61850 generic multicast address. IEDs on the process bus that subscribe to this APPID will process the test-mode GOOSE. By varying APPID and gocbRef values and observing the process bus, the attacker can infer which IEDs are present and what GOOSE control blocks are active.
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: iec61850
      technique: T0888
      style: enumerate_ied
      count: 3
      interval: 0.5s
      note: GOOSE test-mode probe to discover IEDs
  T0840__network_enum__dnp3_address_scan:
    title: T0840 – Network Connection Enumeration — DNP3 address scan
    description: 'Iterates through DNP3 destination addresses by sending Data Link Reset frames. Devices that respond confirm their address and link-layer capabilities. Combined with Request Link Status frames, this maps the complete DNP3 network topology: master, RTU, and concentrator addresses.'
    tactic: Discovery
    technique: T0840
    steps:
    - type: pcap
      proto: dnp3
      technique: T0840
      style: delay_measure
      count: 10
      interval: 0.1s
      note: Scan DNP3 addresses 1–10 via Delay Measure
    - type: pcap
      proto: dnp3
      technique: T0840
      style: read_class1
      count: 5
      interval: 0.2s
      note: Read Class 1 data to confirm active devices
  T0840__network_enum__iec104_test:
    title: T0840 – Network Connection Enumeration — IEC-104 connection probe
    description: Sends IEC-104 STARTDT (Start Data Transfer) activation frames to enumerate active IEC-104 RTUs. Devices that respond with STARTDT_CON confirm their presence and TCP endpoint. The attacker then sends TESTFR frames to validate the connection and measure response times.
    tactic: Discovery
    technique: T0840
    steps:
    - type: pcap
      proto: iec104
      technique: T0840
      style: available
      count: 1
      interval: 0s
      note: STARTDT activation to probe IEC-104 endpoint
    - type: pcap
      proto: iec104
      technique: T0840
      style: interrogation
      count: 1
      interval: 1s
      note: General interrogation to extract device data map
  T0840__network_enum__iec61850_goose:
    title: T0840 – Network Connection Enumeration — IEC 61850 GOOSE IED discovery
    description: Sends test-mode GOOSE frames to the IEC 61850 generic multicast address with varying APPID values. By observing which publishers respond or by monitoring subsequent GOOSE traffic triggered by the probes, the attacker maps which IEDs are present, their APPID assignments, and their GOOSE control block references — the basis for targeted GOOSE injection.
    tactic: Discovery
    technique: T0840
    steps:
    - type: pcap
      proto: iec61850
      technique: T0840
      style: enumerate_ied
      count: 5
      interval: 0.2s
      note: Test-mode GOOSE probe across APPID range
    - type: pcap
      proto: iec61850
      technique: T0840
      style: enumerate_ied
      count: 5
      interval: 1s
      note: Second sweep with different gocbRef patterns
  T0830__aitm__modbus_response_tamper:
    title: T0830 – Adversary-in-the-Middle — Modbus response injection
    description: Simulates AitM position between a Modbus master and slave. Attacker intercepts and modifies Modbus read responses, replacing legitimate register values with attacker-chosen values before forwarding to the master. SCADA receives tampered process values while the physical plant operates at its real state. Uses Write Multiple Registers to pre-stage false values before the next master poll.
    tactic: Collection
    technique: T0830
    steps:
    - type: pcap
      proto: modbus
      technique: T0830
      style: write_multiple_registers
      count: 5
      interval: 0.5s
      note: Pre-stage false values before SCADA poll cycle
    - type: pcap
      proto: modbus
      technique: T0830
      style: write_single_register
      count: 3
      interval: 1s
      note: Targeted tamper of single control register
  T0830__aitm__enip_tag_intercept:
    title: T0830 – Adversary-in-the-Middle — EtherNet/IP CIP tag intercept
    description: AitM on a ControlLogix Ethernet segment. Attacker intercepts CIP read/write traffic and modifies tag values mid-stream. The attacker's Write Tag service overwrites the tag with a tampered value before the SCADA master's next read, creating a discrepancy between the physical process state and the operator's view.
    tactic: Collection
    technique: T0830
    steps:
    - type: pcap
      proto: enip
      technique: T0830
      style: write_tag
      count: 5
      interval: 0.5s
      note: Overwrite target tag before SCADA read cycle
    - type: pcap
      proto: enip
      technique: T0830
      style: read_tag
      count: 3
      interval: 1s
      note: Verify modified tag is being read by SCADA
  T0830__aitm__iec104_inject:
    title: T0830 – Adversary-in-the-Middle — IEC-104 measurement injection
    description: AitM on IEC-104 station bus. Attacker captures spontaneous measurement transmissions (M_ME_NC_1) from the RTU and re-injects modified values with identical timestamps but tampered measurement data before the originals reach the SCADA. Uses IEC-104 clock synchronization to align spoofed transmissions precisely with real poll cycles.
    tactic: Collection
    technique: T0830
    steps:
    - type: pcap
