      style: modified_ob1_dl
      count: 1
      interval: 2s
      note: Download modified OB1 to PLC flash
    - type: pcap
      proto: s7comm
      technique: T0889
      style: cpu_start_warm
      count: 1
      interval: 3s
      note: Warm start to activate modified programme
  T0889__modify_program__enip:
    title: T0889 – Modify Program — EtherNet/IP programme modification
    description: Downloads a modified ControlLogix programme via EtherNet/IP. The attacker first uploads the existing programme (using read_tag), modifies it offline to insert a hidden routine, then downloads the modified programme using boot_firmware. The modified programme runs on every scan cycle and survives power cycles, providing persistent unauthorised code execution.
    tactic: Persistence
    technique: T0889
    steps:
    - type: pcap
      proto: enip
      technique: T0889
      style: stop_device
      count: 1
      interval: 0s
      note: 'CIP Stop: halt programme for modification'
    - type: pcap
      proto: enip
      technique: T0889
      style: read_tag
      count: 5
      interval: 0.3s
      note: Upload current programme for offline modification
    - type: pcap
      proto: enip
      technique: T0889
      style: boot_firmware
      count: 3
      interval: 2s
      note: Download modified programme to PLC
    - type: pcap
      proto: enip
      technique: T0889
      style: start_device
      count: 1
      interval: 3s
      note: Start PLC executing modified programme
  T0889__modify_program__opcua:
    title: T0889 – Modify Program — OPC UA programme file write
    description: Overwrites a controller programme file via OPC UA FileType write services. Some IEC 61131-3 runtimes expose the compiled programme binary as an OPC UA file object for remote update. The attacker writes a modified binary that appends a hidden task to the programme. On next programme activation, the hidden task executes persistently.
    tactic: Persistence
