    - type: pcap
      proto: profinet_dcp
      technique: T0861
      style: get_ip
      count: 5
      interval: 0.3s
      note: Get IP addresses to map full topology
  T0861__point_tag_id__s7comm:
    title: T0861 – Point & Tag Identification — S7comm symbol table and DB enumeration
    description: Reads all Data Blocks from a Siemens S7 PLC using Read All DBs. The DB structure mirrors the programme's symbol table — every variable name, type, and address offset is encoded in the DB layout. This reverse-engineers the complete I/O and process variable map without access to the Step7/TIA Portal project file.
    tactic: Collection
    technique: T0861
    steps:
