  T0801__monitor_process_state__enip:
    title: T0801 – Monitor Process State — EtherNet/IP continuous tag read
    description: Reads process tags from a ControlLogix PLC at high frequency, maintaining a real-time shadow copy of the control programme's runtime state. By reading all output tags, setpoint DBs, and status bits, the attacker monitors process state changes — learning normal operating ranges, alarm thresholds, and control patterns to inform subsequent attack timing.
    tactic: Collection
    technique: T0801
    steps:
    - type: pcap
      proto: enip
      technique: T0801
      style: read_tag
      count: 10
      interval: 0.5s
      note: Continuous tag read for process state monitoring
    - type: pcap
      proto: enip
      technique: T0801
      style: assembly_read
      count: 5
      interval: 1s
      note: Read I/O assembly for physical process image
  T0801__monitor_process_state__s7comm:
    title: T0801 – Monitor Process State — S7comm continuous DB read
    description: Reads Siemens S7 data blocks at high frequency to monitor the process state in real time. By targeting the data blocks used for process values, setpoints, and alarm states, the attacker maintains a continuously updated view of the plant — indistinguishable from legitimate WinCC polling cycles from the PLC's perspective.
    tactic: Collection
    technique: T0801
    steps:
    - type: pcap
