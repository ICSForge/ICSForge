    title: T0811 – Data from Information Repositories — PROFINET DCP device database
    description: Systematically queries all PROFINET IO devices using DCP Identify-All, Get Name, and Get IP to build a complete device database. Each device's station name, IP address, vendor, device type, and firmware version constitutes an information repository about the PROFINET topology — intelligence that maps the OT asset inventory without accessing any historian or CMDB system.
