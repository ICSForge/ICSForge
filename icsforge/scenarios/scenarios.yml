      style: assembly_read
      count: 1
      interval: 0s
      note: Read current I/O assembly state
    - type: pcap
      proto: enip
      technique: T0835
      style: write_tag
      count: 10
      interval: 0.5s
      note: Overwrite output assembly to manipulate I/O image
  T0835__manipulate_io__iec104_setpoint:
    title: T0835 – Manipulate I/O Image — IEC-104 setpoint injection
    description: Sends IEC-104 Setpoint commands (C_SE_NA_1 / C_SE_NB_1 / C_SE_NC_1) to inject attacker-controlled values into the RTU's output process image. These setpoints are immediately applied to the physical process — changing PID reference values, valve positions, or motor speeds outside of the control programme's authorised range.
    tactic: Inhibit Response Function
    technique: T0835
    steps:
    - type: pcap
      proto: iec104
