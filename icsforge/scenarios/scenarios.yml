      technique: T0846
      style: get_device_type
      count: 5
      interval: 0.3s
      note: 'GetDeviceType: hardware profile for CVE mapping'
  T0846__remote_sys_discovery__opcua:
    title: T0846 – Remote System Discovery — OPC UA server info harvest
    description: 'Sends OPC UA GetEndpoints and FindServers to retrieve the complete server profile: ProductName, ProductUri, ManufacturerName, SoftwareVersion, BuildNumber. These fields identify the specific OPC UA SDK and version in use — enough to cross-reference against published OPC UA CVE advisories from ICS-CERT for targeted exploitation.'
    tactic: Discovery
    technique: T0846
    steps:
