    description: Publishes a modified broker configuration to the MQTT broker's management topic (typically $SYS/broker/config or a vendor-specific config topic), changing the authentication credentials for a specific client. The legitimate client's next connection attempt fails with authentication error, locking it out of all MQTT-connected field device interactions.
