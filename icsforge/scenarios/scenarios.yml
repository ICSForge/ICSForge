  T0891__hardcoded_creds__mqtt:
    title: T0891 – Hardcoded Credentials — MQTT default anonymous access
    description: Many MQTT brokers ship with anonymous access enabled by default or with well-known default credentials (guest/guest, admin/admin). This scenario connects using the default-anonymous or default-credential access that represents a hardcoded design choice in the broker configuration, then subscribes to and publishes on all available topics.
