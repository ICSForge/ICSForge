      count: 1
      interval: 2s
      note: Call programme activation method
  T0839__module_firmware__enip:
    title: T0839 – Module Firmware — EtherNet/IP firmware_update to I/O module
    description: Uses EtherNet/IP firmware_update service to upload a modified firmware image to a ControlLogix I/O module. The firmware update service on I/O modules accepts images over EtherNet/IP without cryptographic signature verification in many versions. Modified firmware can change I/O behaviour, add covert functionality, or create a persistent implant in the I/O module.
    tactic: Impair Process Control
    technique: T0839
    steps:
    - type: pcap
