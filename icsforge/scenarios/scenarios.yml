    description: Uses OPC UA on TCP/4840 (the standard OPC UA port) to blend C2 traffic with legitimate SCADA historian and engineering workstation communication. OT firewalls allowing TCP/4840 for SCADA polling will pass these frames. OPC UA's binary protocol is complex enough that many NSM tools cannot deep-inspect it beyond port matching.
