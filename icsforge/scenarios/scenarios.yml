      count: 5
      interval: 10s
      note: Counter collection for operational metrics
  T0816__device_restart__dnp3:
    title: T0816 – Device Restart/Shutdown — DNP3 cold restart
    description: Sends DNP3 Cold Restart (FC 13) to an outstation, forcing a full hardware reset. The outstation halts all communication, clears its event buffer, reinitialises firmware, and restores configuration from non-volatile memory. During the restart window (seconds to minutes), the outstation cannot execute control commands or report status.
    tactic: Inhibit Response Function
    technique: T0816
    steps:
    - type: pcap
      proto: dnp3
      technique: T0816
      style: cold_restart
      count: 1
      interval: 0s
      note: 'Cold Restart: force full hardware reset on outstation'
    - type: pcap
      proto: dnp3
      technique: T0816
      style: warm_restart
      count: 1
      interval: 30s
      note: 'Warm Restart: secondary reset if device recovers'
  T0816__device_restart__iec104:
    title: T0816 – Device Restart/Shutdown — IEC-104 reset process command
    description: Sends an IEC-104 C_RP_NA_1 (Reset Process, type 105) command to an RTU. This standard command triggers a process-level restart on the RTU, resetting its application state while the hardware may remain powered. All unsolicited transmissions stop; the SCADA loses visibility of the substation until the RTU completes its restart sequence.
    tactic: Inhibit Response Function
    technique: T0816
    steps:
    - type: pcap
      proto: iec104
      technique: T0816
      style: reset_process
      count: 1
      interval: 0s
      note: 'C_RP_NA_1: reset RTU process (type 105)'
    - type: pcap
      proto: iec104
      technique: T0816
      style: available
      count: 3
      interval: 15s
      note: STARTDT probe to detect when RTU resumes
  T0816__device_restart__modbus:
    title: T0816 – Device Restart/Shutdown — Modbus restart via diagnostic
    description: Uses Modbus Diagnostics (FC 8) sub-function 1 (Restart Communications Option) to force the Modbus slave to restart its communication port. This clears the diagnostic registers and resets the communications event log. On many devices, this also triggers a partial or full application restart depending on implementation.
    tactic: Inhibit Response Function
    technique: T0816
    steps:
    - type: pcap
      proto: modbus
      technique: T0816
      style: diagnostic
      count: 1
      interval: 0s
      note: 'FC08/SF01: Restart Communications Option'
    - type: pcap
      proto: modbus
      technique: T0816
      style: diagnostic
      count: 3
      interval: 5s
      note: Diagnostic polls to confirm restart effect
  T0816__device_restart__mqtt:
    title: T0816 – Device Restart/Shutdown — MQTT reboot command publish
    description: Publishes a reboot/restart command to the command topic of an MQTT-connected field device or gateway. ICS MQTT deployments often subscribe to a command topic (e.g., site/device/cmd) for management operations including restart. Without topic-level ACLs, any client can trigger a device restart by publishing the correct command payload.
    tactic: Inhibit Response Function
    technique: T0816
    steps:
    - type: pcap
      proto: mqtt
      technique: T0816
      style: publish_command
      count: 1
      interval: 0s
      note: Publish restart command to device command topic
    - type: pcap
      proto: mqtt
      technique: T0816
      style: subscribe_telemetry
      count: 3
      interval: 15s
      note: Monitor device topic to confirm restart
  T0815__denial_of_view__iec61850:
    title: T0815 – Denial of View — IEC 61850 GOOSE bus saturation
    description: Floods the IEC 61850 process bus VLAN with GOOSE frames at high rate, consuming all available bandwidth. Legitimate protection IEDs cannot deliver their status GOOSE messages to SCADA, protection relays, and operator displays. The operator view of substation bay status freezes while the physical process continues changing.
    tactic: Impact
    technique: T0815
    steps:
    - type: pcap
      proto: iec61850
      technique: T0815
      style: protection_block
      count: 50
      interval: 0.005s
      note: GOOSE flood blocks all IED status reporting
    - type: pcap
      proto: iec61850
      technique: T0815
      style: protection_block
      count: 50
      interval: 0.005s
      note: Sustain to maintain denial of view
  T0815__denial_of_view__profinet_dcp:
    title: T0815 – Denial of View — PROFINET DCP multicast flood
    description: Floods the PROFINET segment with DCP Identify-All multicast frames. All IO devices must process each multicast; at high rate, their CPU cycles are consumed processing identify requests rather than updating cyclic I/O data. The IO controller's cyclic read of process images is delayed, producing stale data on the operator HMI.
    tactic: Impact
    technique: T0815
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0815
      style: identify
      count: 50
      interval: 0.01s
      note: DCP multicast flood blocking IO cyclic data
    - type: pcap
      proto: profinet_dcp
      technique: T0815
      style: identify
      count: 50
      interval: 0.01s
      note: Sustain flood to maintain denial of view
  T0801__monitor_process_state__dnp3:
    title: T0801 – Monitor Process State — DNP3 continuous class polling
    description: Continuously polls DNP3 Class 1/2/3 event data and Class 0 static data from multiple outstation addresses. By maintaining persistent polling at a rate matching or slightly higher than the SCADA master's interval, the attacker builds a real-time copy of the process state — all binary status, analog values, and counters across the entire RTU network.
    tactic: Collection
    technique: T0801
    steps:
    - type: pcap
      proto: dnp3
