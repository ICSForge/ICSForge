      style: subscribe_telemetry
      count: 3
      interval: 10s
      note: Monitor device status during update mode
  T0892__change_credential__dnp3:
    title: T0892 – Change Credential — DNP3 authentication key replace
    description: Sends DNP3 Secure Authentication (SA) key change messages to replace the authentication key on an outstation. An attacker with access to the master station's SA key can update outstation keys, locking out the legitimate master and taking exclusive control of the authenticated DNP3 session.
    tactic: Inhibit Response Function
    technique: T0892
