      style: write_tag
      count: 5
      interval: 1s
      note: Write process values using legitimate identity
  T0859__valid_accounts__s7comm:
    title: T0859 – Valid Accounts — S7comm legitimate engineering session
    description: Uses valid S7comm credentials (access level password) obtained from a compromised engineering workstation to establish an authenticated session. With the correct password the attacker has the same access as the legitimate engineer — full DB read/write, programme upload/download, and CPU control — with all actions logging as the legitimate account.
    tactic: Lateral Movement
    technique: T0859
    steps:
    - type: pcap
      proto: s7comm
