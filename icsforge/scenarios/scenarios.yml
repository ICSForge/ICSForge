  T0891__hardcoded_creds__iec61850:
    title: T0891 – Hardcoded Credentials — IEC 61850 GOOSE no authentication
    description: IEC 61850 GOOSE has no authentication in the base standard. Any device on the process bus VLAN can publish GOOSE as any IED with any app ID and GOOSE ID — the 'credential' is physical/VLAN access. This hardcoded design decision means the attacker's GOOSE frames are indistinguishable from legitimate IED traffic at the application layer without additional authentication overlays.
