  T0836__modify_param__iec104_setpoint:
    title: T0836 – Modify Parameter — IEC-104 set point command injection
    description: 'Injects IEC 60870-5-104 set point commands (C_SE_NA: normalized value set point) to modify regulated process parameters: voltage references, current limits, and load set points in substation RTUs.'
