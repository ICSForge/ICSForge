    description: Changes a PROFINET IO device's station name to a non-matching value via DCP Set Name. The IO controller expects a device with the original name — when the name changes, the controller cannot establish a cyclic connection and raises an IO fault. Outputs go to failsafe state and the operator loses control of the associated field equipment.
