  T0813__denial_of_control__enip_session_flood:
    title: T0813 – Denial of Control — EtherNet/IP session exhaustion
    description: Rapidly opens EtherNet/IP Register Session connections to the target ControlLogix or MicroLogix PLC without completing or closing them. PLCs have a fixed maximum concurrent session count (typically 8–32). When all sessions are occupied, the legitimate SCADA master cannot establish a connection and all control commands are blocked.
    tactic: Impact
    technique: T0813
    steps:
    - type: pcap
      proto: enip
      technique: T0813
      style: register_session
      count: 20
      interval: 0.05s
      note: Flood Register Session to exhaust PLC connection table
    - type: pcap
      proto: enip
      technique: T0813
      style: register_session
      count: 20
      interval: 0.05s
      note: Continue flood to maintain session exhaustion
  T0813__denial_of_control__profinet_dcp_flood:
    title: T0813 – Denial of Control — PROFINET DCP multicast flood
    description: Floods the PROFINET process network with DCP Identify-All multicast frames at high rate. All PROFINET IO devices on the segment must process each multicast frame. The resulting CPU load prevents devices from processing legitimate I/O controller commands during the flood, causing output modules to hold their last-known state or go to failsafe.
    tactic: Impact
    technique: T0813
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0813
      style: identify
      count: 30
      interval: 0.01s
      note: High-rate DCP multicast flood at 100 pps
    - type: pcap
      proto: profinet_dcp
      technique: T0813
      style: identify
      count: 30
      interval: 0.01s
      note: Sustain flood to maintain device overload
  T0813__denial_of_control__opcua_sub_flood:
    title: T0813 – Denial of Control — OPC UA subscription exhaustion
    description: Creates a large number of OPC UA subscriptions on the target server without publishing acknowledgements. OPC UA servers maintain queued notification buffers for each subscription; unacknowledged subscriptions accumulate and eventually exhaust server memory, preventing legitimate SCADA clients from creating subscriptions or receiving control confirmations.
    tactic: Impact
    technique: T0813
    steps:
    - type: pcap
      proto: opcua
      technique: T0813
      style: create_sub
      count: 20
      interval: 0.1s
      note: Create subscriptions without acknowledging
    - type: pcap
      proto: opcua
      technique: T0813
      style: create_sub
      count: 20
      interval: 0.1s
      note: Continue sub flood to exhaust server resources
  T0814__denial_of_view__opcua_delete_sub:
    title: T0814 – Denial of View — OPC UA subscription deletion
    description: Terminates active OPC UA monitored item subscriptions that the SCADA operator is relying on for real-time process visibility. By sending DeleteSubscription service calls, the attacker removes the data change notifications feeding operator displays, leaving screens frozen on the last received value while the process continues to change.
    tactic: Inhibit Response Function
    technique: T0814
    steps:
    - type: pcap
      proto: opcua
