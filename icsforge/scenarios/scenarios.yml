  T0803__block_command__modbus_flood:
    title: T0803 – Block command channel via Modbus TCP port flood
    description: 'Saturates the Modbus TCP port (502) with max-size FC03 reads, consuming all available TCP connections and blocking legitimate command traffic from reaching the PLC.

      '
    steps:
    - type: pcap
      proto: modbus
      technique: T0803
      style: channel_flood
      count: 40
      interval: 0.02s
  T0803__block_command__iec104_stopdt:
    title: T0803 – Block IEC-104 command channel via STOPDT
    description: 'Sends IEC-104 STOPDT (Stop Data Transfer) U-frame from an attacker-controlled source, causing the RTU to halt command processing on that link. Legitimate SCADA commands are subsequently ignored.

      '
    steps:
    - type: pcap
      proto: iec104
      technique: T0803
      style: block_cmd
      count: 3
      interval: 0.2s
    - type: pcap
      proto: iec104
      technique: T0803
      style: stopdt
      count: 5
      interval: 0.15s
  T0804__block_reporting__dnp3_disable_unsol:
    title: T0804 – Block DNP3 unsolicited reporting via disable_unsolicited
    description: 'Sends DNP3 FC21 (Disable Unsolicited Reporting) targeted at class data objects, preventing the outstation from sending spontaneous event reports to the master.

      '
    steps:
    - type: pcap
      proto: dnp3
      technique: T0804
      style: disable_unsolicited
      count: 3
      interval: 0.2s
    - type: pcap
      proto: dnp3
      technique: T0804
      style: assign_class
      count: 2
      interval: 0.3s
  T0805__block_serial__modbus_gateway_flood:
    title: T0805 – Block serial COM via Modbus RTU gateway flood
    description: 'Floods the Modbus TCP gateway (port 502) that bridges to a serial RTU network. The gateway queue fills, serial transmission stalls, and RTU devices on the serial bus become unreachable. Observable as max-rate FC03/FC16 bursts from unexpected source.

      '
    steps:
    - type: pcap
      proto: modbus
      technique: T0805
      style: dos_read
      count: 50
      interval: 0.01s
    - type: pcap
      proto: modbus
      technique: T0805
      style: channel_flood
      count: 30
      interval: 0.01s
  T0807__cli__opcua_method_shell:
    title: T0807 – Command-Line Interface via OPC UA method call with script argument
    description: 'Invokes an OPC UA server method with a shell command as the argument. Some OPC UA servers (particularly on Windows HMIs) expose methods that execute operating system commands. Observable as unusual CallRequest with string arguments on port 4840.

      '
    steps:
    - type: pcap
      proto: opcua
      technique: T0807
      style: hello
      count: 1
      interval: 0.1s
    - type: pcap
      proto: opcua
      technique: T0807
      style: open_session
      count: 1
      interval: 0.2s
    - type: pcap
      proto: opcua
      technique: T0807
      style: call_script
      count: 2
      interval: 0.3s
  T0807__cli__dnp3_file_transfer:
    title: T0807 – Command-Line Interface via DNP3 file transfer to outstation
    description: 'Uses DNP3 FC25 (open_file) to push a script file to an outstation that exposes a writable filesystem. The file can contain commands executed on the RTU''s embedded OS.

      '
    steps:
    - type: pcap
      proto: dnp3
      technique: T0807
      style: file_open
      count: 2
      interval: 0.3s
    - type: pcap
      proto: dnp3
      technique: T0807
      style: read
      count: 2
      interval: 0.2s
