  T0855__unauth_command__opcua_write:
    title: T0855 – Unauthorized Command Message — OPC UA unauthorized write
    description: 'Issues OPC UA WriteRequest to writable actuator nodes without engineering authorization: valve open/close nodes, motor start/stop, or breaker control. The OPC UA server executes the write if access control is misconfigured.'
