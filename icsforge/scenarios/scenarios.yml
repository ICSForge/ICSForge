    description: Reads all holding and input registers across the full Modbus address space using systematic FC03/FC04 sweeps. Holding registers on many PLCs store production totals, alarm histories, calibration offsets, and recipe parameters — an embedded information repository that reveals operational history and configuration without requiring separate historian access.
