      count: 5
      interval: 1s
      note: 'C_SE_NC_1: inject false float setpoints'
    - type: pcap
      proto: iec104
      technique: T0835
      style: setpoint_scale
      count: 5
      interval: 1s
      note: 'C_SE_NB_1: inject scaled integer setpoints'
  T0861__point_tag_id__dnp3_class_read:
    title: T0861 – Point & Tag Identification — DNP3 class data read
    description: 'Reads all DNP3 class data (Class 0 static, Class 1/2/3 events) from an outstation to enumerate all defined data points. The Class 0 read returns every configured object: binary inputs, binary outputs, analog inputs, analog outputs, counters, and their current values. This completely maps the outstation''s I/O configuration without any schema file.'
