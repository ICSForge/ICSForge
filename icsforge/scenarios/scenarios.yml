    description: Floods the process bus with rapid GOOSE retransmissions at a fixed low stNum (stable state), incrementing sqNum at >100 Hz. Receiver IED queues become saturated processing the flood; when a real protection event (e.g., a fault trip) is published by the legitimate IED, its GOOSE message is delayed or lost — resulting in delayed or failed protection operation. Observable as anomalous sqNum progression with no stNum change.
    tactic: Impact
    technique: T0813
    steps:
    - type: pcap
      proto: iec61850
      technique: T0813
      style: protection_block
      count: 20
      interval: 0.01s
      note: High-rate GOOSE replay flood (100 msg/s, stable stNum)
    - type: pcap
      proto: iec61850
      technique: T0813
      style: protection_block
      count: 20
      interval: 0.01s
      note: Continued flood during critical protection window
  T0830__aitm__iec61850_goose_relay:
    title: T0830 – Adversary-in-the-Middle — IEC 61850 GOOSE relay injection
    description: Simulates an AitM position on the process bus VLAN. The attacker captures a GOOSE frame from a protection IED, modifies the allData payload (e.g., flips a close command to a trip, or substitutes a safe voltage with an overvoltage reading), and re-injects with stNum = captured + 1. Because GOOSE subscribers accept the highest stNum unconditionally, the modified frame overwrites the legitimate publisher’s state in all receiving IEDs.
    tactic: Collection
    technique: T0830
    steps:
    - type: pcap
      proto: iec61850
      technique: T0830
      style: relay_inject
      count: 1
      interval: 0s
      note: Modified GOOSE re-inject (stNum = captured+1, trip=TRUE)
    - type: pcap
      proto: iec61850
      technique: T0830
      style: relay_inject
      count: 1
      interval: 0.004s
      note: Relay retransmit 1
    - type: pcap
      proto: iec61850
      technique: T0830
      style: relay_inject
      count: 1
      interval: 0.016s
      note: Relay retransmit 2
    - type: pcap
      proto: iec61850
      technique: T0830
      style: relay_inject
      count: 1
      interval: 1s
      note: Relay keep-alive
  T0826__loss_of_availability__iec61850_goose:
    title: T0826 – Loss of Availability — IEC 61850 GOOSE process bus saturation
    description: Saturates the IEC 61850 process bus with high-rate GOOSE frames, consuming available bandwidth on the dedicated protection VLAN. With the 100 Mbit/s VLAN at saturation, legitimate time-critical GOOSE messages (protection trip/close, interlocking) cannot reach subscribers within the 4 ms Class 1 timing requirement, causing protection system failures.
    tactic: Impact
    technique: T0826
    steps:
    - type: pcap
      proto: iec61850
      technique: T0826
      style: protection_block
      count: 50
      interval: 0.005s
      note: Saturate process bus VLAN at 200 pps
    - type: pcap
      proto: iec61850
      technique: T0826
      style: protection_block
      count: 50
      interval: 0.005s
      note: Sustain saturation through protection window
  T0831__manip_control__iec61850_goose_cb:
    title: T0831 – Manipulation of Control — IEC 61850 GOOSE circuit breaker sequence
    description: Injects a sequence of GOOSE trip/close commands to force a circuit breaker into an attacker-controlled state. The open/close cycling can cause arc flash events, equipment damage, or sustained power interruption.
    tactic: Impact
