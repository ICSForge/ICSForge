    - type: pcap
      proto: enip
      technique: T0827
      style: register_session
      count: 30
      interval: 0.05s
      note: Maintain exhaustion to keep SCADA locked out
  T0881__service_stop__dnp3_cold_restart:
    title: T0881 – Service Stop — DNP3 cold restart outstation
    description: Sends a DNP3 Cold Restart command (FC 13) to an outstation. Cold restart causes the outstation to perform a complete hardware reset, reloading its configuration from non-volatile memory. During the restart period (seconds to minutes depending on hardware), the outstation stops all communication, cannot execute control commands, and outputs hold their last state or go to failsafe.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: dnp3
      technique: T0881
      style: cold_restart
      count: 1
      interval: 0s
      note: 'Cold Restart: halt outstation service completely'
    - type: pcap
      proto: dnp3
      technique: T0881
      style: warm_restart
      count: 3
      interval: 5s
      note: Warm Restart variants to prevent service recovery
  T0881__service_stop__iec104_stopdt:
    title: T0881 – Service Stop — IEC-104 STOPDT data transfer halt
    description: Sends IEC-104 STOPDT ACT to halt the data transfer service on an RTU. In IEC-104, STOPDT is designed for graceful shutdown. An attacker using it without subsequent STARTDT permanently halts the RTU's reporting service. The RTU application continues running but the IEC-104 presentation layer service that feeds the SCADA is stopped.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: iec104
      technique: T0881
      style: stopdt
      count: 3
      interval: 2s
      note: 'STOPDT ACT: stop IEC-104 service on RTU'
  T0881__service_stop__bacnet_reinitialize:
    title: T0881 – Service Stop — BACnet ReinitializeDevice cold-start
    description: Sends a BACnet ReinitializeDevice request with reinitializedStateOfDevice set to 'coldstart'. This is a standard BACnet service for device reset, but in default configurations it requires no password. The device performs a full cold start, stopping all BACnet services, clearing all COV subscriptions, and resetting all commandable objects to default values.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: bacnet
      technique: T0881
      style: reinitialize_device
      count: 1
      interval: 0s
