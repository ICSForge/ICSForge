      style: read_property
      count: 10
      interval: 0.3s
      note: Access OT devices via BACnet remote service
    - type: pcap
      proto: bacnet
      technique: T0886
      style: write_property
      count: 5
      interval: 1s
      note: Execute control actions via BACnet lateral pivot
  T0886__remote_services__dnp3:
    title: T0886 – Remote Services — DNP3 as lateral movement vector
    description: Uses DNP3 master-outstation sessions to move laterally through the OT network. A compromised engineering workstation or data historian with legitimate DNP3 master credentials can reach all outstations in the DNP3 network. The attacker uses this legitimate service to enumerate and control all field devices reachable by the compromised master.
