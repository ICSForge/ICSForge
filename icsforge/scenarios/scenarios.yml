    title: T0804 – Block Reporting Message — MQTT telemetry flood prevents reporting
    description: Subscribes to all topics then floods the broker with high-rate publishes to exhaust its routing capacity. Field devices continue publishing sensor data, but the broker's message routing is saturated — telemetry messages are dropped before reaching SCADA subscribers. The operator's view is frozen while the physical process continues changing.
