    description: Writes modified control parameters to Modbus holding registers that control PLC scan cycle behaviour, output update rates, and control loop setpoints. On PLCs that use holding registers as controller tasking parameters (scan period, PID coefficients, output enable masks), these writes modify controller behaviour without uploading a new programme. An FC08 restart activates the changes.
