    description: Sends malformed BACnet confirmed service requests with invalid property identifiers and out-of-range values to probe for stack vulnerabilities. BACnet devices exposed to building networks or internet often run unpatched firmware. Abnormal service codes and oversized APDU payloads can trigger buffer overflows or service crashes.
