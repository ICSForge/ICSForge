    description: Sends malformed PROFINET DCP frames with invalid block types, oversized station names, and invalid IP address blocks to probe IO devices accessible from corporate network segments. Some IO devices have insufficient validation for malformed DCP frames, which can trigger device crashes or configuration corruption in response to unexpected block structures.
