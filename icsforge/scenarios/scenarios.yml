    - type: pcap
      proto: bacnet
      technique: T0827
      style: who_is
      count: 3
      interval: 5s
      note: Confirm device stops responding to control requests
  T0827__loss_of_control__dnp3:
    title: T0827 – Loss of Control — DNP3 broadcast flood starves SCADA master
    description: Sends DNP3 broadcasts to address 0xFFFF at high rate. Every RTU on the network must process each broadcast, consuming their receive buffer and CPU. The SCADA master's unicast commands are queued behind the flood and never reach the target outstation within the operator's expected timeout, producing a loss of control for the entire DNP3 segment.
    tactic: Impact
    technique: T0827
    steps:
    - type: pcap
      proto: dnp3
      technique: T0827
      style: broadcast_operate
      count: 40
      interval: 0.02s
      note: DNP3 broadcast flood starving all outstation queues
    - type: pcap
      proto: dnp3
      technique: T0827
      style: broadcast_operate
      count: 40
      interval: 0.02s
      note: Sustain flood through control command window
  T0827__loss_of_control__enip:
    title: T0827 – Loss of Control — EtherNet/IP session exhaustion
    description: Opens the maximum number of EtherNet/IP sessions against a ControlLogix or MicroLogix PLC without closing them. PLCs enforce a hard session limit (8–32 depending on model). With the table full, the SCADA master's Forward-Open requests are rejected and it cannot establish I/O connections, losing the ability to send any control commands.
    tactic: Impact
    technique: T0827
    steps:
    - type: pcap
      proto: enip
