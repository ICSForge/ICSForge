    description: Publishes a maintenance or manual override command to an MQTT-connected controller's command topic. Devices in maintenance mode change their task schedule — automatic control loops are suspended, alarm reporting may be suppressed, and the device executes a different programme branch. The modification persists until an operator manually restores auto mode.
