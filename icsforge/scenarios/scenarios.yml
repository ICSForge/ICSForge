  T0846__network_scan__bacnet_sweep:
    title: T0841 – Network Scanning — BACnet Who-Is device ID sweep
    description: Sends BACnet Who-Is requests with low-limit/high-limit ranges to sweep the entire device ID space (0–4194303). Every BACnet device with a matching instance ID responds with an IAm, revealing device type, vendor, and object count. This is the canonical BACnet network discovery sweep used in building automation and industrial facilities.
    tactic: Discovery
    technique: T0846
    steps:
    - type: pcap
      proto: bacnet
      technique: T0846
      style: who_is
      count: 5
      interval: 0.1s
      note: Who-Is sweep across device ID range 1–5
    - type: pcap
      proto: bacnet
      technique: T0846
      style: read_property
      count: 3
      interval: 0.5s
      note: Read Object Identifier from responding devices
  T0846__network_scan__iec61850_goose:
    title: T0841 – Network Scanning — IEC 61850 GOOSE multicast scan
    description: Probes the IEC 61850 process bus by sending GOOSE frames to all protection multicast addresses (01:0C:CD:01:00:01 – 01:0C:CD:01:FF:FF) and monitoring for GOOSE traffic in response. This maps which IEDs are publishing, their APPID assignments, gocbRef strings, and dataset names — intelligence required for GOOSE injection attacks.
    tactic: Discovery
    technique: T0846
    steps:
    - type: pcap
      proto: iec61850
      technique: T0846
      style: enumerate_ied
      count: 10
      interval: 0.05s
      note: High-rate GOOSE probe to enumerate all active IEDs
  T0846__network_scan__profinet_dcp:
    title: T0841 – Network Scanning — PROFINET DCP Identify-All range scan
    description: Sends repeated PROFINET DCP Identify-All multicast frames to enumerate all PROFINET devices on the segment. Each responding device reveals its station name, IP address, device type, and vendor. Used as the first step in PROFINET network mapping prior to targeted attacks.
    tactic: Discovery
    technique: T0846
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0846
      style: identify
      count: 3
      interval: 0.5s
      note: DCP Identify-All multicast sweeps
    - type: pcap
      proto: profinet_dcp
      technique: T0846
      style: get_name
      count: 2
      interval: 1s
      note: Targeted DCP Get for station names
  T0880__loss_of_safety__modbus_sis:
    title: T0876 – Modbus safety register zero-out (Loss of Safety)
    description: Writes specially crafted values to Modbus holding registers in a Safety Instrumented System (SIS) controller. The safety_write style targets registers that control safety function enable/disable flags. When these are overwritten with attacker-controlled values, the SIS loses the ability to execute its protective shutdown function — the physical process continues operating past safe limits without protective intervention. Technique used in the TRITON/TRISIS attack on a Saudi Arabian petrochemical facility in 2017.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: modbus
      technique: T0880
      style: read_holding
      count: 4
      interval: 0.2s
    - type: pcap
      proto: modbus
      technique: T0880
      style: safety_write
      count: 15
      interval: 0.1s
  T0880__loss_of_safety__dnp3_disable_protection:
    title: T0876 – Loss of Safety — DNP3 protection relay disable
    description: Sends DNP3 Disable Unsolicited and Assign Class commands to a protection relay outstation, then issues a direct operate command to disable the relay's trip output. With the protection relay unable to respond to fault conditions, the protected equipment (transformer, feeder) operates without overcurrent or fault protection — a loss of safety function.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: dnp3
      technique: T0880
      style: disable_unsolicited
      count: 1
      interval: 0s
      note: Disable unsolicited status from protection relay
    - type: pcap
      proto: dnp3
      technique: T0880
      style: direct_operate
      count: 3
      interval: 1s
      note: Operate trip inhibit output to disable protection
  T0880__loss_of_safety__enip_safety_write:
    title: T0876 – Loss of Safety — EtherNet/IP GuardLogix safety tag write
    description: Writes to safety I/O tags in a Rockwell GuardLogix safety PLC using CIP safety messaging over EtherNet/IP. GuardLogix safety tags that are not write-protected can be overwritten by standard CIP Write Tag requests, bypassing safety program logic and directly commanding safety-rated outputs — disabling e-stops, light curtains, or interlocks.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: enip
      technique: T0880
      style: write_tag
      count: 5
      interval: 1s
      note: Write safety output tags to bypass GuardLogix interlocks
    - type: pcap
      proto: enip
      technique: T0880
      style: reset_safe
      count: 1
      interval: 5s
      note: Send reset_safe to clear safety controller fault state
  T0880__loss_of_safety__iec104_protection_block:
    title: T0876 – Loss of Safety — IEC-104 protection block command
    description: Sends IEC-104 protection equipment operation commands (C_SE with block qualifier QU=22) to block trip and close operations on a substation protection relay. With protective operations blocked, fault currents cannot clear via circuit breaker trip — the protected equipment runs to damage without the protection system intervening.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: iec104
      technique: T0880
      style: block_cmd
      count: 5
      interval: 1s
      note: Block protection relay trip operations
    - type: pcap
      proto: iec104
      technique: T0880
      style: block_cmd
      count: 5
      interval: 5s
      note: Re-block on release to sustain safety loss
  T0858__change_program_state__enip:
    title: T0875 – Change Program State — EtherNet/IP CIP Stop/Start
    description: Sends CIP Stop Device service (service 0x07 on Identity Object) to halt the ControlLogix PLC's programme scan, then CIP Start Device to resume it. During the STOP state, all output tags hold their last value; the I/O modules enter safe state. The programme can be held in STOP indefinitely without operator intervention from the physical panel.
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: enip
      technique: T0858
      style: stop_device
      count: 1
      interval: 0s
      note: 'CIP Stop: halt programme execution'
    - type: pcap
      proto: enip
      technique: T0858
      style: list_identity
      count: 3
      interval: 5s
      note: Verify PLC in STOP state
    - type: pcap
      proto: enip
      technique: T0858
      style: start_device
      count: 1
      interval: 30s
      note: 'CIP Start: resume (or keep stopped)'
  T0858__change_program_state__iec104:
    title: T0875 – Change Program State — IEC-104 process reset
    description: Uses IEC-104 Reset Process command (C_RP_NA_1, type 105) to change the RTU's application state from normal to initialisation mode. During the reset, the RTU reloads its configuration and transitions through defined states before returning to operational mode. Attackers can exploit the transition window to inject commands that execute during restart.
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: iec104
      technique: T0858
      style: reset_process
      count: 1
      interval: 0s
      note: 'C_RP_NA_1: trigger application state change'
    - type: pcap
      proto: iec104
      technique: T0858
      style: available
      count: 3
      interval: 10s
      note: STARTDT probe to observe state transition
  T0858__change_program_state__opcua:
    title: T0875 – Change Program State — OPC UA programme mode write
    description: 'Writes to the OPC UA ProgramStateMachine node to transition the controller programme between states: Halted, Ready, Running, Suspended. Many IEC 61131-3 runtimes expose their programme state machine via OPC UA DA nodes. Writing to the state node causes the controller to transition — halting programme execution or resuming it without touching the physical panel.'
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: opcua
      technique: T0858
      style: browse
      count: 1
      interval: 0s
      note: Browse for ProgramStateMachine state node
    - type: pcap
      proto: opcua
      technique: T0858
      style: write_value
      count: 1
      interval: 1s
      note: Write Halted state to stop programme execution
  T0858__change_op_mode__bacnet:
    title: T0858 – Change Operating Mode — BACnet device disable communications
    description: Sends BACnet DeviceCommunicationControl with the 'disable' action to suppress a controller's ability to initiate communications. This places the device in a passive mode where it can respond to explicit requests but no longer generates spontaneous reports or COV notifications — effectively silencing it while maintaining the appearance of operation.
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: bacnet
      technique: T0858
      style: device_comm_control
      count: 1
      interval: 0s
      note: 'DeviceCommunicationControl: disable-initiation mode'
    - type: pcap
      proto: bacnet
      technique: T0858
      style: read_property
      count: 3
      interval: 5s
      note: Confirm device in suppressed mode
  T0858__change_op_mode__iec61850:
    title: T0858 – Change Operating Mode — IEC 61850 GOOSE test-mode activation
    description: Injects GOOSE frames with test=TRUE flag to all IEDs on the process bus. Some IED implementations transition into test mode when they receive test-flagged GOOSE from a known publisher, suspending normal protection operations. This is a legitimate commissioning mechanism weaponised to change IED operating mode without physical access to the key switch.
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: iec61850
      technique: T0858
      style: enumerate_ied
      count: 5
      interval: 0.2s
      note: Broadcast test-mode GOOSE to trigger mode change
    - type: pcap
      proto: iec61850
      technique: T0858
      style: enumerate_ied
      count: 5
      interval: 1s
      note: Sustain test-mode to hold IEDs in changed state
  T0858__change_op_mode__modbus:
    title: T0858 – Change Operating Mode — Modbus listen-only diagnostic mode
    description: Uses Modbus FC08 sub-function 4 (Force Listen Only Mode) to place a Modbus slave into listen-only mode. In this mode the device receives and processes requests but does not respond — making the SCADA master believe the device is offline while the attacker can still observe traffic. Requires a reboot or Restart Communications to exit.
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: modbus
      technique: T0858
      style: diagnostic
      count: 1
      interval: 0s
      note: 'FC08/SF04: Force Listen Only Mode'
    - type: pcap
      proto: modbus
      technique: T0858
      style: read_holding
      count: 3
      interval: 5s
      note: Probe to confirm device no longer responds
  T0858__change_op_mode__mqtt:
    title: T0858 – Change Operating Mode — MQTT maintenance mode command
    description: Publishes a 'maintenance' or 'manual' mode command to the device command topic of an MQTT-connected field controller. Devices in maintenance mode typically disable automatic control actions and alarm reporting, allowing the attacker to make changes without triggering safety responses.
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: mqtt
      technique: T0858
      style: publish_command
      count: 1
      interval: 0s
      note: Publish maintenance-mode command to device topic
    - type: pcap
      proto: mqtt
      technique: T0858
      style: subscribe_telemetry
      count: 3
      interval: 5s
      note: Monitor device status for mode change confirmation
  T0858__change_op_mode__profinet_dcp:
    title: T0858 – Change Operating Mode — PROFINET DCP factory reset mode
    description: Sends PROFINET DCP Factory Reset to an IO device, forcing it into its factory-default unconfigured state. The device exits its normal cyclic I/O mode and waits for reconfiguration, effectively placing it offline from the IO controller's perspective while it remains powered and discoverable on the network.
    tactic: Evasion
    technique: T0858
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0858
      style: factory_reset
      count: 1
      interval: 0s
      note: 'Factory reset: force device to unconfigured mode'
    - type: pcap
      proto: profinet_dcp
      technique: T0858
      style: identify
      count: 3
      interval: 10s
      note: Confirm device in factory-default waiting state
  T0829__loss_of_view__bacnet:
    title: T0829 – Loss of View — BACnet Who-Is broadcast storm
    description: Floods the BACnet/IP network with high-rate Who-Is broadcasts, saturating all devices with multicast traffic. BACnet controllers must process each broadcast before handling normal read requests. SCADA polling cycles miss their intervals; operator displays show stale data or communication-fault indicators.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: bacnet
      technique: T0829
      style: who_is
      count: 50
      interval: 0.01s
      note: Who-Is broadcast storm blocking SCADA read cycles
    - type: pcap
      proto: bacnet
      technique: T0829
      style: who_is
      count: 50
      interval: 0.01s
      note: Sustain flood to maintain loss of view
  T0829__loss_of_view__enip:
    title: T0829 – Loss of View — EtherNet/IP session exhaustion
    description: Opens the maximum number of EtherNet/IP sessions without closing them, consuming the PLC's session table. The SCADA historian and HMI cannot establish new connections to read produced tags. The operator display freezes at last-known values while the physical process continues changing.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: enip
      technique: T0829
      style: register_session
      count: 30
      interval: 0.05s
      note: Exhaust EtherNet/IP session table
    - type: pcap
      proto: enip
      technique: T0829
      style: register_session
      count: 30
      interval: 0.05s
      note: Maintain exhaustion to sustain loss of view
  T0829__loss_of_view__iec61850:
    title: T0829 – Loss of View — IEC 61850 process bus saturation
    description: Floods the IEC 61850 process bus VLAN with GOOSE frames, consuming all available bandwidth. Legitimate IED status GOOSE messages cannot reach SCADA or the operator HMI. The substation bay status display freezes while circuit breaker states, measurement values, and alarm conditions continue changing unobserved.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: iec61850
      technique: T0829
      style: protection_block
      count: 50
      interval: 0.005s
      note: GOOSE flood saturating process bus
    - type: pcap
      proto: iec61850
      technique: T0829
      style: protection_block
      count: 50
      interval: 0.005s
      note: Sustain saturation to prevent status reporting
  T0829__loss_of_view__mqtt:
    title: T0829 – Loss of View — MQTT broker disconnect flood
    description: Rapidly connects and disconnects MQTT clients to exhaust the broker's connection handling capacity. When overwhelmed, the broker drops legitimate subscriber connections — SCADA clients subscribed to sensor topics stop receiving telemetry updates, producing a loss of view of all MQTT-connected field devices.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: mqtt
      technique: T0829
      style: publish_dos
      count: 30
      interval: 0.05s
      note: MQTT message flood to exhaust broker capacity
    - type: pcap
      proto: mqtt
      technique: T0829
      style: publish_dos
      count: 30
      interval: 0.05s
      note: Sustain flood to maintain broker overload
  T0829__loss_of_view__profinet_dcp:
    title: T0829 – Loss of View — PROFINET DCP multicast flood
    description: Floods the PROFINET segment with DCP Identify-All multicasts at high rate. IO devices consume CPU cycles processing the flood instead of updating their cyclic process image. The IO controller reads stale data; the operator HMI displays frozen values while physical process variables change.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0829
      style: identify
      count: 50
      interval: 0.01s
      note: DCP multicast flood blocking IO cyclic updates
    - type: pcap
      proto: profinet_dcp
      technique: T0829
      style: identify
      count: 50
      interval: 0.01s
      note: Sustain flood to maintain stale HMI data
  T0880__loss_of_safety__opcua:
    title: T0880 – Loss of Safety — OPC UA safety function disable
    description: Writes to OPC UA safety-related nodes to disable or bypass a safety instrumented function. Some OPC UA-connected safety PLCs expose safety function enable/bypass flags as writable Variable nodes. Writing FALSE to a safety function enable tag disables the protective shutdown logic, allowing the physical process to run past safe operating limits.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: opcua
      technique: T0880
      style: browse
      count: 1
      interval: 0s
      note: Browse for safety function nodes
    - type: pcap
      proto: opcua
      technique: T0880
      style: write_value
      count: 5
      interval: 1s
      note: Write safety bypass to disable SIS function
  T0880__loss_of_safety__iec61850:
    title: T0880 – Loss of Safety — IEC 61850 protection relay injection
    description: Injects GOOSE frames that cause protection relays to enter a state where they cannot execute their protective trip function. By flooding with high-priority GOOSE at a stable stNum, the protection relay's receive buffer is saturated — when a real fault occurs, the legitimate trip GOOSE cannot be processed within the 4ms protection window.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: iec61850
      technique: T0880
      style: protection_block
      count: 30
      interval: 0.01s
      note: GOOSE flood blocking protection relay trip processing
    - type: pcap
      proto: iec61850
      technique: T0880
      style: trip_inject
      count: 3
      interval: 0.5s
      note: Inject false trip to verify relay is unresponsive
  T0880__loss_of_safety__bacnet:
    title: T0880 – Loss of Safety — BACnet fire/safety system command override
    description: Writes to BACnet Binary Output objects controlling fire suppression, emergency ventilation, or safety system outputs. Building safety systems commonly use BACnet for integration — any BACnet client can issue WriteProperty with priority 3 (Life Safety) to override safety outputs, disabling suppression systems or forcing emergency equipment offline.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: bacnet
      technique: T0880
      style: write_property
      count: 5
      interval: 1s
      note: Write to safety system BACnet output at priority 3
    - type: pcap
      proto: bacnet
      technique: T0880
      style: device_comm_control
      count: 1
      interval: 2s
      note: Disable safety controller communications
  T0880__loss_of_safety__profinet_dcp:
    title: T0880 – Loss of Safety — PROFINET safety IO device takeover
    description: Targets PROFINET-connected safety I/O modules (e.g. Siemens ET 200SP F-modules, Pilz PSSuniversal) with DCP Factory Reset. Safety-rated IO modules in the unconfigured state disable all F-I/O channels and force safe state. The safety PLC loses its safety-rated I/O and cannot execute protective shutdown functions, causing loss of the process safety instrumented function.
    tactic: Impact
    technique: T0880
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0880
      style: factory_reset
      count: 1
      interval: 0s
      note: Factory reset safety I/O modules to disable protective functions
    - type: pcap
      proto: profinet_dcp
      technique: T0880
      style: set_name
      count: 1
      interval: 2s
      note: Redirect safety controller naming to prevent reconfiguration
    - type: pcap
      proto: profinet_dcp
      technique: T0880
      style: identify
      count: 3
      interval: 5s
      note: Confirm safety I/O modules in unconfigured/unsafe state
  T0889__modify_program__dnp3:
    title: T0889 – Modify Program — DNP3 configuration file write
    description: Uses DNP3 file transfer services to upload a modified configuration file to an RTU that supports file-based programming. Modified configuration can change point class assignments, setpoint limits, control output mappings, and communication parameters — persisting attacker-defined behaviour across power cycles.
    tactic: Persistence
    technique: T0889
    steps:
    - type: pcap
      proto: dnp3
      technique: T0889
      style: file_open
      count: 1
      interval: 0s
      note: Open DNP3 file session for config write
    - type: pcap
      proto: dnp3
      technique: T0889
      style: direct_operate
      count: 5
      interval: 0.5s
      note: Write modified configuration blocks
    - type: pcap
      proto: dnp3
      technique: T0889
      style: warm_restart
      count: 1
      interval: 3s
      note: Warm restart to activate modified configuration
  T0889__modify_program__iec104:
    title: T0889 – Modify Program — IEC-104 setpoint persistence
    description: Writes modified setpoint values via IEC-104 that persist in non-volatile RTU memory. Many RTUs store C_SE (setpoint command) values persistently so they survive power cycles. An attacker can write permanently altered setpoints — control thresholds, alarm limits, PID parameters — that remain active after any restart until a human operator resets them.
    tactic: Persistence
    technique: T0889
    steps:
    - type: pcap
      proto: iec104
      technique: T0889
      style: setpoint_float
      count: 5
      interval: 1s
      note: Write persistent setpoints via C_SE_NC_1
    - type: pcap
      proto: iec104
      technique: T0889
      style: setpoint_scale
      count: 5
      interval: 1s
      note: Write scaled integer setpoints via C_SE_NB_1
    - type: pcap
      proto: iec104
      technique: T0889
      style: reset_process
      count: 1
      interval: 5s
      note: Reset process to verify setpoints survive restart
  T0889__modify_program__iec61850:
    title: T0889 – Modify Program — IEC 61850 GOOSE configuration injection
    description: Injects GOOSE frames with modified confRev (configuration revision) and dataset reference, causing subscribing IEDs to update their internal dataset binding to the attacker's modified configuration. Some IEDs store accepted GOOSE configurations persistently — the modified binding survives power cycles until the IED is manually reconfigured.
    tactic: Persistence
    technique: T0889
    steps:
    - type: pcap
      proto: iec61850
      technique: T0889
      style: relay_inject
      count: 5
      interval: 0.5s
      note: Inject GOOSE with modified confRev to update IED config
    - type: pcap
      proto: iec61850
      technique: T0889
      style: relay_inject
      count: 5
      interval: 2s
      note: Persist modified configuration via keep-alive
  T0889__modify_program__modbus:
    title: T0889 – Modify Program — Modbus persistent register write
    description: Writes attacker-controlled values to Modbus holding registers that the PLC stores in non-volatile memory (NVRAM). These include setpoints, calibration constants, and alarm thresholds. After a power cycle or watchdog restart, the PLC reloads from NVRAM — the attacker's values are restored, providing persistent modification without re-exploitation.
    tactic: Persistence
    technique: T0889
    steps:
    - type: pcap
      proto: modbus
      technique: T0889
      style: write_multiple_registers
      count: 5
      interval: 0.5s
      note: Write persistent setpoints to NVRAM-backed registers
    - type: pcap
      proto: modbus
      technique: T0889
      style: write_single_register
      count: 5
      interval: 1s
      note: Write individual threshold registers for persistence
  T0889__modify_program__profinet_dcp:
    title: T0889 – Modify Program — PROFINET DCP station name persistence
    description: Changes a PROFINET IO device's station name to one that matches an attacker-controlled device. The station name is stored in non-volatile flash and survives power cycles. On next startup, the IO controller connects to whichever device has the target station name — if the real device is offline, the attacker's device is connected instead.
    tactic: Persistence
    technique: T0889
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0889
      style: set_name
      count: 1
      interval: 0s
      note: Set persistent station name for next-boot takeover
    - type: pcap
      proto: profinet_dcp
      technique: T0889
      style: identify
      count: 3
      interval: 2s
      note: Verify name change persisted in device flash
  T0800__fw_update_mode__dnp3:
    title: T0800 – Activate Firmware Update Mode — DNP3 warm restart for firmware window
    description: Sends DNP3 Warm Restart (FC 14) to an outstation immediately followed by file transfer commands during the restart window. Some RTUs enter a firmware update window during warm restart if they detect incoming file transfer traffic — the attacker uses this window to begin a firmware upload before normal operation resumes.
    tactic: Inhibit Response Function
    technique: T0800
    steps:
    - type: pcap
      proto: dnp3
      technique: T0800
      style: warm_restart
      count: 1
      interval: 0s
      note: Warm Restart to trigger firmware update window
    - type: pcap
      proto: dnp3
      technique: T0800
      style: file_open
      count: 3
      interval: 1s
      note: Open file transfer during restart window
  T0800__fw_update_mode__iec104:
    title: T0800 – Activate Firmware Update Mode — IEC-104 reset process for update mode
    description: Sends IEC-104 Reset Process (C_RP_NA_1) to force an RTU into restart, creating the firmware update window used by ABB and Siemens RTUs. During restart the device enters an unconfigured state that accepts firmware images via the engineering tool channel. STOPDT halts data transfer to prevent interference during the update window.
    tactic: Inhibit Response Function
    technique: T0800
    steps:
    - type: pcap
      proto: iec104
      technique: T0800
      style: reset_process
      count: 1
      interval: 0s
      note: 'C_RP_NA_1: reset RTU to open firmware update window'
    - type: pcap
      proto: iec104
      technique: T0800
      style: stopdt
      count: 1
      interval: 2s
      note: 'STOPDT: halt data transfer during firmware window'
    - type: pcap
      proto: iec104
      technique: T0800
      style: available
      count: 3
      interval: 5s
      note: Monitor STARTDT to detect device re-initialization
  T0800__fw_update_mode__modbus:
    title: T0800 – Activate Firmware Update Mode — Modbus diagnostic restart
    description: Sends Modbus FC08 Diagnostic with Sub-Function 04 (Force Listen Only Mode) to halt the slave's ability to process any commands. This is the Modbus equivalent of firmware update mode — the slave stops all application processing and waits for a restart. Used in conjunction with vendor-specific firmware delivery tools that target the device during this halt state.
    tactic: Inhibit Response Function
    technique: T0800
    steps:
    - type: pcap
      proto: modbus
      technique: T0800
