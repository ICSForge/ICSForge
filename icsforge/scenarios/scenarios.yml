  T0819__exploit_public__enip_malformed_ucmm:
    title: 'T0819 – Exploit Public-Facing Application: malformed EtherNet/IP UCMM'
    description: 'Sends a malformed CIP path with invalid segment type to the unconnected messaging manager. Targets Allen-Bradley buffer handling vulnerabilities observable as UCMM requests with oversized or malformed path segments on port 44818.

      '
