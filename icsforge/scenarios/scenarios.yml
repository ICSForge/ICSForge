      style: list_identity
      count: 5
      interval: 0.3s
      note: Enumerate EtherNet/IP devices for lateral pivot targets
    - type: pcap
      proto: enip
      technique: T0886
      style: read_tag
      count: 10
      interval: 0.3s
      note: Access OT devices via lateral EtherNet/IP sessions
    - type: pcap
      proto: enip
      technique: T0886
      style: write_tag
      count: 5
      interval: 1s
      note: Execute actions via legitimate EtherNet/IP service
  T0886__remote_services__iec104:
    title: T0886 – Remote Services — IEC-104 as lateral movement vector
    description: Uses IEC-104 master-RTU sessions to move laterally through the substation communication network. SCADA workstations and control servers with IEC-104 master access reach all RTUs in the substation hierarchy. A compromised SCADA workstation uses its legitimate IEC-104 master credentials to reach all RTUs as a lateral movement path.
    tactic: Lateral Movement
    technique: T0886
    steps:
    - type: pcap
      proto: iec104
      technique: T0886
      style: interrogation
      count: 1
      interval: 1s
      note: Use IEC-104 master session for lateral OT access
    - type: pcap
      proto: iec104
      technique: T0886
      style: single_command
      count: 5
      interval: 1s
      note: Execute commands via lateral IEC-104 pivot
  T0886__remote_services__iec61850:
    title: T0886 – Remote Services — IEC 61850 GOOSE as lateral movement vector
    description: From inside the process bus VLAN (reached by lateral movement through a compromised bay controller or engineering laptop), uses IEC 61850 GOOSE to interact with protection IEDs. GOOSE on the process bus VLAN is accessible to any device on that VLAN — a compromised device acts as a GOOSE publisher to control all subscribed IEDs.
    tactic: Lateral Movement
    technique: T0886
    steps:
    - type: pcap
      proto: iec61850
      technique: T0886
      style: enumerate_ied
      count: 5
      interval: 0.2s
      note: Map IEDs accessible via process bus lateral access
    - type: pcap
      proto: iec61850
      technique: T0886
      style: relay_inject
      count: 5
      interval: 1s
      note: Control IEDs using lateral GOOSE publisher access
  T0886__remote_services__modbus:
    title: T0886 – Remote Services — Modbus as lateral movement vector
    description: Uses Modbus/TCP sessions to move laterally from a compromised OT workstation to PLCs and field devices throughout the Modbus network. Any device with TCP/502 access reaches all Modbus slaves — a compromised historian or HMI uses this legitimate service to read configuration data and issue control commands across the OT network.
    tactic: Lateral Movement
    technique: T0886
    steps:
    - type: pcap
      proto: modbus
      technique: T0886
      style: read_holding
      count: 10
      interval: 0.3s
      note: Use Modbus service for lateral OT network access
    - type: pcap
      proto: modbus
      technique: T0886
      style: write_multiple_registers
      count: 5
      interval: 1s
      note: Execute actions via legitimate lateral Modbus sessions
  T0886__remote_services__mqtt:
    title: T0886 – Remote Services — MQTT as lateral movement vector
    description: Uses the MQTT broker as a lateral movement hub — a compromised device connected to the MQTT broker can publish to any topic and subscribe to all telemetry. From one compromised subscriber, the attacker pivots to control all field devices connected to the same broker by publishing to their respective command topics.
    tactic: Lateral Movement
    technique: T0886
    steps:
    - type: pcap
      proto: mqtt
      technique: T0886
      style: subscribe_all
      count: 1
      interval: 0s
      note: Subscribe all topics to map broker-connected devices
    - type: pcap
      proto: mqtt
      technique: T0886
      style: publish_command
