    - type: pcap
      proto: bacnet
      technique: T0881
      style: who_is
      count: 3
      interval: 10s
      note: Confirm device offline during restart period
  T0881__service_stop__opcua_close_sessions:
    title: T0881 – Service Stop — OPC UA session termination flood
    description: Rapidly opens and closes OPC UA sessions to exhaust the server's session management resources. OPC UA servers have bounded session processing capacity; when overwhelmed with session teardown requests, the server's OPC UA endpoint service becomes unresponsive. Legitimate SCADA clients cannot establish new sessions, stopping the OPC UA service.
    tactic: Inhibit Response Function
    technique: T0881
    steps:
    - type: pcap
      proto: opcua
      technique: T0881
      style: close_session
      count: 20
      interval: 0.1s
      note: Rapid session open/close to exhaust OPC UA service
    - type: pcap
      proto: opcua
      technique: T0881
      style: open_session
      count: 20
      interval: 0.1s
      note: Continued flood to maintain service disruption
  T0809__data_destruction__modbus_zero_registers:
    title: T0809 – Data Destruction — Modbus zero all holding registers
    description: Writes 0x0000 to all 65,536 holding registers using Modbus Write Multiple Registers (FC16). This destroys all setpoints, alarm thresholds, PID parameters, and configuration data stored in holding registers. The PLC continues executing with zeroed configuration — all process control parameters are lost until manually restored from backup.
    tactic: Inhibit Response Function
    technique: T0809
    steps:
    - type: pcap
      proto: modbus
      technique: T0809
      style: zero_all
      count: 10
      interval: 0.1s
      note: Zero all holding registers (destroy configuration)
  T0809__data_destruction__dnp3_clear_events:
    title: T0809 – Data Destruction — DNP3 clear event buffer
    description: Sends DNP3 Clear Restart Bit and then a cold restart to clear the outstation's event buffer. DNP3 outstations store historical events (Class 1/2/3) in a non-volatile event buffer for retrieval by the SCADA. Clearing this buffer destroys the historical record of process events, preventing post-incident forensic analysis and audit trail reconstruction.
    tactic: Inhibit Response Function
    technique: T0809
    steps:
    - type: pcap
      proto: dnp3
      technique: T0809
      style: clear_events
      count: 3
      interval: 1s
      note: Clear DNP3 event buffer (destroy event history)
    - type: pcap
      proto: dnp3
      technique: T0809
      style: cold_restart
      count: 1
      interval: 5s
      note: Cold restart to wipe volatile event queue
  T0809__data_destruction__enip_reset:
    title: T0809 – Data Destruction — EtherNet/IP device factory reset
    description: Sends a CIP Reset service (service 0x05 on Identity Object) to perform a type-2 reset that clears all user configuration. This erases the ControlLogix program, I/O configuration, tag database, and communication settings stored in the PLC. The device reverts to factory defaults, destroying all operational configuration and requiring complete reprogramming.
    tactic: Inhibit Response Function
    technique: T0809
    steps:
    - type: pcap
      proto: enip
      technique: T0809
      style: reset_device
      count: 1
      interval: 0s
      note: 'CIP Reset type-2: erase all device configuration'
    - type: pcap
      proto: enip
      technique: T0809
      style: list_identity
      count: 3
      interval: 10s
      note: Confirm device in factory state post-reset
  T0843__program_download__dnp3_file_transfer:
    title: T0843 – Program Download — DNP3 file transfer for script injection
    description: Uses DNP3 file transfer services (FC 25 Open File, FC 29 Write File) to upload a modified script or configuration file to an RTU that supports file-based programming. Some Modicon, SEL, and GE RTUs support configuration downloads via DNP3 file transfer — the attacker uploads a modified configuration that changes setpoints, alarm thresholds, or control logic.
    tactic: Lateral Movement
    technique: T0843
    steps:
    - type: pcap
      proto: dnp3
      technique: T0843
      style: file_open
      count: 1
      interval: 0s
      note: Open file transfer session on RTU
    - type: pcap
      proto: dnp3
      technique: T0843
      style: direct_operate
      count: 5
      interval: 0.5s
      note: Write modified configuration blocks
  T0843__program_download__enip_firmware:
    title: T0843 – Program Download — EtherNet/IP firmware/program download
    description: Uses CIP path to initiate a firmware or program download to a ControlLogix PLC. The EtherNet/IP boot_firmware service uploads a modified binary image to the controller. The modified image may contain altered ladder logic, modified safety interlocks, or hidden control routines that execute alongside the legitimate programme.
    tactic: Lateral Movement
    technique: T0843
    steps:
    - type: pcap
      proto: enip
