  T0800__fw_update_mode__mqtt:
    title: T0800 – Activate Firmware Update Mode — MQTT OTA firmware update trigger
    description: Publishes a firmware update initiation command to the OTA (Over-The-Air) update topic of an MQTT-connected field device or gateway. IoT/ICS devices commonly subscribe to an OTA command topic for remote firmware updates. An attacker can trigger update mode by publishing a crafted OTA command, causing the device to halt normal operation and wait for a firmware image from an attacker-controlled server.
    tactic: Inhibit Response Function
    technique: T0800
    steps:
