      count: 2
      interval: 0.3s
  T0805__block_serial__modbus_gateway_flood:
    title: T0805 – Block serial COM via Modbus RTU gateway flood
    description: 'Floods the Modbus TCP gateway (port 502) that bridges to a serial RTU network. The gateway queue fills, serial transmission stalls, and RTU devices on the serial bus become unreachable.
      Observable as max-rate FC03/FC16 bursts from unexpected source.

      '
    steps:
    - type: pcap
      proto: modbus
      technique: T0805
      style: dos_read
      count: 50
      interval: 0.01s
    - type: pcap
      proto: modbus
      technique: T0805
      style: channel_flood
      count: 30
      interval: 0.01s
  T0807__cli__opcua_method_shell:
    title: T0807 – Command-Line Interface via OPC UA method call with script argument
    description: 'Invokes an OPC UA server method with a shell command as the argument. Some OPC UA servers (particularly on Windows HMIs) expose methods that execute operating system commands. Observable
      as unusual CallRequest with string arguments on port 4840.

      '
    steps:
