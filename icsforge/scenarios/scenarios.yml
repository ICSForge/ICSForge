  T0819__exploit_public__modbus:
    title: T0819 – Exploit Public-Facing Application — Modbus function code fuzzing
    description: Sends Modbus requests with reserved or implementation-specific function codes (FC65-FC72, FC100-FC110) and oversized data payloads to probe for undocumented functionality or parsing vulnerabilities. Internet-exposed Modbus slaves running older firmware may have insufficient validation for out-of-spec function codes, exposing vendor-specific attack surfaces.
