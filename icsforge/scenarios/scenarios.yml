    - type: pcap
      proto: opcua
      technique: T0846
      style: get_endpoints
      count: 5
      interval: 0.3s
      note: 'GetEndpoints: detailed server version and capabilities'
  T0889__modify_program__s7comm:
    title: T0889 – Modify Program — S7comm OB1 programme modification
    description: Downloads a modified Organisation Block 1 (OB1 — the main cyclic scan) to a Siemens S7 PLC. OB1 is executed on every scan cycle; inserting a hidden function block into OB1 provides persistent execution of attacker-controlled code on every PLC scan. The modification survives power cycles as it is stored in the PLC's flash memory.
    tactic: Persistence
    technique: T0889
    steps:
    - type: pcap
      proto: s7comm
      technique: T0889
      style: cpu_stop
      count: 1
      interval: 0s
      note: STOP CPU to enable programme modification
    - type: pcap
      proto: s7comm
      technique: T0889
      style: modify_ob1
      count: 1
      interval: 1s
      note: Modify OB1 to insert persistent function block
    - type: pcap
