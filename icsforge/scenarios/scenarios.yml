    - type: pcap
      proto: enip
      technique: T0845
      style: read_tag
      count: 10
      interval: 0.3s
      note: Read all programme tags (upload programme data)
  T0845__program_upload__opcua:
    title: T0845 – Program Upload — OPC UA programme file read
    description: Uses OPC UA FileType node services to read the controller programme file from an OPC UA server that exposes it as a file object. Some IEC 61131-3 runtime environments expose the compiled programme as an OPC UA file for remote backup. The attacker reads the programme binary for offline analysis without triggering any backup or access audit.
