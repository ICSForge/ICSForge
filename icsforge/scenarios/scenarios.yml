      interval: 0.5s
      note: IEC-104 C_DC_NA double command
  T0836__modify_param__opcua_process_write:
    title: T0836 – Modify Parameter — OPC UA process variable modification
    description: 'Writes to OPC UA nodes representing process parameters: PID setpoints, analog output references, threshold values, and configuration nodes. The server applies the written values directly to the underlying process.'
    tactic: Impair Process Control
    technique: T0836
