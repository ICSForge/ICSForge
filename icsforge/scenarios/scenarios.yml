      count: 3
      interval: 1s
      note: Bypass or replace authentication credentials
  T0892__change_credential__enip:
    title: T0892 – Change Credential — EtherNet/IP device password write
    description: Uses CIP Set_Attribute services to write a new password to a ControlLogix or MicroLogix controller's security object. PLCs with minimal access control allow any EtherNet/IP client to modify the device password, locking out the legitimate engineering workstation and SCADA system from making programme changes.
    tactic: Inhibit Response Function
    technique: T0892
