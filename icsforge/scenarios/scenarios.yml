    - type: pcap
      proto: enip
      technique: T0843
      style: boot_firmware
      count: 3
      interval: 2s
      note: Initiate modified firmware download sequence
  T0843__program_download__opcua_method_call:
    title: T0843 – Program Download — OPC UA method call for programme deploy
    description: Calls an OPC UA Method node (typically under a DeviceSet object) that triggers a programme update on the target PLC. Many OPC UA-connected PLCs expose update methods for remote engineering. An attacker with OPC UA access calls the update method with a path to an attacker-controlled programme file, deploying modified logic without using the engineering workstation or authenticated programming protocol.
    tactic: Lateral Movement
    technique: T0843
    steps:
    - type: pcap
