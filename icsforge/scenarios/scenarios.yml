      count: 1
      interval: 0s
      note: Browse for programme management method nodes
    - type: pcap
      proto: opcua
      technique: T0843
      style: call_method
      count: 3
      interval: 2s
      note: Call programme deploy method with modified logic path
  T0835__manipulate_io__dnp3_direct_operate:
    title: T0835 – Manipulate I/O Image — DNP3 analog output override
    description: Sends DNP3 Direct Operate commands to write specific values to analog and binary output objects. The outstation immediately reflects these values in its output process image, overriding whatever the application logic computed. The physical outputs (relay contacts, 4-20mA loops, digital outputs) are directly controlled by the attacker's values.
    tactic: Inhibit Response Function
    technique: T0835
    steps:
    - type: pcap
      proto: dnp3
      technique: T0835
      style: direct_operate
      count: 5
      interval: 1s
      note: 'Direct Operate: overwrite analog output image'
    - type: pcap
      proto: dnp3
      technique: T0835
      style: operate
      count: 5
      interval: 2s
      note: 'SBO Operate: overwrite binary output image'
  T0835__manipulate_io__enip_assembly:
    title: T0835 – Manipulate I/O Image — EtherNet/IP assembly object write
    description: Writes directly to a ControlLogix I/O assembly object using CIP Forward-Open implicit messaging. The assembly object maps directly to the physical I/O image — overwriting it bypasses the ladder logic scan and directly commands output modules on the next I/O update cycle.
    tactic: Inhibit Response Function
    technique: T0835
    steps:
