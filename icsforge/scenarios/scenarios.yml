  T0811__data_repos__mqtt:
    title: T0811 – Data from Information Repositories — MQTT retained message harvest
    description: Subscribes to all MQTT topics with the wildcard '#', which causes the broker to deliver all retained messages immediately. Retained messages are the last known good value for each topic — effectively a snapshot of the entire ICS/IoT system state. Harvesting all retained messages dumps the current state of every connected field device in one operation.
