  T0885__common_port__bacnet:
    title: T0885 – Commonly Used Port — BACnet on UDP/47808 for traffic blending
    description: Uses BACnet/IP on UDP port 47808 (the standard BACnet port) to blend attack traffic with legitimate building automation polling. Firewalls allowing UDP/47808 for BACnet/IP will pass these frames without inspection. The attacker uses the allowed BACnet port to maintain C2 access to building controllers while appearing as normal BAS polling traffic.
