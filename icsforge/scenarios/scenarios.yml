      technique: T0861
      style: read_counter
      count: 3
      interval: 0.5s
      note: Read all counter data points
  T0861__point_tag_id__enip_tag_enum:
    title: T0861 – Point & Tag Identification — EtherNet/IP tag database read
    description: Uses CIP Get Attribute services to enumerate the ControlLogix tag database. The CIP tag database service (service 0x55 on program object) returns all defined tag names, data types, and dimensions. This exposes the complete variable namespace of the PLC programme — every setpoint, status bit, and process value name and type.
    tactic: Collection
    technique: T0861
    steps:
    - type: pcap
      proto: enip
