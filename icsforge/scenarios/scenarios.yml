      technique: T0877
      style: read_class1
      count: 2
      interval: 0.5s
      note: DNP3 Class 1 event data read
  T0877__io_image__iec104_full_scan:
    title: T0877 – I/O Image — IEC-104 complete process image acquisition
    description: 'Performs IEC 60870-5-104 General Interrogation to acquire the full process image from an RTU: all normalized measurements, scaled values, measured short values, and binary information objects in a single sweep.'
    tactic: Collection
    technique: T0877
    steps:
    - type: pcap
