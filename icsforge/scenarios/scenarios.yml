      technique: T0856
      style: assembly_read
      count: 2
      interval: 0.3s
      note: EIP assembly verify spoof active
  T0888__remote_sys_info__modbus_device_id:
    title: T0888 – Remote System Information Discovery — Modbus Device ID read
    description: 'Reads Modbus Device Identification (FC43/MEI) from each discovered unit ID to extract: vendor name, product code, major/minor version, vendor URL, and product name. Provides complete device inventory for targeting.'
    tactic: Discovery
