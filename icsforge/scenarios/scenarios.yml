  T0802__automated_collection__dnp3:
    title: T0802 – Automated Collection — DNP3 systematic data harvest
    description: Systematically polls all DNP3 Class 1/2/3 event data and analog/binary status at high rate to build a real-time process data snapshot. The attacker's automated collection captures every change-of-value event across all outstation addresses — building a complete operational intelligence picture of the control system's process state.
