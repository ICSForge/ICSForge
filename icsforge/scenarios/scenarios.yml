  T0861__point_tag_id__iec61850:
    title: T0861 – Point & Tag Identification — IEC 61850 GOOSE dataset enumeration
    description: Sends test-mode GOOSE frames with enumerate_ied style to map all IED publishers and their dataset references on the process bus. Each IED's GOOSE subscription configuration reveals its dataset structure — the complete list of data attributes it monitors. This exposes every protection and measurement point in the substation without any MMS session.
    tactic: Collection
    technique: T0861
    steps:
    - type: pcap
      proto: iec61850
      technique: T0861
      style: enumerate_ied
      count: 10
      interval: 0.2s
      note: Probe all IEDs to map dataset structure
    - type: pcap
      proto: iec61850
      technique: T0861
      style: spoof_measurement
      count: 5
      interval: 1s
      note: Read measurement datasets to enumerate analog points
  T0861__point_tag_id__mqtt:
    title: T0861 – Point & Tag Identification — MQTT topic wildcard subscription
    description: Subscribes to the MQTT wildcard topic '#' to receive all messages published to the broker. Every published message reveals a tag name (topic path), its current value, and update frequency. This completely enumerates all process variables exposed via MQTT without any schema or engineering file.
    tactic: Collection
    technique: T0861
    steps:
    - type: pcap
      proto: mqtt
      technique: T0861
      style: subscribe_all
      count: 1
      interval: 0s
      note: Subscribe '#' to enumerate all published topics
    - type: pcap
      proto: mqtt
      technique: T0861
      style: subscribe_telemetry
      count: 3
      interval: 5s
      note: Sustained subscription to collect all tag updates
  T0861__point_tag_id__profinet:
    title: T0861 – Point & Tag Identification — PROFINET DCP device and I/O enumeration
    description: Uses PROFINET DCP Identify-All to enumerate all IO devices and their station names. Combined with Get Name and Get IP requests to each device, this maps the complete PROFINET I/O topology — every IO module, slot, and sub-slot — which corresponds directly to the physical I/O tag list.
    tactic: Collection
    technique: T0861
    steps:
    - type: pcap
      proto: profinet_dcp
