    - type: pcap
      proto: s7comm
      technique: T0861
      style: read_all_dbs
      count: 5
      interval: 0.5s
      note: Read all DBs to enumerate process variable layout
  T0802__automated_collection__iec61850:
    title: T0802 – Automated Collection — IEC 61850 GOOSE continuous monitoring
    description: Passively receives all GOOSE multicast frames on the process bus VLAN, building a continuously updated picture of every protection relay status, measurement value, and breaker position. By monitoring all multicast groups, the attacker automatically collects process state without generating any query traffic.
    tactic: Collection
    technique: T0802
    steps:
    - type: pcap
      proto: iec61850
      technique: T0802
      style: enumerate_ied
      count: 10
      interval: 0.1s
