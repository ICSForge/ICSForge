      count: 5
      interval: 0.5s
      note: Read programme file via OPC UA FileType service
  T0845__program_upload__dnp3:
    title: T0845 – Program Upload — DNP3 configuration file read
    description: Uses DNP3 file transfer (FC 25 Open File, FC 27 Read File) to retrieve the outstation's configuration file. SEL, GE, and Schneider RTUs support DNP3 file transfer for configuration backup. The retrieved configuration reveals all point definitions, setpoints, control logic mappings, and communication parameters — intelligence for targeted attacks.
    tactic: Collection
    technique: T0845
    steps:
    - type: pcap
      proto: dnp3
