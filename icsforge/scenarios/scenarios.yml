  T0821__modify_tasking__iec104:
    title: T0821 – Modify Controller Tasking — IEC-104 process reset modifies tasking
    description: Sends IEC-104 C_RP_NA_1 (Reset Process) which transitions the RTU through initialisation states, resetting its application task configuration. During and after the reset, the RTU's Class 1/2/3 event assignment, unsolicited reporting configuration, and process scan rates may differ from the pre-attack state — the controller's tasking is modified at the application layer.
