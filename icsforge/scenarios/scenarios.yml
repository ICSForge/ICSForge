      technique: T0802
      style: assembly_read
      count: 5
      interval: 0.2s
      note: Read I/O assembly blocks for process state
  T0802__automated_collection__iec104:
    title: T0802 – Automated Collection — IEC-104 continuous interrogation
    description: Sends repeated IEC-104 General Interrogation requests at intervals, combined with subscribing to spontaneous transmissions. This maintains a continuously updated copy of all RTU process data — every measurement, status, and counter value is captured as it changes, providing the attacker with real-time operational intelligence.
    tactic: Collection
