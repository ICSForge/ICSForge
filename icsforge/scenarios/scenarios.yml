  T0803__block_command__profinet:
    title: T0803 – Block Command Message — PROFINET DCP flood blocks IO controller commands
    description: Sends PROFINET DCP Identify-All frames at high rate to the PROFINET multicast address. IO devices must process each DCP frame in their management stack. When CPU cycles are consumed processing DCP floods, the cyclic I/O data exchange with the IO controller is delayed or dropped — the controller's output command data does not reach the physical I/O modules. DCP floods are documented in PROFINET security research as a viable command-blocking vector.
    tactic: Inhibit Response Function
    technique: T0803
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0803
      style: identify
      count: 50
      interval: 0.01s
      note: DCP flood consuming IO device CPU, blocking cyclic command data
    - type: pcap
      proto: profinet_dcp
      technique: T0803
      style: identify
      count: 50
      interval: 0.01s
      note: Sustain flood to maintain command block
  T0804__block_reporting__bacnet:
    title: T0804 – Block Reporting Message — BACnet Device Communication Control
    description: Sends BACnet Device Communication Control (service 17) with a disable duration to put target devices into communication-disabled mode. Devices in this mode stop responding to all Who-Is broadcasts and ReadProperty requests — the SCADA system receives no BACnet data and the operator's view of all BACnet points goes stale. Device Communication Control requires no authentication in many BACnet implementations.
    tactic: Inhibit Response Function
    technique: T0804
    steps:
    - type: pcap
      proto: bacnet
      technique: T0804
      style: device_comm_control
      count: 1
      interval: 0s
      note: 'Device Communication Control: disable BACnet reporting'
    - type: pcap
      proto: bacnet
      technique: T0804
      style: who_is
      count: 3
      interval: 30s
      note: Probe to confirm device not responding (reporting blocked)
  T0804__block_reporting__iec104:
    title: T0804 – Block Reporting Message — IEC-104 STOPDT halts spontaneous reporting
    description: Sends IEC-104 STOPDT (Stop Data Transfer) to terminate the RTU's active data transfer state. In STOPDT state the RTU stops sending spontaneous messages (TypeID 3 M_DP_NA_1, TypeID 13 M_ME_NC_1 etc.) — all unsolicited event reports are blocked. The SCADA master sees no new data from the RTU until it sends STARTDT, which an attacker controlling the session can prevent.
    tactic: Inhibit Response Function
    technique: T0804
    steps:
    - type: pcap
      proto: iec104
      technique: T0804
      style: stopdt
      count: 1
      interval: 0s
      note: 'STOPDT: halt RTU spontaneous reporting'
    - type: pcap
      proto: iec104
      technique: T0804
      style: inhibit_alarm
      count: 3
      interval: 5s
      note: Inhibit alarm reporting to prevent operator notification
    - type: pcap
      proto: iec104
      technique: T0804
      style: testfr
      count: 3
      interval: 10s
      note: TESTFR keep-alive to hold session without restarting data
  T0804__block_reporting__opcua:
    title: T0804 – Block Reporting Message — OPC UA subscription deletion
    description: Deletes all active OPC UA subscriptions on the server. SCADA historians and HMI clients receive process data via subscriptions — when these are deleted the server stops publishing data changes to all subscribers. The historian recording stops and the operator HMI displays the last-known values. An attacker with write access to the server can delete subscriptions belonging to other sessions, blocking all reporting without closing those sessions.
    tactic: Inhibit Response Function
    technique: T0804
    steps:
    - type: pcap
      proto: opcua
      technique: T0804
      style: delete_sub
      count: 5
      interval: 0.5s
      note: Delete all active subscriptions to stop data reporting
    - type: pcap
      proto: opcua
      technique: T0804
      style: close_session
      count: 3
      interval: 2s
      note: Close historian sessions to prevent subscription recreation
  T0804__block_reporting__profinet:
    title: T0804 – Block Reporting Message — PROFINET DCP factory reset stops IO reporting
    description: Sends DCP Factory Reset to PROFINET IO devices, forcing them into unconfigured state. In this state devices stop cyclic I/O data exchange with the IO controller — the controller receives no input data from physical sensors or actuator feedback. The PLC's input process image freezes at last-known values and the SCADA historian stops receiving updated process data, blocking all field reporting.
    tactic: Inhibit Response Function
    technique: T0804
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0804
      style: factory_reset
      count: 1
      interval: 0s
      note: 'Factory reset: stop all IO device cyclic reporting'
    - type: pcap
      proto: profinet_dcp
      technique: T0804
      style: identify
      count: 3
      interval: 10s
      note: Confirm device in unconfigured state (reporting stopped)
  T0804__block_reporting__s7comm:
    title: T0804 – Block Reporting Message — S7comm CPU stop halts all process reporting
    description: Sends S7comm CPU Stop to the PLC, halting programme execution. A stopped PLC no longer updates its output process image or responds to data read requests from WinCC or other SCADA clients. The historian receives no new data, OPC DA/UA servers report stale values, and all SCADA reporting from the PLC stops. This is the most complete form of block reporting available on S7 networks.
    tactic: Inhibit Response Function
    technique: T0804
    steps:
    - type: pcap
      proto: s7comm
      technique: T0804
      style: setup
      count: 1
      interval: 0s
      note: Establish S7comm session with the PLC
    - type: pcap
      proto: s7comm
      technique: T0804
      style: cpu_stop
      count: 1
      interval: 1s
      note: 'CPU Stop: halt programme execution and freeze process image'
    - type: pcap
      proto: s7comm
      technique: T0804
      style: szl_read
      count: 3
      interval: 5s
      note: Read CPU state to confirm stopped (reporting blocked)
  T0815__denial_of_view__modbus_flood:
    title: T0815 – Denial of View — Modbus read flood saturates slave polling
    description: Sends high-rate Modbus FC03 read requests to saturate the slave's TCP receive buffer and processing queue. The Modbus slave processes requests serially — when overwhelmed by the attacker's reads, legitimate SCADA polling requests are delayed or dropped. The SCADA master's data request timeouts cause the HMI to display stale or communication-fault indicators for all Modbus points, denying the operator an accurate view of process state.
    tactic: Impact
    technique: T0815
    steps:
    - type: pcap
      proto: modbus
      technique: T0815
      style: dos_read
      count: 50
      interval: 0.01s
      note: High-rate FC03 flood saturating slave polling queue
    - type: pcap
      proto: modbus
      technique: T0815
      style: dos_read
      count: 50
      interval: 0.01s
      note: Sustain to maintain stale HMI data (denial of view)
  T0815__denial_of_view__s7comm_flood:
    title: T0815 – Denial of View — S7comm read flood prevents SCADA polling
    description: Sends high-rate S7comm Read All DBs requests to the PLC, consuming its communication processor capacity. S7 PLCs have a fixed communication job queue — when saturated by attacker reads, legitimate WinCC and OPC DA server polling requests are queued indefinitely. WinCC displays stale values and eventually raises communication alarms, denying operators an accurate view of the process while the PLC continues running normally.
    tactic: Impact
    technique: T0815
    steps:
    - type: pcap
      proto: s7comm
      technique: T0815
      style: read_all_dbs
      count: 50
      interval: 0.02s
      note: Saturate S7comm communication processor with read requests
    - type: pcap
      proto: s7comm
      technique: T0815
      style: read_all_dbs
      count: 50
      interval: 0.02s
      note: Sustain to hold SCADA polling in timeout state
  T0821__modify_tasking__bacnet:
    title: T0821 – Modify Controller Tasking — BACnet commandable object reprogramming
    description: Writes to BACnet programmable objects — Schedule objects (TypeID 17), Calendar objects (TypeID 6), and Trend Log objects — to modify the controller's tasking schedule. Schedule objects control when outputs are enabled and at what values. Reprogramming a Schedule object changes what the controller does and when, without uploading a new programme — the schedule IS the tasking logic for building automation controllers.
    tactic: Execution
    technique: T0821
    steps:
    - type: pcap
      proto: bacnet
      technique: T0821
      style: read_property_multi
      count: 1
      interval: 0s
      note: Read Schedule and Calendar objects to understand current tasking
    - type: pcap
      proto: bacnet
      technique: T0821
      style: write_property
      count: 5
      interval: 0.5s
      note: Write modified Schedule object entries to change controller tasking
    - type: pcap
      proto: bacnet
      technique: T0821
      style: write_property_multi
      count: 3
      interval: 1s
      note: Update multiple output assignments to activate modified tasking
  T0821__modify_tasking__iec61850:
    title: T0821 – Modify Controller Tasking — IEC 61850 GOOSE confRev manipulation
    description: Injects GOOSE frames with a modified confRev (configuration revision) field and altered dataset references. IEDs that accept a new confRev update their internal dataset binding — changing which data attributes trigger their protection and control functions. This modifies the IED's logical tasking (what it monitors and acts on) without uploading a new firmware or configuration file via MMS.
    tactic: Execution
    technique: T0821
    steps:
    - type: pcap
      proto: iec61850
      technique: T0821
      style: enumerate_ied
      count: 3
      interval: 0.3s
      note: Enumerate IED GOOSE configuration for targeting
    - type: pcap
      proto: iec61850
      technique: T0821
      style: relay_inject
      count: 5
      interval: 0.5s
      note: Inject modified confRev to alter IED dataset binding
    - type: pcap
      proto: iec61850
      technique: T0821
      style: relay_inject
      count: 5
      interval: 1s
      note: Sustain injection to confirm IED accepted new tasking
  T0821__modify_tasking__profinet:
    title: T0821 – Modify Controller Tasking — PROFINET DCP name redirect re-tasks IO controller
    description: Changes a PROFINET IO device's station name via DCP Set Name. The IO controller identifies IO devices by station name and maps them to specific slots in its hardware configuration. By changing an IO device's name the attacker causes the controller to lose its association with that device and re-map its I/O assignment — effectively modifying which physical I/O the controller tasks to each programme address without changing the programme code.
    tactic: Execution
    technique: T0821
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0821
      style: identify
      count: 3
      interval: 0.3s
      note: Identify IO devices and their current station names
    - type: pcap
      proto: profinet_dcp
      technique: T0821
      style: set_name
      count: 1
      interval: 1s
      note: Set modified station name to re-task IO controller mapping
    - type: pcap
      proto: profinet_dcp
      technique: T0821
      style: identify
      count: 3
      interval: 5s
      note: Verify IO controller has remapped tasking to new device name
  T0832__manipulation_of_view__profinet:
    title: T0832 – Manipulation of View — PROFINET DCP station name spoof
    description: Changes a PROFINET IO device's station name to that of a different device in the engineering project. The IO controller, which maps station names to hardware slots, connects to the wrong device and reads its I/O data as if it were the intended device. The SCADA operator sees measurements from a different physical location than the label on their HMI indicates — a manipulation of the operator's view of the process.
    tactic: Impact
    technique: T0832
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0832
      style: identify
      count: 3
      interval: 0.3s
      note: Identify IO devices to select target for name swap
    - type: pcap
      proto: profinet_dcp
      technique: T0832
      style: set_name
      count: 1
      interval: 1s
      note: Set target device name to a different device's station name
    - type: pcap
      proto: profinet_dcp
      technique: T0832
      style: get_name
      count: 3
      interval: 3s
      note: Confirm operator will see misattributed device data
