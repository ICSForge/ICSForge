      count: 10
      interval: 0.5s
      note: Read process data as if legitimate remote engineer
  T0822__external_remote__s7comm:
    title: T0822 – External Remote Services — S7comm via remote access
    description: Uses a remote access service (Siemens teleservice, VPN, or internet-exposed port 102) to access S7 PLCs from outside the OT network. Once connected, normal S7comm sessions are established — setup, SZL-Read, DB-Read — indistinguishable from legitimate remote engineering access from a Siemens TIA Portal or Step 7 workstation.
