    description: Sends DNP3 frames with malformed application layer headers targeting known vulnerability classes in RTU firmware. Oversized object headers, invalid function codes, and malformed multi-fragment requests trigger error handling paths in the DNP3 stack. Internet-exposed RTUs running old firmware are susceptible to these CVE-class vulnerabilities.
