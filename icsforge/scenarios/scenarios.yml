    - type: pcap
      proto: dnp3
      technique: T0891
      style: direct_operate
      count: 5
      interval: 1s
      note: Direct Operate using hardcoded null credentials
  T0891__hardcoded_creds__enip:
    title: T0891 – Hardcoded Credentials — EtherNet/IP default device auth
    description: Uses the hardcoded default credential (empty password) in Allen-Bradley PLCs and I/O modules to establish a CIP session. Many ControlLogix and MicroLogix devices ship with authentication disabled or with a blank password. The attacker uses this hardcoded credential to gain full read/write access to the controller.
    tactic: Lateral Movement
    technique: T0891
    steps:
    - type: pcap
      proto: enip
      technique: T0891
      style: default_auth
      count: 3
      interval: 0.5s
      note: Authenticate with hardcoded blank password
    - type: pcap
      proto: enip
      technique: T0891
      style: write_tag
      count: 5
      interval: 1s
      note: Write process tags using hardcoded credential access
  T0891__hardcoded_creds__iec104:
    title: T0891 – Hardcoded Credentials — IEC-104 no authentication (default)
    description: IEC-104 in its standard unauthenticated configuration uses the IP address as the sole 'credential' — any device that can reach TCP port 2404 is accepted as a master station. The hardcoded credential is the IP whitelist bypass. This scenario exploits the default IEC-104 deployment where no IEC 62351-5 authentication is configured.
    tactic: Lateral Movement
    technique: T0891
    steps:
    - type: pcap
