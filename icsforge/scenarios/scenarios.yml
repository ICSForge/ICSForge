  T0806__brute_force_io__bacnet:
    title: T0806 – Brute Force I/O — BACnet rapid commandable object cycling
    description: Writes rapidly alternating values to BACnet commandable Binary Output and Analog Output objects at high priority, cycling them through all possible states. Physical equipment (HVAC dampers, fans, valves, lighting relays) responds to each intermediate state command — rapid cycling between 0 and full-scale causes actuator wear and process instability.
