      count: 8
      interval: 0.1s
  T0812__default_creds__enip_unauthenticated:
    title: 'T0812 – Default Credentials: EtherNet/IP unauthenticated session'
    description: 'EtherNet/IP has no session-layer authentication by default. Registers a session and immediately accesses CIP objects. Demonstrates that Allen-Bradley PLCs accept connections without any credential challenge when ACL is not configured.

      '
