  T0806__brute_force_io__iec104:
    title: T0806 – Brute Force I/O — IEC-104 rapid command cycling
    description: Sends IEC-104 Single Command (C_SC_NA_1) and Double Command (C_DC_NA_1) in rapid succession, cycling connected actuators between ON and OFF. Each command is immediately applied by the RTU — circuit breaker contacts, valve actuators, and pump contactors cycle at the IEC-104 command rate, causing mechanical wear and process disruption.
