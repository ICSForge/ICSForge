  T0819__exploit_public__iec61850:
    title: T0819 – Exploit Public-Facing Application — IEC 61850 GOOSE malformed frames
    description: Sends malformed GOOSE frames with invalid BER encoding, oversized allData fields, and invalid confRev values to probe IED firmware for parsing vulnerabilities. IEDs exposed on process bus segments reachable from corporate networks are susceptible. Malformed BER length fields can trigger buffer overflows in IED GOOSE parsing stacks.
