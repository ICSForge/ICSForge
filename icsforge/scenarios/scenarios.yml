    description: Writes rapidly cycling values to OPC UA process variable nodes that map to physical outputs — setpoints, command words, and analogue output nodes. The OPC UA server applies each write to the underlying process image on receipt. Rapid cycling drives connected actuators through the full output range continuously, causing process instability.
