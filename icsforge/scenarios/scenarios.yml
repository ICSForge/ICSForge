      note: Publish on device topics with default credentials
  T0891__hardcoded_creds__profinet:
    title: T0891 – Hardcoded Credentials — PROFINET DCP no authentication
    description: PROFINET DCP operates at Layer 2 with no authentication. Any device that can send Ethernet frames with EtherType 0x8892 can issue Set Name, Set IP, and Factory Reset commands to any IO device on the segment. The 'credential' is physical or VLAN access — a hardcoded design choice in the PROFINET standard that applies to all DCP implementations.
