    description: Sends IEC-104 APDUs with oversized or invalid information object addresses and malformed COT (Cause of Transmission) fields. RTU implementations exposed on TCP port 2404 often have insufficient input validation. Malformed APDUs trigger error handling that can expose memory corruption vulnerabilities in production RTU firmware.
