  T0836__modify_param__dnp3_direct_operate:
    title: T0836 – Modify Parameter — DNP3 Direct Operate control block
    description: Sends DNP3 Direct Operate (FC03) to write directly to control relay output blocks and analog output blocks, bypassing the select-before-operate safety interlock. Modifies setpoints, ramp rates, and output values in field devices.
    tactic: Impair Process Control
