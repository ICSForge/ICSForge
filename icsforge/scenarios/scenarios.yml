  T0839__module_firmware__iec104:
    title: T0839 – Module Firmware — IEC-104 private type firmware command
    description: Sends IEC-104 Private Information Objects (type ID 200+) with firmware update payload to an RTU that supports vendor-specific update commands. Several RTU vendors implement firmware update via private type IDs in their IEC-104 implementation. The attacker exploits this to trigger a firmware update from an attacker-controlled source address.
    tactic: Impair Process Control
    technique: T0839
    steps:
