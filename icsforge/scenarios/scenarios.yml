  T0806__brute_force_io__mqtt:
    title: T0806 – Brute Force I/O — MQTT rapid setpoint sweep
    description: Publishes rapidly alternating setpoint values to field controller command topics, sweeping the full engineering range. Controllers that apply MQTT-received setpoints to their output process image execute each value — physical actuators (VFDs, control valves, heaters) respond to every intermediate setpoint, causing process instability and equipment wear from continuous rapid cycling.
