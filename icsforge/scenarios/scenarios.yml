    - type: pcap
      proto: iec61850
      technique: T0802
      style: spoof_measurement
      count: 10
      interval: 0.5s
      note: Capture measurement datasets for process state
  T0802__automated_collection__opcua:
    title: T0802 – Automated Collection — OPC UA subscription-based data harvest
    description: Creates OPC UA subscriptions covering all MonitoredItems across the server's address space. Subscription-based collection is event-driven — the server pushes changes automatically. With subscriptions on all process variables, the attacker receives a complete real-time data feed that resembles legitimate SCADA historian behaviour.
    tactic: Collection
    technique: T0802
    steps:
    - type: pcap
      proto: opcua
      technique: T0802
      style: browse
      count: 1
      interval: 0s
