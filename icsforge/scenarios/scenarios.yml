      count: 2
      interval: 1s
      note: OPC UA write confirm/hold
  T0855__unauth_command__enip_write_tag:
    title: T0855 – Unauthorized Command Message — EtherNet/IP unauthorized tag write
    description: Sends CIP WriteTag requests to a Logix controller for output tags controlling actuators and drives. Overwrites motor command bits, valve positions, and analog output references without PLC program authorization.
    tactic: Impair Process Control
