      count: 1
      interval: 1s
      note: General interrogation using legitimate master identity
    - type: pcap
      proto: iec104
      technique: T0859
      style: single_command
      count: 5
      interval: 1s
      note: Issue control commands as valid master station
  T0822__external_remote__enip:
    title: T0822 – External Remote Services — EtherNet/IP via remote access
    description: Attacker gains entry to the OT network through an exposed EtherNet/IP endpoint or by pivoting through a remote access service (VPN, jump host). Once on the OT network, normal EtherNet/IP traffic is generated — ListIdentity, Register Session, Read/Write Tag — indistinguishable from legitimate engineering workstation traffic, allowing persistent OT access.
