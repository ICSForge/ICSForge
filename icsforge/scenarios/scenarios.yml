  T0891__hardcoded_creds__modbus:
    title: T0891 – Hardcoded Credentials — Modbus hardcoded null credential
    description: Modbus/TCP has no authentication — any TCP connection to port 502 is accepted as a valid master. The 'hardcoded credential' is the deliberate design choice to require no credential. This scenario exercises that design constraint by reading and writing process data without any authentication material, identical to what the legitimate SCADA master does.
