    description: Sends DCP Factory Reset to a PROFINET IO device, placing it in its factory-default unconfigured state. This is functionally equivalent to firmware update mode — the device suspends normal cyclic operation, disables all outputs, and awaits new configuration from the IO controller or an engineering tool.
