  T0819__exploit_public__mqtt:
    title: T0819 – Exploit Public-Facing Application — MQTT broker vulnerability probe
    description: Probes an internet-accessible MQTT broker with malformed CONNECT packets, oversized client IDs, and malformed PUBLISH headers targeting known CVEs in MQTT broker implementations (Mosquitto, EMQX, HiveMQ). Many ICS MQTT deployments use unpatched broker versions. Malformed packets can trigger broker crashes or code execution vulnerabilities.
