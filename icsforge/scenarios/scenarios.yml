    description: Uses BACnet Private Transfer (service 18) to send a vendor-specific password change command to a BACnet device. Some BACnet implementations expose password management via Private Transfer without requiring prior authentication. Changing the device password locks out legitimate operators from BACnet-level configuration access until the password is reset.
