    - type: pcap
      proto: iec104
      technique: T0877
      style: interrogation
      count: 3
      interval: 1s
      note: IEC-104 C_IC_NA complete I/O scan
    - type: pcap
      proto: iec104
      technique: T0877
      style: meas_inject
      count: 1
      interval: 0.5s
      note: IEC-104 measurement verification
  T0877__io_image__opcua_bulk_read:
    title: T0877 – I/O Image — OPC UA process data bulk read
    description: 'Issues OPC UA ReadRequest with multiple NodeIds in a single request to efficiently snapshot the complete I/O image: all sensor values, actuator positions, alarm states, and calculated values in one network exchange.'
    tactic: Collection
