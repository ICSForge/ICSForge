      style: interrogation
      count: 2
      interval: 1s
      note: IEC-104 GI for data object enumeration
  T0826__loss_of_availability__opcua_session_flood:
    title: T0826 – Loss of Availability — OPC UA session flooding
    description: Opens maximum OPC UA sessions in rapid succession to exhaust the server session table. Once the limit is reached, legitimate engineering workstations and SCADA clients cannot connect, causing loss of monitoring and control.
    tactic: Impact
    technique: T0826
    steps:
    - type: pcap
      proto: opcua
      technique: T0826
      style: open_session
      count: 10
      interval: 0.1s
      note: OPC UA session table exhaustion
    - type: pcap
      proto: opcua
      technique: T0826
      style: malformed_browse
      count: 10
      interval: 0.05s
      note: OPC UA malformed request flood
  T0826__loss_of_availability__enip_session_exhaust:
    title: T0826 – Loss of Availability — EtherNet/IP session exhaustion
    description: Sends rapid EtherNet/IP RegisterSession requests to exhaust the controller's session table. Most Logix controllers support 64-128 sessions; flooding this causes legitimate HMI/SCADA connections to be refused.
    tactic: Impact
    technique: T0826
    steps:
    - type: pcap
      proto: enip
      technique: T0826
      style: register_session
      count: 15
      interval: 0.1s
      note: EIP session table flood
    - type: pcap
      proto: enip
      technique: T0826
      style: send_rr_data
      count: 15
      interval: 0.05s
      note: EIP unconnected message flood
  T0877__io_image__dnp3_analog_read:
    title: T0877 – I/O Image — DNP3 analog input snapshot
    description: 'Reads all DNP3 analog input objects (g30v1, g30v2, g30v5) to capture the complete I/O image of an outstation: all analog measurements, counter values, and binary inputs in a systematic data collection sequence.'
    tactic: Collection
