scenarios:
  T0840__network_enum__enip_sweep:
    title: T0840 – EtherNet/IP identity sweep (Network Connection Enumeration)
    description: 'Attacker sends ENIP ListIdentity and ListServices to discover all connected Allen-Bradley / Rockwell devices. Classic Nmap/Redpoint scanner pattern. Maps directly to T0840.

      '
    tactic: Discovery
    technique: T0840
    steps:
    - type: pcap
      proto: enip
      technique: T0840
      style: list_identity
      count: 16
      interval: 0.05s
    - type: pcap
      proto: enip
      technique: T0840
      style: list_services
      count: 8
      interval: 0.07s
    - type: pcap
      proto: enip
      technique: T0840
      style: list_interfaces
      count: 6
      interval: 0.07s
  T0840__network_enum__profinet_identify:
    title: T0840 – PROFINET DCP multicast identify (Network Connection Enumeration)
    description: 'DCP multicast Identify-All request: the canonical PROFINET device discovery packet. Every PROFINET device on the segment responds with its station name and IP. Seen in every Siemens-environment reconnaissance.

      '
    tactic: Discovery
    technique: T0840
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0840
      style: identify
      count: 15
      interval: 0.1s
  T0888__remote_sys_info__enip_identity:
    title: T0888 – EtherNet/IP device fingerprint (Remote System Information Discovery)
    description: 'After session registration, attacker reads full Identity object (CIP GetAttributeAll) to extract vendor, product code, revision, and serial number. Required precursor to targeted exploitation.

      '
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: enip
      technique: T0888
      style: register_session
      count: 3
      interval: 0.15s
    - type: pcap
      proto: enip
      technique: T0888
      style: get_identity
      count: 10
      interval: 0.1s
    - type: pcap
      proto: enip
      technique: T0888
      style: get_device_type
      count: 6
      interval: 0.1s
  T0888__remote_sys_info__opcua_discovery:
    title: T0888 – OPC UA server discovery and endpoint enumeration
    description: 'FindServers + GetEndpoints requests to the OPC UA discovery server. Reveals server capabilities, security policies, and available endpoints. Equivalent of Shodan banner grabbing in OT.

      '
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: opcua
      technique: T0888
      style: hello
      count: 4
      interval: 0.1s
    - type: pcap
      proto: opcua
      technique: T0888
      style: find_servers
      count: 6
      interval: 0.1s
    - type: pcap
      proto: opcua
      technique: T0888
      style: get_endpoints
      count: 6
      interval: 0.1s
  T0888__remote_sys_info__s7comm_szl:
    title: T0888 – S7comm SZL/SSL read (System Status List)
    description: 'S7comm ROSCTR_USERDATA SZL read: attacker queries System Status Lists (0x0011 hardware config, 0x001C CPU components) to enumerate Siemens PLC hardware, firmware version, and module slots. This is what Stuxnet-era reconnaissance looked like.

      '
    tactic: Discovery
    technique: T0888
    steps:
    - type: pcap
      proto: s7comm
      technique: T0888
      style: setup
      count: 2
      interval: 0.1s
    - type: pcap
      proto: s7comm
      technique: T0888
      style: szl_read
      count: 10
      interval: 0.12s
  T0861__point_tag_id__opcua_browse:
    title: T0861 – OPC UA Browse tree traversal (Point & Tag Identification)
    description: 'Attacker enumerates the entire OPC UA address space starting from the Objects folder. BrowseRequest → BrowseNextRequest chains reveal every tag name, NodeId, and data type in the server. Seen in pre-attack reconnaissance against ICS historians.

      '
    tactic: Collection
    technique: T0861
    steps:
    - type: pcap
      proto: opcua
      technique: T0861
      style: open_session
      count: 2
      interval: 0.1s
    - type: pcap
      proto: opcua
      technique: T0861
      style: browse
      count: 20
      interval: 0.06s
    - type: pcap
      proto: opcua
      technique: T0861
      style: browse_next
      count: 15
      interval: 0.06s
    - type: pcap
      proto: opcua
      technique: T0861
      style: translate_paths
      count: 10
      interval: 0.08s
  T0861__point_tag_id__modbus_register_sweep:
    title: T0861 – Modbus register address sweep (Point & Tag Identification)
    description: 'Systematic FC03 read of all holding register addresses from 0 to 9999. Each exception response reveals valid address boundaries. This is how attackers map a PLC''s data model before writing to it.

      '
    tactic: Collection
    technique: T0861
    steps:
    - type: pcap
      proto: modbus
      technique: T0861
      style: read_holding
      count: 20
      interval: 0.05s
    - type: pcap
      proto: modbus
      technique: T0861
      style: read_input
      count: 12
      interval: 0.05s
    - type: pcap
      proto: modbus
      technique: T0861
      style: read_coils
      count: 12
      interval: 0.05s
    - type: pcap
      proto: modbus
      technique: T0861
      style: read_discrete
      count: 10
      interval: 0.05s
    - type: pcap
      proto: modbus
      technique: T0861
      style: exception_probe
      count: 6
      interval: 0.08s
  T0846__remote_sys_discovery__dnp3_probe:
    title: T0846 – DNP3 device probing (Remote System Discovery)
    description: 'Attacker sends DNP3 DelayMeasure and AssignClass requests to identify which outstation addresses respond. Timing data reveals network topology. AssignClass sweeps help discover all device IDs.

      '
    tactic: Discovery
    technique: T0846
    steps:
    - type: pcap
      proto: dnp3
      technique: T0846
      style: delay_measure
      count: 12
      interval: 0.1s
    - type: pcap
      proto: dnp3
      technique: T0846
      style: assign_class
      count: 8
      interval: 0.12s
    - type: pcap
      proto: dnp3
      technique: T0846
      style: read
      count: 10
      interval: 0.1s
  T0801__monitor_process__modbus_poll:
    title: T0801 – Modbus sustained process state polling (Monitor Process State)
    description: 'Periodic FC03 holding register reads at realistic polling cadence (500ms–2s intervals). This is legitimate SCADA behaviour but from an unexpected source — the key indicator of T0801. Models an attacker establishing a continuous view of process values before crafting a manipulation payload.

      '
    tactic: Collection
    technique: T0801
    steps:
    - type: pcap
      proto: modbus
      technique: T0801
      style: read_holding
      count: 20
      interval: 0.5s
    - type: pcap
      proto: modbus
      technique: T0801
      style: read_coils
      count: 15
      interval: 0.5s
    - type: pcap
      proto: modbus
      technique: T0801
      style: read_input
      count: 15
      interval: 0.5s
  T0801__monitor_process__iec104_subscribe:
    title: T0801 – IEC-104 STARTDT + interrogation (Monitor Process State)
    description: 'IEC-104 session establishment (STARTDT U-frame) followed by global interrogation (C_IC_NA_1). This initiates spontaneous reporting of all process values — an attacker''s first step to understand live process state in a substation environment.

      '
    tactic: Collection
    technique: T0801
    steps:
    - type: pcap
      proto: iec104
      technique: T0801
      style: startdt
      count: 3
      interval: 0.2s
    - type: pcap
      proto: iec104
      technique: T0801
      style: interrogation
      count: 5
      interval: 0.5s
    - type: pcap
      proto: iec104
      technique: T0801
      style: meas_sp
      count: 20
      interval: 0.3s
    - type: pcap
      proto: iec104
      technique: T0801
      style: meas_mv
      count: 15
      interval: 0.3s
  T0801__monitor_process__opcua_subscription:
    title: T0801 – OPC UA subscription polling (Monitor Process State)
    description: 'CreateSubscription + recurring Publish requests. An attacker who has gained access to the OPC UA server creates a subscription to continuously receive value changes for critical tags. This is how modern ICS malware (e.g. PIPEDREAM components) monitor process state before initiating disruption.

      '
    tactic: Collection
    technique: T0801
    steps:
    - type: pcap
      proto: opcua
      technique: T0801
      style: open_session
      count: 2
      interval: 0.15s
    - type: pcap
      proto: opcua
      technique: T0801
      style: create_sub
      count: 3
      interval: 0.2s
    - type: pcap
      proto: opcua
      technique: T0801
      style: publish
      count: 20
      interval: 0.5s
  T0802__automated_collection__modbus_burst:
    title: T0802 – Modbus rapid systematic register dump (Automated Collection)
    description: 'High-cadence FC03 reads sweeping the full address space at maximum speed. Distinguishable from T0801 by rate and systematic address increment. Models scripted data harvesting for offline analysis or replay-attack preparation.

      '
    tactic: Collection
    technique: T0802
    steps:
    - type: pcap
      proto: modbus
      technique: T0802
      style: read_holding
      count: 40
      interval: 0.02s
    - type: pcap
      proto: modbus
      technique: T0802
      style: read_coils
      count: 30
      interval: 0.02s
    - type: pcap
      proto: modbus
      technique: T0802
      style: read_input
      count: 30
      interval: 0.02s
    - type: pcap
      proto: modbus
      technique: T0802
      style: get_comm_event_counter
      count: 5
      interval: 0.05s
    - type: pcap
      proto: modbus
      technique: T0802
      style: read_exception_status
      count: 5
      interval: 0.05s
  T0882__theft_operational_info__opcua_history:
    title: T0882 – OPC UA HistoryRead data exfil (Theft of Operational Information)
    description: 'OPC UA HistoryReadRequest to extract historical process data. Attackers targeting historian servers (Wonderware, OSIsoft PI) use this to exfiltrate operational data for competitive intelligence or attack preparation. Distinct from T0801 by the HistoryRead service type rather than real-time Read.

      '
    tactic: Impact
    technique: T0882
    steps:
    - type: pcap
      proto: opcua
      technique: T0882
      style: open_session
      count: 2
      interval: 0.15s
    - type: pcap
      proto: opcua
      technique: T0882
      style: read_history
      count: 20
      interval: 0.1s
  T0882__theft_operational_info__s7comm_db_extract:
    title: T0882 – S7comm systematic DB read (Theft of Operational Information)
    description: 'Sequential ReadVar requests targeting multiple Data Blocks (DB1, DB2, ...). In Siemens environments, DBs contain recipes, setpoints, and production data. Attackers use this to exfiltrate production intelligence.

      '
    tactic: Impact
    technique: T0882
    steps:
    - type: pcap
      proto: s7comm
      technique: T0882
      style: setup
      count: 2
      interval: 0.1s
    - type: pcap
      proto: s7comm
      technique: T0882
      style: read_db
      count: 25
      interval: 0.08s
    - type: pcap
      proto: s7comm
      technique: T0882
      style: szl_read
      count: 8
      interval: 0.1s
  T0883__internet_accessible__multi:
    title: T0883 – Exposed OT service probe (Internet Accessible Device)
    description: 'Attacker probing OT services from an unexpected network segment (DMZ breach, direct internet exposure). Each protocol sends its standard discovery request to reveal service presence.

      '
    tactic: Initial Access
    technique: T0883
    steps:
    - type: pcap
      proto: modbus
      technique: T0883
      style: read_holding
      count: 6
      interval: 0.2s
    - type: pcap
      proto: opcua
      technique: T0883
      style: hello
      count: 4
      interval: 0.2s
    - type: pcap
      proto: enip
      technique: T0883
      style: list_identity
      count: 5
      interval: 0.2s
    - type: pcap
      proto: dnp3
      technique: T0883
      style: delay_measure
      count: 4
      interval: 0.2s
  T0822__external_remote_services__opcua:
    title: T0822 – OPC UA anonymous session establishment (External Remote Services)
    description: 'Full OPC UA session handshake: CreateSession → ActivateSession with anonymous identity token. Many OPC UA servers accept anonymous connections by default (misconfiguration). This is how attackers gain read/write access via OPC UA without credentials.

      '
    tactic: Initial Access
    technique: T0822
    steps:
    - type: pcap
      proto: opcua
      technique: T0822
      style: hello
      count: 2
      interval: 0.15s
    - type: pcap
      proto: opcua
      technique: T0822
      style: open_session
      count: 3
      interval: 0.2s
    - type: pcap
      proto: opcua
      technique: T0822
      style: activate_session
      count: 3
      interval: 0.2s
    - type: pcap
      proto: opcua
      technique: T0822
      style: browse
      count: 8
      interval: 0.1s
  T0859__valid_accounts__opcua_cred:
    title: T0859 – OPC UA credential-based session (Valid Accounts)
    description: 'CreateSession + ActivateSession with username/password token. Models use of captured or default credentials (admin/admin, guest/guest). Distinguished from T0822 by the credential presentation in the ActivateSession token structure.

      '
    tactic: Lateral Movement
    technique: T0859
    steps:
    - type: pcap
      proto: opcua
      technique: T0859
      style: hello
      count: 2
      interval: 0.15s
    - type: pcap
      proto: opcua
      technique: T0859
      style: open_session
      count: 3
      interval: 0.2s
    - type: pcap
      proto: opcua
      technique: T0859
      style: activate_session
      count: 4
      interval: 0.2s
  T0848__rogue_master__modbus:
    title: T0848 – Modbus rogue master (Rogue Master)
    description: 'Attacker device acts as an unexpected Modbus TCP master: it begins issuing read and write commands from an IP not in the engineering workstation whitelist. The key observable is a new source IP communicating on port 502.

      '
    tactic: Initial Access
    technique: T0848
    steps:
    - type: pcap
      proto: modbus
      technique: T0848
      style: read_holding
      count: 10
      interval: 0.15s
    - type: pcap
      proto: modbus
      technique: T0848
      style: read_coils
      count: 8
      interval: 0.15s
    - type: pcap
      proto: modbus
      technique: T0848
      style: write_single_register
      count: 6
      interval: 0.2s
    - type: pcap
      proto: modbus
      technique: T0848
      style: write_multiple_registers
      count: 8
      interval: 0.2s
  T0848__rogue_master__dnp3:
    title: T0848 – DNP3 rogue master select-before-operate (Rogue Master)
    description: 'Unexpected master issues DNP3 Select-then-Operate sequence to an outstation that does not recognise its source address. The key observable is control traffic from an unauthorised master address (src attribute).

      '
    tactic: Initial Access
    technique: T0848
    steps:
    - type: pcap
      proto: dnp3
      technique: T0848
      style: read
      count: 5
      interval: 0.2s
    - type: pcap
      proto: dnp3
      technique: T0848
      style: select
      count: 6
      interval: 0.15s
    - type: pcap
      proto: dnp3
      technique: T0848
      style: operate
      count: 6
      interval: 0.15s
  T0848__rogue_master__iec104:
    title: T0848 – IEC-104 rogue master STARTDT + commands (Rogue Master)
    description: 'An unauthorised IEC-104 controlling station establishes a connection (STARTDT) to an RTU and issues control commands. RTU receives commands from an unexpected IP. Common in substation attacks.

      '
    tactic: Initial Access
    technique: T0848
    steps:
    - type: pcap
      proto: iec104
      technique: T0848
      style: startdt
      count: 2
      interval: 0.2s
    - type: pcap
      proto: iec104
      technique: T0848
      style: interrogation
      count: 3
      interval: 0.3s
    - type: pcap
      proto: iec104
      technique: T0848
      style: single_command
      count: 8
      interval: 0.25s
    - type: pcap
      proto: iec104
      technique: T0848
      style: double_command
      count: 6
      interval: 0.25s
  T0855__unauth_command__modbus:
    title: T0855 – Modbus unauthorized write burst (Unauthorized Command Message)
    description: 'Write commands from an unexpected host with no prior read baseline. FC06 single register writes followed by FC16 multi-register burst. Pattern seen in Industroyer2, BlackEnergy, and other ICS malware.

      '
    tactic: Impair Process Control
    technique: T0855
    steps:
    - type: pcap
      proto: modbus
      technique: T0855
      style: read_holding
      count: 3
      interval: 0.1s
    - type: pcap
      proto: modbus
      technique: T0855
      style: write_single_register
      count: 8
      interval: 0.08s
    - type: pcap
      proto: modbus
      technique: T0855
      style: write_multiple_registers
      count: 12
      interval: 0.06s
    - type: pcap
      proto: modbus
      technique: T0855
      style: write_single_coil
      count: 6
      interval: 0.08s
  T0855__unauth_command__dnp3_direct_operate:
    title: T0855 – DNP3 direct operate without select (Unauthorized Command Message)
    description: 'DNP3 DirectOperate (FC05) bypasses the normal Select-before-Operate interlocking. In Industroyer-style attacks this was used to directly trip circuit breakers. FC06 DirectOperateNoAck is also sent to avoid waiting for confirmation.

      '
    tactic: Impair Process Control
    technique: T0855
    steps:
    - type: pcap
      proto: dnp3
      technique: T0855
      style: direct_operate
      count: 12
      interval: 0.1s
    - type: pcap
      proto: dnp3
      technique: T0855
      style: direct_operate_nr
      count: 8
      interval: 0.08s
  T0855__unauth_command__iec104:
    title: T0855 – IEC-104 mass control command sequence (Unauthorized Command Message)
    description: 'Burst of C_SC_NA_1 single commands followed by C_DC_NA_1 double commands and C_SE_NC_1 float setpoints. This is the Industroyer IEC-104 module pattern: rapid fire commands to open multiple breakers simultaneously.

      '
    tactic: Impair Process Control
    technique: T0855
    steps:
    - type: pcap
      proto: iec104
      technique: T0855
      style: startdt
      count: 2
      interval: 0.1s
    - type: pcap
      proto: iec104
      technique: T0855
      style: single_command
      count: 15
      interval: 0.05s
    - type: pcap
      proto: iec104
      technique: T0855
      style: double_command
      count: 10
      interval: 0.05s
    - type: pcap
      proto: iec104
      technique: T0855
      style: setpoint_float
      count: 8
      interval: 0.08s
  T0855__unauth_command__s7comm:
    title: T0855 – S7comm write outputs from unexpected host (Unauthorized Command Message)
    description: 'S7comm WriteVar targeting AREA_OUTPUTS: an unexpected engineering workstation IP issues write commands directly to PLC output area. The traffic pattern (setup → read → write) is identical to a legitimate workstation but comes from an attacker machine.

      '
    tactic: Impair Process Control
    technique: T0855
    steps:
    - type: pcap
      proto: s7comm
      technique: T0855
      style: setup
      count: 2
      interval: 0.15s
    - type: pcap
      proto: s7comm
      technique: T0855
      style: read_outputs
      count: 4
      interval: 0.1s
    - type: pcap
      proto: s7comm
      technique: T0855
      style: write_var
      count: 12
      interval: 0.08s
    - type: pcap
      proto: s7comm
      technique: T0855
      style: write_outputs
      count: 8
      interval: 0.08s
  T0831__manipulation_control__modbus_setpoint:
    title: T0831 – Modbus setpoint drift manipulation (Manipulation of Control)
    description: 'Read-modify-write cycle: attacker reads current register, writes a slightly altered value (setpoint drift), reads back to confirm. Unlike T0855 (raw write), T0831 involves incremental manipulation to stay below alarm thresholds. Uses FC22 mask-write for bit-level precision.

      '
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: modbus
      technique: T0831
      style: read_holding
      count: 4
      interval: 0.3s
    - type: pcap
      proto: modbus
      technique: T0831
      style: mask_write_register
      count: 8
      interval: 0.2s
    - type: pcap
      proto: modbus
      technique: T0831
      style: write_single_register
      count: 10
      interval: 0.2s
    - type: pcap
      proto: modbus
      technique: T0831
      style: read_holding
      count: 4
      interval: 0.3s
  T0831__manipulation_control__dnp3_sbo:
    title: T0831 – DNP3 repeated Select-Before-Operate (Manipulation of Control)
    description: 'Unlike T0855 (no-check operate), T0831 uses the proper SBO sequence repeatedly to change a control output. The repeated cycling pattern (Select→Operate→Select→Operate) is the distinguishing characteristic.

      '
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: dnp3
      technique: T0831
      style: select
      count: 5
      interval: 0.15s
    - type: pcap
      proto: dnp3
      technique: T0831
      style: operate
      count: 5
      interval: 0.15s
    - type: pcap
      proto: dnp3
      technique: T0831
      style: select
      count: 5
      interval: 0.15s
    - type: pcap
      proto: dnp3
      technique: T0831
      style: operate
      count: 5
      interval: 0.15s
  T0831__manipulation_control__iec104_setpoint:
    title: T0831 – IEC-104 float setpoint ramping (Manipulation of Control)
    description: 'C_SE_NC_1 float setpoint commands incrementally changing a process value (temperature, pressure, flow rate). Each setpoint is slightly different — the ramping pattern indicates deliberate manipulation rather than a single write command.

      '
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: iec104
      technique: T0831
      style: startdt
      count: 2
      interval: 0.15s
    - type: pcap
      proto: iec104
      technique: T0831
      style: setpoint_float
      count: 20
      interval: 0.3s
    - type: pcap
      proto: iec104
      technique: T0831
      style: regulating_step
      count: 10
      interval: 0.25s
  T0831__manipulation_control__opcua_write:
    title: T0831 – OPC UA node value write (Manipulation of Control)
    description: 'OPC UA WriteRequest to control-related nodes after session establishment. The attacker modifies setpoint/command nodes to influence the physical process. Used by PIPEDREAM/INCONTROLLER OPC UA module.

      '
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: opcua
      technique: T0831
      style: open_session
      count: 2
      interval: 0.15s
    - type: pcap
      proto: opcua
      technique: T0831
      style: read_value
      count: 5
      interval: 0.2s
    - type: pcap
      proto: opcua
      technique: T0831
      style: write_value
      count: 15
      interval: 0.15s
  T0836__modify_parameter__modbus:
    title: T0836 – Modbus parameter register writes (Modify Parameter)
    description: 'Writes to holding registers that correspond to PID setpoints, alarm limits, or process parameters. Uses FC22 mask-write for individual bit manipulation and FC16 for multi-register parameter blocks. Distinct from T0831 by targeting known parameter address ranges rather than control outputs.

      '
    tactic: Impair Process Control
    technique: T0836
    steps:
    - type: pcap
      proto: modbus
      technique: T0836
      style: mask_write_register
      count: 10
      interval: 0.15s
    - type: pcap
      proto: modbus
      technique: T0836
      style: write_multiple_registers
      count: 10
      interval: 0.12s
    - type: pcap
      proto: modbus
      technique: T0836
      style: read_holding
      count: 6
      interval: 0.2s
  T0836__modify_parameter__s7comm_db:
    title: T0836 – S7comm Data Block parameter modification (Modify Parameter)
