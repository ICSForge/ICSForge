      interval: 1s
      note: Issue control commands using IP-only auth
  T0828__loss_productivity__enip:
    title: T0828 – Loss of Productivity and Revenue — EtherNet/IP production line halt
    description: Sends CIP Stop Device to halt a ControlLogix PLC managing a production line. Stopping the PLC scan cycle causes all outputs to transition to safe state, stopping conveyors, actuators, and process equipment. Production output drops to zero for the duration of the stop, directly translating to lost productivity and revenue.
    tactic: Impact
    technique: T0828
    steps:
    - type: pcap
      proto: enip
      technique: T0828
      style: stop_device
      count: 1
      interval: 0s
      note: 'CIP Stop: halt production line PLC'
    - type: pcap
      proto: enip
      technique: T0828
      style: list_identity
      count: 3
      interval: 5s
      note: Verify PLC remains stopped
    - type: pcap
      proto: enip
      technique: T0828
      style: stop_device
      count: 1
      interval: 30s
      note: Re-stop if operator attempts restart
  T0828__loss_productivity__s7comm:
    title: T0828 – Loss of Productivity and Revenue — S7comm CPU STOP for downtime
    description: Repeatedly sends S7comm CPU STOP commands to keep a production PLC in STOP state. Each time an operator or the SCADA attempts to restart the CPU, the attacker issues another STOP command faster than the operator can respond. The sustained downtime results in lost production output and direct financial impact.
    tactic: Impact
    technique: T0828
    steps:
    - type: pcap
      proto: s7comm
      technique: T0828
      style: cpu_stop
      count: 1
      interval: 0s
      note: 'STOP CPU: halt production'
    - type: pcap
      proto: s7comm
      technique: T0828
      style: cpu_stop
      count: 10
      interval: 3s
      note: Re-STOP every 3s to prevent restart
  T0828__loss_productivity__bacnet:
    title: T0828 – Loss of Productivity and Revenue — BACnet HVAC system disruption
    description: Writes invalid values to BACnet HVAC setpoints and output objects, causing temperature and humidity to go out of specification. In facilities with precision manufacturing, pharmaceuticals, or data centers, HVAC excursions trigger automatic production shutdowns to protect product or equipment — resulting in downtime, scrap product, and revenue loss.
    tactic: Impact
    technique: T0828
    steps:
    - type: pcap
      proto: bacnet
      technique: T0828
      style: write_property
      count: 5
      interval: 1s
      note: Write extreme HVAC setpoints causing spec excursion
    - type: pcap
      proto: bacnet
      technique: T0828
      style: write_property_multi
      count: 3
      interval: 5s
      note: Sustain out-of-spec conditions to force shutdown
  T0828__loss_productivity__mqtt:
    title: T0828 – Loss of Productivity and Revenue — MQTT production halt command
    description: Publishes a halt or emergency-stop command to the command topic of an MQTT-connected production controller. Without topic-level ACLs, any client can publish to any topic. An e-stop or halt command causes the connected equipment to transition to safe state, stopping production and requiring manual operator intervention to resume.
    tactic: Impact
    technique: T0828
    steps:
    - type: pcap
      proto: mqtt
      technique: T0828
      style: publish_command
      count: 1
      interval: 0s
      note: Publish halt/e-stop command to production topic
    - type: pcap
      proto: mqtt
      technique: T0828
      style: publish_command
      count: 5
      interval: 10s
      note: Re-publish halt to prevent restart
  T0859__valid_accounts__enip:
    title: T0859 – Valid Accounts — EtherNet/IP legitimate session
    description: Establishes an EtherNet/IP session using valid credentials obtained from phishing an engineer or extracting them from a compromised workstation. With legitimate credentials the attacker's CIP requests are indistinguishable from normal engineering workstation activity, allowing read/write access to all process tags without triggering access alerts.
    tactic: Lateral Movement
