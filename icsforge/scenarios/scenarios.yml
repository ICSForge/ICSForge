      count: 10
      interval: 1s
      note: Read process variables from I/O image
  T0845__program_upload__enip:
    title: T0845 – Program Upload — EtherNet/IP controller programme read
    description: Uses CIP upload services to read the ControlLogix programme image from the PLC. The uploaded binary contains all ladder rungs, function blocks, tag definitions, and I/O configuration. The attacker analyses this offline to identify safety interlocks, alarm thresholds, and control logic that can be subverted in a subsequent download attack.
    tactic: Collection
    technique: T0845
    steps:
    - type: pcap
