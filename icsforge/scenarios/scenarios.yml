      technique: T0802
      style: read_analog
      count: 5
      interval: 0.2s
      note: Bulk analog value harvest
    - type: pcap
      proto: dnp3
      technique: T0802
      style: read_counter
      count: 5
      interval: 0.2s
      note: Counter value collection
  T0802__automated_collection__enip:
    title: T0802 – Automated Collection — EtherNet/IP bulk tag read
    description: Reads large blocks of CIP tags from a ControlLogix PLC using Multiple Service Packet requests. The attacker sweeps the tag database systematically, collecting all process values, setpoints, and status bits in rapid bulk reads — building a real-time snapshot of the entire control programme's runtime state.
    tactic: Collection
    technique: T0802
    steps:
    - type: pcap
      proto: enip
      technique: T0802
