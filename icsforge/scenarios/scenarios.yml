      technique: T0846
      style: read_exception_status
      count: 5
      interval: 0.3s
      note: Read exception status for device capability
  T0846__remote_sys_discovery__enip:
    title: T0846 – Remote System Discovery — EtherNet/IP GetIdentity device profile
    description: 'Sends EtherNet/IP GetIdentity CIP requests to enumerate the complete device profile: Vendor ID, Device Type, Product Code, Major/Minor Revision, Serial Number, and Product Name. This goes beyond ListIdentity''s broadcast response to include detailed firmware and hardware revision data that maps exactly to published Rockwell/Schneider CVE databases.'
    tactic: Discovery
    technique: T0846
    steps:
    - type: pcap
      proto: enip
