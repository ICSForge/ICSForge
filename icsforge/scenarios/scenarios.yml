    title: T0878 – Alarm Suppression — IEC 61850 GOOSE protection stall
    description: Floods the bus with GOOSE frames at a fixed low stNum, keeping all subscribers locked on a 'no alarm' state. When real faults generate alarm events, the legitimate publisher's GOOSE cannot break through the stalled state, effectively suppressing alarms.
