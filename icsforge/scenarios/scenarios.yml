    description: Sends a BACnet ReinitializeDevice request with the reinitializedStateOfDevice set to 'startbackup'. Some BACnet devices interpret this as the beginning of a firmware update sequence and halt normal operation to await a backup or firmware image. The device stops all BACnet services and monitoring functions while waiting.
