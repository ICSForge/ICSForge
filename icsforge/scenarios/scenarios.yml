  T0826__loss_availability__modbus_connection_exhaust:
    title: 'T0826 – Loss of Availability: Modbus TCP connection exhaustion'
    description: 'Opens the maximum number of simultaneous TCP connections to port 502 without releasing them, exhausting the PLC''s connection table. Legitimate SCADA clients cannot connect. Distinct from T0814 (volumetric) — this targets connection state, not bandwidth.

