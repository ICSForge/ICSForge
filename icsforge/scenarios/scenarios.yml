      style: delete_sub
      count: 5
      interval: 0.5s
      note: Delete active OPC UA monitoring subscriptions
    - type: pcap
      proto: opcua
      technique: T0814
      style: close_session
      count: 3
      interval: 1s
      note: Close legitimate SCADA sessions to prevent re-subscribe
  T0814__denial_of_view__s7comm_read_block:
    title: T0814 – Denial of View — S7comm data block read saturation
    description: Floods the Siemens PLC with rapid S7comm Read DB requests targeting the communication data blocks used by the WinCC SCADA connection. The PLC S7 communication processor handles a fixed queue depth; when saturated with attacker requests, the WinCC client's legitimate read cycles are delayed or dropped, causing the operator display to show stale data.
    tactic: Inhibit Response Function
    technique: T0814
    steps:
    - type: pcap
      proto: s7comm
      technique: T0814
      style: read_db
      count: 30
      interval: 0.02s
      note: Saturate S7comm CPU with rapid DB read requests
    - type: pcap
      proto: s7comm
      technique: T0814
      style: read_all_dbs
      count: 10
      interval: 0.1s
      note: Read all DBs to block WinCC polling
  T0826__loss_of_availability__opcua_session:
    title: T0826 – Loss of Availability — OPC UA session exhaustion
    description: Opens OPC UA sessions to the target server without closing them, rapidly consuming the session pool. Most OPC UA servers limit concurrent sessions to 5–50. Once exhausted, the SCADA client, historian, and engineering workstations can no longer establish connections, producing a complete loss of OPC UA-based visibility and control.
    tactic: Impact
    technique: T0826
    steps:
    - type: pcap
      proto: opcua
      technique: T0826
      style: open_session
      count: 15
      interval: 0.1s
      note: Open sessions without closing to exhaust pool
    - type: pcap
      proto: opcua
      technique: T0826
      style: open_session
      count: 15
      interval: 0.1s
      note: Continue to maintain exhaustion
  T0836__modify_parameter__dnp3_setpoint:
    title: T0836 – Modify Parameter — DNP3 analog setpoint write
    description: Writes a modified setpoint value to a DNP3 Analog Output (Group 41) using Direct Operate. The target RTU immediately applies the new setpoint to the physical process (e.g., PID controller reference, pump speed, valve position). The change may not trigger alarms if the attacker selects a value within normal operating bounds.
    tactic: Impair Process Control
    technique: T0836
    steps:
    - type: pcap
      proto: dnp3
      technique: T0836
      style: direct_operate
      count: 1
      interval: 0s
      note: 'Direct Operate: write new analog output setpoint'
    - type: pcap
      proto: dnp3
      technique: T0836
      style: direct_operate
      count: 1
      interval: 5s
      note: Confirm setpoint persists after first change
  T0836__modify_parameter__iec61850_goose:
    title: T0836 – Modify Parameter — IEC 61850 GOOSE protection setting
    description: Injects a GOOSE frame with a falsified FLOAT32 value representing a protection relay setting (e.g., overcurrent threshold, undervoltage limit). Receiving relay IEDs update their operating parameters from the GOOSE dataset, changing the protection curve without operator awareness. The protection system will now operate at attacker-chosen thresholds until the next configuration audit.
    tactic: Impair Process Control
    technique: T0836
    steps:
    - type: pcap
      proto: iec61850
      technique: T0836
      style: spoof_measurement
      count: 3
      interval: 0.1s
      note: Inject GOOSE with modified protection threshold
    - type: pcap
      proto: iec61850
      technique: T0836
      style: spoof_measurement
      count: 3
      interval: 2s
      note: Retransmit to ensure setting is accepted
  T0838__alarm_settings__dnp3_deadband:
    title: T0838 – Modify Alarm Settings — DNP3 analog deadband write
    description: Writes an extremely large analog deadband value (Group 34) to a DNP3 outstation using Function Code 2 (Write). With a large deadband, the RTU only reports changes in analog values that exceed the deadband threshold. By setting this to the full measurement range, the attacker silences all analog change-of-value events, effectively disabling process alarming while the RTU continues to appear operational.
    tactic: Inhibit Response Function
    technique: T0838
    steps:
    - type: pcap
      proto: dnp3
      technique: T0838
      style: write
      count: 1
      interval: 0s
      note: Write extreme deadband to analog objects (disable alarms)
    - type: pcap
      proto: dnp3
      technique: T0838
      style: assign_class
      count: 1
      interval: 2s
      note: Reassign class to prevent event reporting
  T0838__alarm_settings__s7comm_write:
    title: T0838 – Modify Alarm Settings — S7comm alarm threshold modification
    description: Uses S7comm Write Variable to modify the alarm limit registers in a Siemens S7 PLC alarm data block (typically DB1/DB2 for configured limits). By writing values outside the physical process operating range (e.g., 9999.0 for an upper limit of a 0–100 sensor), the attacker prevents WinCC from triggering alarms even during severe process deviations.
    tactic: Inhibit Response Function
    technique: T0838
    steps:
    - type: pcap
      proto: s7comm
      technique: T0838
      style: write_db
      count: 3
      interval: 0.5s
      note: Write alarm limit to DB (max value = disable alarm)
    - type: pcap
      proto: s7comm
      technique: T0838
      style: write_db
      count: 3
      interval: 5s
      note: Re-write periodically in case operator resets
  T0855__unauth_command__enip_stop:
    title: T0855 – Unauthorized Command Message — EtherNet/IP CIP Stop Device
    description: Sends an EtherNet/IP CIP Stop command to a ControlLogix or CompactLogix controller. The CIP Stop service on the Identity Object places the PLC in STOP mode, halting the ladder logic scan cycle. All physical outputs transition to their configured safe state. This is the canonical unauthorized command attack on Allen-Bradley PLCs.
    tactic: Impair Process Control
    technique: T0855
    steps:
    - type: pcap
      proto: enip
      technique: T0855
      style: list_identity
      count: 1
      interval: 0s
      note: 'List Identity: verify target before command'
    - type: pcap
      proto: enip
      technique: T0855
      style: stop_device
      count: 1
      interval: 1s
      note: 'CIP Stop: halt PLC scan cycle'
  T0855__unauth_command__opcua_write_safety:
    title: T0855 – Unauthorized Command Message — OPC UA safety node write
    description: Writes a safety-critical value to an OPC UA node that controls a physical actuator (e.g., valve open/close, motor start/stop, emergency shutdown). OPC UA servers that do not enforce node access control allow any authenticated (or unauthenticated in default config) client to write to Variable nodes. The PLC OPC UA interface then executes the write as a control command.
    tactic: Impair Process Control
    technique: T0855
    steps:
    - type: pcap
      proto: opcua
      technique: T0855
      style: browse
      count: 1
      interval: 0s
      note: Browse address space to locate safety-critical node
    - type: pcap
      proto: opcua
      technique: T0855
      style: write_value
      count: 1
      interval: 1s
      note: Write unauthorized command to safety actuator node
  T0855__unauth_command__profinet_dcp_reset:
    title: T0855 – Unauthorized Command Message — PROFINET DCP factory reset
    description: 'Sends a PROFINET DCP Factory Reset request to an IO device. This command (DCP-Block: ResetToFactory, SubOption=1) erases the device''s station name and IP configuration, returning it to factory defaults. The device loses its PROFINET identity and drops off the IO controller cycle, causing its controlled outputs to go to safe state (typically all zeros) until manually reconfigured.'
    tactic: Impair Process Control
    technique: T0855
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0855
      style: identify_unicast
      count: 1
      interval: 0s
      note: Confirm target device before reset
    - type: pcap
      proto: profinet_dcp
      technique: T0855
      style: factory_reset
      count: 1
      interval: 1s
      note: 'DCP Factory Reset: erase device identity'
  T0849__masquerading__iec61850_goose:
    title: T0849 – Masquerading — IEC 61850 GOOSE fake IED identity
    description: Sends GOOSE frames using the gocbRef and datSet reference of a known legitimate protection IED. Subscribing IEDs and the SCADA system cannot distinguish the attacker's GOOSE from the real IED because GOOSE has no message authentication. The attacker's device masquerades as a trusted protection relay, allowing injection of false trip commands or measurements under the trusted IED's identity.
    tactic: Evasion
    technique: T0849
    steps:
    - type: pcap
      proto: iec61850
      technique: T0849
      style: relay_inject
      count: 3
      interval: 0.1s
      note: GOOSE with spoofed legitimate IED gocbRef
    - type: pcap
      proto: iec61850
      technique: T0849
      style: relay_inject
      count: 3
      interval: 2s
      note: Retransmit to maintain masquerade presence
  T0849__masquerading__mqtt:
    title: T0849 – Masquerading — MQTT device identity spoofing
    description: Connects to the MQTT broker using the Client ID of a legitimate ICS device (e.g., a RTU or sensor gateway). Brokers without unique client ID enforcement will disconnect the legitimate device and accept the attacker's connection. The attacker then publishes forged sensor data under the legitimate device's topic namespace, masquerading as the trusted data source to the SCADA subscriber.
    tactic: Evasion
    technique: T0849
    steps:
    - type: pcap
      proto: mqtt
      technique: T0849
      style: auto
      count: 1
      interval: 0s
      note: Connect with spoofed legitimate device Client ID
    - type: pcap
      proto: mqtt
      technique: T0849
      style: publish_telemetry
      count: 5
      interval: 0.5s
      note: Publish forged sensor data on device topic
  T0856__spoof_reporting__profinet_dcp:
    title: T0856 – Spoof Reporting Message — PROFINET DCP identity spoof
    description: Sends DCP Set-Name and Set-IP commands to change a PROFINET device's reported identity. IO controllers that cache device parameters will read back the attacker's values as if they are the genuine device configuration. Exploits the complete lack of authentication in PROFINET DCP.
    tactic: Impair Process Control
    technique: T0856
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0856
      style: set_name
      count: 3
      interval: 1s
      note: Overwrite station name to spoof device identity
    - type: pcap
      proto: profinet_dcp
      technique: T0856
      style: get_name
      count: 3
      interval: 1s
      note: Verify spoofed name is accepted
  T0813__denial_of_control__dnp3_flood:
    title: T0813 – Denial of Control — DNP3 broadcast flood
    description: Floods the DNP3 network with broadcast Direct Operate commands to address 0xFFFF. All RTUs on the segment must process each broadcast, saturating their receive buffers. Legitimate SCADA master commands queued behind the flood are delayed or dropped, preventing control actions from reaching the target outstation during the attack window.
    tactic: Impact
    technique: T0813
    steps:
    - type: pcap
      proto: dnp3
      technique: T0813
      style: broadcast_operate
      count: 30
      interval: 0.02s
      note: DNP3 broadcast flood at 50 pps to all RTUs
    - type: pcap
      proto: dnp3
      technique: T0813
      style: broadcast_operate
      count: 30
      interval: 0.02s
      note: Sustain flood through control window
  T0813__denial_of_control__iec104_startdt_flood:
    title: T0813 – Denial of Control — IEC-104 connection exhaustion
    description: Opens IEC-104 TCP connections to the RTU without completing STARTDT activation, exhausting the RTU's connection table. IEC-104 RTUs typically support 1–4 concurrent connections. When the table is full, the legitimate SCADA master cannot connect, blocking all supervisory control commands.
    tactic: Impact
    technique: T0813
    steps:
    - type: pcap
      proto: iec104
      technique: T0813
      style: available
      count: 10
      interval: 0.1s
      note: Open IEC-104 connections without sending commands
    - type: pcap
      proto: iec104
      technique: T0813
      style: available
      count: 10
      interval: 0.1s
      note: Continue to keep connection table full
  T0826__loss_of_availability__bacnet_flood:
    title: T0826 – Loss of Availability — BACnet Who-Is broadcast flood
    description: Floods the BACnet/IP network with Who-Is broadcasts at high rate. All BACnet devices on the subnet must process each broadcast and generate an IAm response. The resulting traffic storm saturates network bandwidth and device CPU, causing BAS controllers and field devices to miss legitimate read/write cycles and produce a network-wide loss of availability.
    tactic: Impact
    technique: T0826
    steps:
    - type: pcap
      proto: bacnet
      technique: T0826
      style: who_is
      count: 50
      interval: 0.01s
      note: BACnet Who-Is flood at 100 pps
    - type: pcap
      proto: bacnet
      technique: T0826
      style: who_is
      count: 50
      interval: 0.01s
      note: Sustain broadcast storm
  T0826__loss_of_availability__profinet_dcp_flood:
    title: T0826 – Loss of Availability — PROFINET DCP multicast saturation
    description: Floods the PROFINET segment with DCP Identify-All multicast frames at high rate. All PROFINET IO devices must process each multicast and generate responses. The resulting network load causes IO controller cycle time violations and device watchdog timeouts, taking the entire PROFINET segment into safe state (outputs deenergised).
    tactic: Impact
    technique: T0826
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0826
      style: identify
      count: 50
      interval: 0.01s
      note: PROFINET DCP multicast flood at 100 pps
    - type: pcap
      proto: profinet_dcp
      technique: T0826
      style: identify
      count: 50
      interval: 0.01s
      note: Sustain to trigger IO watchdog timeouts
  T0832__manipulation_of_view__bacnet_write:
    title: T0832 – Manipulation of View — BACnet Present-Value write
    description: Writes a false Present-Value to a BACnet Analog Input or Binary Input object using WriteProperty. BAS HMI systems that poll this object will display the attacker's value instead of the real sensor reading. The BACnet standard allows any client to override sensor values via WriteProperty when priority arrays and write-protection are not configured.
    tactic: Impact
    technique: T0832
    steps:
    - type: pcap
      proto: bacnet
      technique: T0832
      style: write_property
      count: 5
      interval: 1s
      note: Write false Present-Value to BACnet sensor object
  T0882__theft_op_info__iec61850_goose:
    title: T0882 – Theft of Operational Information — IEC 61850 GOOSE eavesdrop
    description: Subscribes passively to the IEC 61850 GOOSE multicast stream. GOOSE carries real-time protection events, circuit breaker states, and measurement data in plaintext with no encryption. An attacker on the process bus VLAN can silently capture complete substation operational state including protection trip events, measurement values, and IED configuration references — all without generating any traffic.
    tactic: Impact
    technique: T0882
    steps:
    - type: pcap
      proto: iec61850
      technique: T0882
      style: enumerate_ied
      count: 5
      interval: 0.5s
      note: Probe GOOSE multicast to collect IED state data
  T0882__theft_op_info__mqtt:
    title: T0882 – Theft of Operational Information — MQTT telemetry harvest
    description: 'Connects to the ICS MQTT broker and subscribes to wildcard topics (#). ICS MQTT deployments typically publish all sensor readings, equipment states, and alarm events under a structured topic hierarchy. A wildcard subscription captures the complete operational picture: process values, equipment states, alarm history, and setpoints — all in real time.'
    tactic: Impact
    technique: T0882
    steps:
    - type: pcap
      proto: mqtt
      technique: T0882
      style: auto
      count: 1
      interval: 0s
      note: Connect to MQTT broker
    - type: pcap
      proto: mqtt
      technique: T0882
      style: subscribe_telemetry
      count: 5
      interval: 0.5s
      note: Subscribe wildcard to harvest all telemetry
  T0882__theft_op_info__profinet_dcp:
    title: T0882 – Theft of Operational Information — PROFINET DCP configuration harvest
    description: 'Uses PROFINET DCP Identify-All and Get requests to harvest the complete network configuration: station names, IP addresses, device types, and vendor information for all PROFINET devices. This map reveals the entire automation topology — PLC types, IO device locations, and network architecture — without requiring any authentication.'
    tactic: Impact
    technique: T0882
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0882
      style: identify
      count: 3
      interval: 0.5s
      note: 'Identify-All: enumerate all devices'
    - type: pcap
      proto: profinet_dcp
      technique: T0882
      style: get_name
      count: 5
      interval: 0.2s
      note: Get station names for all discovered devices
    - type: pcap
      proto: profinet_dcp
      technique: T0882
      style: get_ip
      count: 5
      interval: 0.2s
      note: Get IP configurations
  T0877__io_module_discovery__bacnet:
    title: T0877 – I/O Module Discovery — BACnet object list enumeration
    description: Reads the Object-Identifier list from a BACnet device (Property 76 — Object-List). This returns all instantiated objects including Analog Input/Output, Binary Input/Output, and Multi-state objects, revealing the complete I/O configuration of the field device. Combined with ReadPropertyMultiple for each object, the attacker maps every physical I/O point and its current value.
    tactic: Collection
    technique: T0877
    steps:
    - type: pcap
      proto: bacnet
      technique: T0877
      style: read_property
      count: 3
      interval: 0.3s
      note: Read Object-List to enumerate all I/O objects
    - type: pcap
      proto: bacnet
      technique: T0877
      style: read_property_multi
      count: 5
      interval: 0.3s
      note: Read all I/O values in bulk
  T0877__io_module_discovery__iec61850:
    title: T0877 – I/O Module Discovery — IEC 61850 GOOSE dataset mapping
    description: 'Listens to GOOSE multicast traffic and parses the datSet field to map which IED logical nodes publish which datasets. By correlating gocbRef and datSet across multiple GOOSE frames, the attacker reconstructs the complete I/O mapping: which IED controls which circuit breaker, which measurement belongs to which bay, and which datasets trigger protection.'
    tactic: Collection
    technique: T0877
    steps:
    - type: pcap
      proto: iec61850
      technique: T0877
      style: enumerate_ied
      count: 5
      interval: 0.2s
      note: GOOSE probe to map IED dataset assignments
    - type: pcap
      proto: iec61850
      technique: T0877
      style: enumerate_ied
      count: 5
      interval: 1s
      note: Second pass to confirm dataset mappings
  T0877__io_module_discovery__mqtt:
    title: T0877 – I/O Module Discovery — MQTT topic hierarchy enumeration
    description: Subscribes to MQTT topic wildcards to enumerate the complete topic hierarchy used by field devices. ICS MQTT implementations typically use structured topics like site/area/plc/tag that directly expose the physical I/O organisation. By subscribing and waiting for retained messages, the attacker maps every sensor, actuator, and setpoint in the ICS without sending any commands.
    tactic: Collection
    technique: T0877
    steps:
    - type: pcap
      proto: mqtt
      technique: T0877
      style: auto
      count: 1
      interval: 0s
      note: Connect to broker
    - type: pcap
      proto: mqtt
      technique: T0877
      style: subscribe_all
      count: 5
      interval: 0.5s
      note: Wildcard subscribe to map complete topic tree
  T0877__io_module_discovery__profinet_dcp:
    title: T0877 – I/O Module Discovery — PROFINET DCP slot/subslot enumeration
    description: 'Uses PROFINET DCP Identify and unicast Get requests to extract module information from PROFINET IO devices. The DCP response includes device type codes that identify the specific I/O module installed in each slot, revealing the physical I/O layout: which slots hold digital inputs, analog outputs, safety modules, and communication interfaces.'
    tactic: Collection
    technique: T0877
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0877
      style: identify
      count: 3
      interval: 0.3s
      note: Multicast Identify to find all IO devices
    - type: pcap
      proto: profinet_dcp
      technique: T0877
      style: identify_unicast
      count: 5
      interval: 0.3s
      note: Unicast Identify for detailed slot info
  T0878__alarm_suppression__bacnet:
    title: T0878 – Alarm Suppression — BACnet event notification disable
    description: Writes to the BACnet Event-Enable property (property 35) of Analog Input objects to disable TO-OFFNORMAL, TO-FAULT, and TO-NORMAL event notifications. With event notifications disabled, alarm conditions on the field device are not reported to the SCADA/BMS, suppressing all process alarms for the targeted object.
    tactic: Inhibit Response Function
    technique: T0878
    steps:
    - type: pcap
      proto: bacnet
      technique: T0878
      style: write_property
      count: 5
      interval: 0.5s
      note: Disable event notifications (EventEnable=0)
  T0878__alarm_suppression__enip:
    title: T0878 – Alarm Suppression — EtherNet/IP alarm tag write
    description: Writes a value of 0 (no alarm) to ControlLogix alarm tags that drive the HMI alarm banner and historian alarm log. FactoryTalk alarms are derived from PLC tags; by overwriting the tag with a normal value before the HMI polls, the attacker prevents alarm activation even when the physical process is in a fault state.
    tactic: Inhibit Response Function
    technique: T0878
    steps:
    - type: pcap
      proto: enip
      technique: T0878
      style: write_tag
      count: 10
      interval: 0.5s
      note: Zero alarm tags before HMI poll cycle
  T0878__alarm_suppression__mqtt:
    title: T0878 – Alarm Suppression — MQTT alarm topic suppression
    description: Publishes a retained MQTT message with value 'OK' on the alarm topic of a field device. MQTT retained messages override all subsequent non-retained publishes until a new retained message is sent. Any subscriber (SCADA, historian, notification system) connecting after the attack receives the attacker's 'OK' value instead of the real alarm state.
    tactic: Inhibit Response Function
    technique: T0878
    steps:
    - type: pcap
      proto: mqtt
      technique: T0878
      style: publish_alarm
      count: 5
      interval: 1s
      note: Publish retained 'OK' to alarm topic to suppress alerts
  T0831__manip_control__bacnet_write:
    title: T0831 – Manipulation of Control — BACnet Binary Output command
    description: Writes a command to a BACnet Binary Output object's Present-Value with priority 8 (Manual-Operator). This overrides the normal application priority and directly controls the physical output (e.g., relay, valve, damper). BACnet priority arrays allow any network client to issue commands without authentication, making this the canonical BACnet manipulation of control attack.
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: bacnet
      technique: T0831
      style: write_property
      count: 3
      interval: 2s
      note: Write Binary Output Present-Value at priority 8
    - type: pcap
      proto: bacnet
      technique: T0831
      style: write_property_multi
      count: 3
      interval: 5s
      note: Write multiple outputs simultaneously
  T0831__manip_control__enip:
    title: T0831 – Manipulation of Control — EtherNet/IP output tag write
    description: Writes directly to output tags mapped to physical I/O in a ControlLogix or CompactLogix PLC. CIP Write Tag to output tags bypasses the PLC ladder logic and directly controls field devices. The PLC continues executing its scan cycle, but the output image table reflects the attacker's values rather than what the program computed.
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: enip
      technique: T0831
      style: write_tag
      count: 5
      interval: 1s
      note: Write to output tags to manipulate physical I/O
    - type: pcap
      proto: enip
      technique: T0831
      style: read_tag
      count: 3
      interval: 0.5s
      note: Read back to verify outputs accepted attacker values
  T0831__manip_control__profinet_dcp:
    title: T0831 – Manipulation of Control — PROFINET I/O device takeover
    description: Changes a PROFINET IO device's station name and IP address to match the attacker's device. When the IO controller next initialises the device, it will establish a connection to the attacker's device instead of the real one. The attacker can then respond to IO controller cyclic data requests with arbitrary output values, effectively injecting control commands into the physical process.
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0831
      style: set_name
      count: 1
      interval: 0s
      note: Hijack IO device name
    - type: pcap
      proto: profinet_dcp
      technique: T0831
      style: set_ip
      count: 1
      interval: 1s
      note: Redirect IO device IP to attacker
    - type: pcap
      proto: profinet_dcp
      technique: T0831
      style: factory_reset
      count: 1
      interval: 5s
      note: Reset real device to remove it from controller cycle
  T0831__manip_control__s7comm:
    title: T0831 – Manipulation of Control — S7comm output register write
    description: Writes directly to the Siemens S7 output process image (PA, Q area) via S7comm Write Variable. The PLC immediately drives these values to the physical output modules on the next scan cycle, overriding any values computed by the ladder/FBD program. This is the canonical S7 manipulation of control attack used in Stuxnet.
    tactic: Impact
    technique: T0831
    steps:
    - type: pcap
      proto: s7comm
      technique: T0831
      style: write_outputs
      count: 5
      interval: 1s
      note: Write to output image (Q area) to control actuators
    - type: pcap
      proto: s7comm
      technique: T0831
      style: write_db
      count: 5
      interval: 1s
      note: Write to setpoint DB to sustain control deviation
  T0848__rogue_master__bacnet:
    title: T0848 – Rogue Master — BACnet rogue controller
    description: Presents an unauthorised BACnet device on the network that issues commands to field devices. BACnet has no concept of a 'master' — any device can issue WriteProperty to any other device. The attacker's device acts as a rogue controller, sending commands and reading values alongside the legitimate BAS controller without any authentication or authorisation.
    tactic: Initial Access
    technique: T0848
    steps:
    - type: pcap
      proto: bacnet
      technique: T0848
      style: i_am
      count: 1
      interval: 0s
      note: Announce rogue device on network
    - type: pcap
      proto: bacnet
      technique: T0848
      style: write_property
      count: 5
      interval: 2s
      note: Issue control commands as rogue controller
    - type: pcap
      proto: bacnet
      technique: T0848
      style: read_property
      count: 5
      interval: 1s
      note: Read process data alongside legitimate controller
  T0848__rogue_master__iec61850:
    title: T0848 – Rogue Master — IEC 61850 rogue GOOSE publisher
    description: Establishes an unauthorised GOOSE publisher on the process bus VLAN. By publishing GOOSE frames with a gocbRef that matches an existing IED's control block but a higher stNum, the attacker's device becomes the effective master for that dataset. All subscribers accept the rogue publisher's commands, bypassing the legitimate protection IED entirely.
    tactic: Initial Access
    technique: T0848
    steps:
    - type: pcap
      proto: iec61850
      technique: T0848
      style: trip_inject
      count: 3
      interval: 0.1s
      note: Establish rogue GOOSE publisher with high stNum
    - type: pcap
      proto: iec61850
      technique: T0848
      style: trip_inject
      count: 5
      interval: 2s
      note: Sustain rogue master presence with keep-alive
  T0848__rogue_master__mqtt:
    title: T0848 – Rogue Master — MQTT rogue command publisher
    description: Publishes command messages on MQTT topics that field devices subscribe to for setpoints and control. Without topic-level ACLs (uncommon in default deployments), any MQTT client can publish to any topic. The rogue publisher sends commands indistinguishable from the legitimate SCADA master, causing field devices to execute attacker-controlled actions.
    tactic: Initial Access
    technique: T0848
    steps:
    - type: pcap
      proto: mqtt
      technique: T0848
      style: auto
      count: 1
      interval: 0s
      note: Connect as rogue SCADA client
    - type: pcap
      proto: mqtt
      technique: T0848
      style: publish_command
      count: 5
      interval: 1s
      note: Publish unauthorized commands to control topics
    - type: pcap
      proto: mqtt
      technique: T0848
      style: publish_setpoint
      count: 5
      interval: 2s
      note: Send rogue setpoints to field devices
  T0848__rogue_master__profinet_dcp:
    title: T0848 – Rogue Master — PROFINET rogue IO controller
    description: Exploits PROFINET's lack of IO controller authentication to present a rogue IO controller. By claiming ownership of IO devices (via DCP Set-Name and Set-IP to redirect them) the attacker's system can establish PROFINET RT connections and control cyclic I/O data. Field devices cannot distinguish a legitimate IO controller from an unauthorised one.
    tactic: Initial Access
    technique: T0848
    steps:
    - type: pcap
      proto: profinet_dcp
      technique: T0848
      style: identify
      count: 1
      interval: 0s
      note: Discover IO devices to target
    - type: pcap
      proto: profinet_dcp
      technique: T0848
      style: set_name
      count: 1
      interval: 1s
      note: Claim IO device for rogue controller
    - type: pcap
      proto: profinet_dcp
      technique: T0848
      style: identify_unicast
      count: 3
      interval: 1s
      note: Verify rogue controller relationship
  T0830__aitm__bacnet:
    title: T0830 – Adversary-in-the-Middle — BACnet property value tamper
    description: AitM on a BACnet/IP network. Attacker intercepts ReadProperty responses and re-injects modified values before they reach the BAS controller. Because BACnet/IP uses UDP, the attacker can forge reply packets from the field device's IP/port. The controller receives tampered sensor readings and makes incorrect control decisions without detecting the interception.
    tactic: Collection
    technique: T0830
    steps:
    - type: pcap
      proto: bacnet
      technique: T0830
      style: write_property
      count: 5
      interval: 0.5s
      note: Pre-stage false values before controller read
    - type: pcap
      proto: bacnet
      technique: T0830
      style: subscribe_cov
      count: 3
      interval: 1s
      note: Subscribe to COV to intercept change notifications
  T0830__aitm__mqtt:
    title: T0830 – Adversary-in-the-Middle — MQTT broker interception
    description: Attacker positions between MQTT publisher (field device) and broker, or between broker and subscriber (SCADA). By subscribing to the field device topics and re-publishing modified values on the same topics, the attacker tampers with sensor data in transit. The SCADA subscriber receives the attacker's values, unaware the broker is passing modified telemetry.
    tactic: Collection
    technique: T0830
    steps:
    - type: pcap
      proto: mqtt
      technique: T0830
      style: auto
      count: 1
      interval: 0s
      note: Connect to intercept position
    - type: pcap
      proto: mqtt
      technique: T0830
      style: subscribe_telemetry
      count: 3
      interval: 0.5s
      note: Subscribe to field device topics
    - type: pcap
      proto: mqtt
      technique: T0830
      style: publish_telemetry
      count: 5
      interval: 0.5s
      note: Re-publish modified telemetry to SCADA
  T0830__aitm__s7comm:
    title: T0830 – Adversary-in-the-Middle — S7comm data block intercept
    description: AitM on the Siemens S7 network. Attacker intercepts S7comm Read DB responses from the PLC and pre-writes modified values to the data block before the WinCC client's read cycle. By writing false values to the communication DB at a rate faster than the SCADA poll interval, the attacker ensures the SCADA receives tampered data on every cycle.
    tactic: Collection
    technique: T0830
    steps:
    - type: pcap
      proto: s7comm
      technique: T0830
      style: write_db
      count: 10
      interval: 0.2s
      note: Write modified values before WinCC read cycle
    - type: pcap
      proto: s7comm
      technique: T0830
      style: read_db
      count: 5
      interval: 0.5s
      note: Verify tampered data is in the communication DB
  T0803__block_command__bacnet:
    title: T0803 – Block Command Message — BACnet device communication control
    description: Sends a BACnet DeviceCommunicationControl request to disable a field device's ability to receive or initiate communications. With communication disabled, the device ignores all subsequent commands from the legitimate controller. The device continues operating at its last commanded state, effectively blocking all future control commands for the disable duration.
    tactic: Inhibit Response Function
    technique: T0803
    steps:
    - type: pcap
      proto: bacnet
      technique: T0803
      style: device_comm_control
      count: 1
      interval: 0s
      note: Disable device communications (block commands)
    - type: pcap
      proto: bacnet
      technique: T0803
      style: who_is
      count: 3
      interval: 5s
      note: Verify device no longer responds to normal traffic
  T0803__block_command__iec104:
    title: T0803 – Block Command Message — IEC-104 command block
    description: Exploits the IEC-104 unauthenticated mode to send a block command (C_SC_NA_1 with qualifier QU=22, block) to the RTU before the legitimate master can issue a real command. The block qualifier prevents command execution, and the RTU holds the blocked state until released. This prevents legitimate SCADA from actuating the targeted output point.
    tactic: Inhibit Response Function
    technique: T0803
    steps:
    - type: pcap
      proto: iec104
      technique: T0803
      style: block_cmd
      count: 5
      interval: 1s
      note: Send block command to prevent legitimate control
    - type: pcap
      proto: iec104
      technique: T0803
      style: block_cmd
      count: 5
      interval: 5s
      note: Re-block on release to sustain denial of control
  T0803__block_command__iec61850:
    title: T0803 – Block Command Message — IEC 61850 GOOSE control block
    description: Injects a GOOSE frame setting the ndsCom (Needs Commissioning) flag to TRUE on the target IED's GOOSE control block. Some IED implementations suspend acting on GOOSE commands when ndsCom is set, pending operator intervention. The attacker uses this standard field to block all subsequent GOOSE command execution on the target relay.
    tactic: Inhibit Response Function
    technique: T0803
    steps:
    - type: pcap
      proto: iec61850
      technique: T0803
      style: protection_block
      count: 10
      interval: 0.05s
      note: GOOSE flood with ndsCom=TRUE to block command execution
    - type: pcap
      proto: iec61850
      technique: T0803
      style: protection_block
      count: 10
      interval: 0.05s
      note: Sustain to prevent command processing
  T0803__block_command__s7comm:
    title: T0803 – Block Command Message — S7comm output disable
    description: Uses S7comm PLC Control to place the CPU in STOP mode, which disables all output modules and prevents any control commands from being executed. While in STOP mode, the PLC ignores all write requests to the output image table, effectively blocking all commands until the CPU is restarted by a human operator with physical access.
    tactic: Inhibit Response Function
    technique: T0803
    steps:
    - type: pcap
      proto: s7comm
      technique: T0803
      style: cpu_stop
      count: 1
      interval: 0s
      note: STOP CPU to block all command execution
    - type: pcap
      proto: s7comm
      technique: T0803
      style: szl_read
      count: 3
      interval: 2s
      note: Read SZL to confirm CPU in STOP state
  T0804__block_reporting__enip:
    title: T0804 – Block Reporting Message — EtherNet/IP I/O connection teardown
    description: Sends CIP Forward-Close to terminate the I/O connections between the ControlLogix PLC and SCADA system. I/O connections carry implicit messaging (produced/consumed tags) that feeds the real-time SCADA display. Closing these connections stops the cyclic data transfer, leaving the SCADA with no updates until the connection is re-established.
    tactic: Inhibit Response Function
    technique: T0804
    steps:
    - type: pcap
      proto: enip
      technique: T0804
      style: unregister_session
      count: 5
      interval: 0.5s
      note: Close EtherNet/IP sessions to stop I/O reporting
    - type: pcap
      proto: enip
      technique: T0804
      style: list_identity
      count: 3
      interval: 2s
      note: Verify SCADA sessions are terminated
  T0804__block_reporting__iec61850:
    title: T0804 – Block Reporting Message — IEC 61850 GOOSE multicast flood
    description: Saturates the IEC 61850 process bus with forged GOOSE frames, overwhelming IED receive buffers. When IED buffers fill, incoming frames are dropped including legitimate GOOSE report messages. SCADA and protection systems stop receiving spontaneous state change notifications, effectively blocking all GOOSE-based reporting for the duration of the flood.
    tactic: Inhibit Response Function
    technique: T0804
    steps:
    - type: pcap
      proto: iec61850
      technique: T0804
      style: protection_block
      count: 50
      interval: 0.005s
      note: Saturate GOOSE bus to block all IED reporting
    - type: pcap
      proto: iec61850
      technique: T0804
      style: protection_block
      count: 50
      interval: 0.005s
      note: Sustain flood through reporting window
  T0869__std_app_protocol__dnp3:
    title: T0869 – Standard Application Layer Protocol — DNP3 C2 channel
    description: Uses DNP3 application layer fragmentation and file transfer (FC 25/28) to embed C2 communications within legitimate-looking DNP3 traffic. DNP3 file operations are used in legitimate firmware updates and event log retrieval, making this channel hard to distinguish from normal operational traffic in environments with DNP3 firewalls.
    tactic: Command and Control
    technique: T0869
    steps:
    - type: pcap
      proto: dnp3
      technique: T0869
      style: file_open
      count: 3
      interval: 1s
      note: Open DNP3 file transfer as C2 channel
    - type: pcap
      proto: dnp3
      technique: T0869
      style: read_class1
      count: 5
      interval: 0.5s
      note: Beacon via Class 1 data read
  T0869__std_app_protocol__iec104:
    title: T0869 – Standard Application Layer Protocol — IEC-104 private data C2
    description: Embeds C2 channel data within IEC-104 Private Information (type ID 200+) APDUs. Private type IDs are passed through IEC-104 gateways without inspection, providing a covert channel indistinguishable from legitimate vendor-specific extensions. The attacker receives C2 beacons disguised as spontaneous IEC-104 private transmissions.
    tactic: Command and Control
    technique: T0869
    steps:
    - type: pcap
      proto: iec104
      technique: T0869
      style: meas_inject
      count: 5
      interval: 1s
      note: Embed C2 in private IEC-104 measurement APDUs
    - type: pcap
      proto: iec104
      technique: T0869
      style: clock_inject
      count: 3
      interval: 5s
      note: Use clock sync for C2 timing signals
  T0869__std_app_protocol__iec61850:
    title: T0869 – Standard Application Layer Protocol — IEC 61850 GOOSE C2 beacon
    description: Uses IEC 61850 GOOSE frames (EtherType 0x88B8) as a C2 channel on the process bus. GOOSE multicast is forwarded by all process bus switches as a standard allowed protocol. An attacker encodes commands and exfiltrates data via the allData BER-encoded payload fields, appearing as legitimate protection relay traffic to network monitoring tools.
    tactic: Command and Control
    technique: T0869
    steps:
    - type: pcap
      proto: iec61850
      technique: T0869
      style: enumerate_ied
      count: 5
      interval: 1s
      note: GOOSE on 0x88B8 EtherType blending with protection traffic
    - type: pcap
      proto: iec61850
      technique: T0869
      style: relay_inject
      count: 3
      interval: 2s
      note: Encode C2 data in GOOSE allData fields using allowed EtherType
  T0869__std_app_protocol__s7comm:
    title: T0869 – Standard Application Layer Protocol — S7comm DB covert channel
    description: Uses S7comm data block read/write cycles as a covert C2 channel. The attacker writes C2 commands to a designated 'dead-drop' DB that the implanted malware polls at regular intervals. The malware writes C2 responses to a different DB offset. Traffic is indistinguishable from normal SCADA-PLC communication cycles.
    tactic: Command and Control
    technique: T0869
    steps:
    - type: pcap
      proto: s7comm
      technique: T0869
      style: read_db
      count: 5
      interval: 2s
      note: Poll C2 dead-drop DB for commands
    - type: pcap
      proto: s7comm
      technique: T0869
      style: write_db
      count: 3
      interval: 2s
      note: Write C2 response to exfil DB
  T0814__denial_of_view__bacnet:
    title: T0814 – Denial of View — BACnet COV notification flood
    description: Floods the SCADA with forged BACnet Confirmed COV Notifications for multiple objects. The SCADA's BACnet client must process and acknowledge each notification; at high rate, the client cannot keep up and its receive queue fills. Legitimate COV notifications from real field devices are then dropped, producing a frozen operator display.
    tactic: Inhibit Response Function
    technique: T0814
    steps:
    - type: pcap
      proto: bacnet
      technique: T0814
      style: subscribe_cov
      count: 20
      interval: 0.1s
      note: COV notification flood to block SCADA data updates
    - type: pcap
      proto: bacnet
      technique: T0814
      style: who_is
      count: 10
      interval: 0.5s
      note: Supplement with Who-Is broadcast flood
  T0814__denial_of_view__enip:
    title: T0814 – Denial of View — EtherNet/IP produced tag suppression
    description: Closes the EtherNet/IP implicit (Class 1) I/O connections that carry produced tags from the PLC to the SCADA historian and HMI. By sending Forward-Close for all active I/O connections, the attacker stops the cyclic data stream that populates the operator display. The SCADA shows the last received values while the physical process changes unobserved.
    tactic: Inhibit Response Function
    technique: T0814
    steps:
    - type: pcap
      proto: enip
      technique: T0814
      style: unregister_session
      count: 10
      interval: 0.5s
      note: Terminate EtherNet/IP sessions to stop produced tags
  T0883__internet_accessible__bacnet:
    title: T0883 – Internet Accessible Device — BACnet internet exposure probe
    description: Sends BACnet Who-Is to port 47808/UDP on Internet-facing IP ranges. Exposed BACnet devices respond with IAm, revealing their presence on the Internet. Shodan and IPIP.net show thousands of exposed BACnet devices globally. This scenario simulates the initial probe an attacker uses to discover Internet-accessible BAS controllers.
    tactic: Initial Access
    technique: T0883
    steps:
    - type: pcap
      proto: bacnet
      technique: T0883
      style: who_is
      count: 5
      interval: 0.2s
      note: Internet-exposed BACnet device discovery probe
    - type: pcap
      proto: bacnet
      technique: T0883
      style: read_property
      count: 3
      interval: 0.5s
      note: Read properties from discovered exposed device
  T0883__internet_accessible__iec104:
    title: T0883 – Internet Accessible Device — IEC-104 TCP 2404 internet probe
    description: Connects to port TCP 2404 on Internet-facing addresses and sends STARTDT. IEC-104 RTUs that accept the connection without authentication are Internet-accessible. The attacker can then issue General Interrogation and control commands directly over the Internet without VPN or firewall. Thousands of IEC-104 devices are directly exposed on the public Internet.
    tactic: Initial Access
    technique: T0883
    steps:
    - type: pcap
      proto: iec104
      technique: T0883
      style: available
      count: 3
      interval: 1s
      note: Connect to exposed IEC-104 port (TCP 2404)
    - type: pcap
      proto: iec104
      technique: T0883
      style: interrogation
      count: 1
      interval: 2s
      note: General interrogation on exposed RTU
  T0883__internet_accessible__s7comm:
    title: T0883 – Internet Accessible Device — S7comm TCP 102 internet probe
    description: Connects to TCP port 102 (S7/TPKT) on Internet-facing addresses. Siemens S7 PLCs that accept S7comm connections from the Internet without firewall protection can be fully controlled by any attacker. Shodan indexes thousands of exposed S7 devices. This scenario demonstrates the initial connection and SZL read an attacker performs on a discovered exposed PLC.
    tactic: Initial Access
    technique: T0883
    steps:
    - type: pcap
      proto: s7comm
      technique: T0883
      style: szl_read
      count: 1
      interval: 0s
      note: Connect to Internet-exposed S7 PLC
    - type: pcap
      proto: s7comm
      technique: T0883
      style: szl_read
      count: 3
      interval: 0.5s
      note: Read SZL to confirm access and enumerate PLC
    - type: pcap
      proto: s7comm
      technique: T0883
      style: read_all_dbs
      count: 3
      interval: 1s
      note: Read all DBs to exfiltrate configuration
  T0868__detect_op_info__bacnet:
    title: T0868 – Detect Operating Mode — BACnet device mode read
    description: 'Reads the System-Status and Mode properties from BACnet Device objects to determine operational state: Normal, Operational-Read-Only, Download-Required, Download-In-Progress, Non-Operational. This intelligence is used to determine the optimal timing for attack: targeting devices in Download-Required state for firmware injection or devices in Normal state for command injection.'
    tactic: Collection
    technique: T0868
    steps:
    - type: pcap
      proto: bacnet
      technique: T0868
      style: read_property
      count: 5
      interval: 0.5s
      note: Read System-Status from all BACnet devices
    - type: pcap
      proto: bacnet
      technique: T0868
      style: read_property_multi
      count: 3
      interval: 0.5s
      note: Read operational mode indicators
  T0868__detect_op_info__iec61850:
    title: T0868 – Detect Operating Mode — IEC 61850 GOOSE state monitoring
    description: 'Monitors GOOSE multicast traffic to detect IED operating modes. GOOSE frames from protection IEDs carry stNum, sqNum, and test flag that reveal the IED''s operational state: commissioning mode (test=TRUE), active protection (stNum incrementing), or idle state. The attacker uses this to time attack injection during maintenance windows when test mode is active.'
    tactic: Collection
    technique: T0868
    steps:
    - type: pcap
      proto: iec61850
      technique: T0868
      style: enumerate_ied
      count: 5
      interval: 0.5s
      note: Monitor GOOSE to detect IED operating modes
  T0868__detect_op_info__mqtt:
    title: T0868 – Detect Operating Mode — MQTT status topic monitoring
    description: Subscribes to MQTT status and mode topics published by field devices. ICS MQTT devices commonly publish their operating mode (RUN/STOP/FAULT/ MAINTENANCE) as retained messages on status topics. This reveals which devices are in maintenance mode (safer to attack without immediate detection) and which are in active control mode.
    tactic: Collection
    technique: T0868
    steps:
    - type: pcap
      proto: mqtt
      technique: T0868
      style: auto
      count: 1
      interval: 0s
      note: Connect to broker
    - type: pcap
      proto: mqtt
      technique: T0868
      style: subscribe_telemetry
      count: 5
      interval: 0.5s
      note: Subscribe to status topics for mode detection
  T0829__loss_of_view__modbus_flood:
    title: T0829 – Loss of View — Modbus read flood blocks SCADA polling
    description: Floods the Modbus slave with rapid read requests at a rate exceeding the device's processing capacity. The legitimate SCADA master's read cycles are queued behind the attacker's flood; responses are delayed beyond the SCADA poll timeout. Operator displays show stale values or 'communications lost' for the targeted device.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: modbus
      technique: T0829
      style: read_holding
      count: 50
      interval: 0.01s
      note: High-rate read flood saturating Modbus slave
    - type: pcap
      proto: modbus
      technique: T0829
      style: read_input
      count: 50
      interval: 0.01s
      note: Sustain flood across all register types
  T0829__loss_of_view__dnp3_disable_unsolicited:
    title: T0829 – Loss of View — DNP3 disable unsolicited reporting
    description: Sends a DNP3 Disable Unsolicited Reporting command (FC 22) to an outstation. Unsolicited responses are how RTUs proactively push change-of-value events to the SCADA master. With them disabled, the SCADA receives no spontaneous updates — the operator view freezes at the last polled values while the physical process continues to change.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: dnp3
      technique: T0829
      style: disable_unsolicited
      count: 3
      interval: 1s
      note: Disable unsolicited reporting (FC22)
  T0829__loss_of_view__iec104_stopdt:
    title: T0829 – Loss of View — IEC-104 STOPDT halts data transfer
    description: Sends an IEC-104 STOPDT ACT frame which commands the RTU to stop sending spontaneous measurement and event APDUs. The RTU acknowledges with STOPDT CON and ceases all unsolicited transmissions. The SCADA master receives no further process data until a new STARTDT sequence is completed, producing a complete loss of view for the substation.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: iec104
      technique: T0829
      style: stopdt
      count: 3
      interval: 2s
      note: 'STOPDT: halt RTU data transfer to SCADA'
  T0829__loss_of_view__opcua_delete_subscriptions:
    title: T0829 – Loss of View — OPC UA subscription deletion
    description: Deletes active OPC UA subscriptions that feed the SCADA historian and operator display. Without subscriptions, no monitored item changes reach the SCADA client — the display freezes. By also closing the legitimate session, the attacker prevents automatic re-subscription until an operator manually reconnects the client.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: opcua
      technique: T0829
      style: delete_sub
      count: 10
      interval: 0.5s
      note: Delete active SCADA monitoring subscriptions
    - type: pcap
      proto: opcua
      technique: T0829
      style: close_session
      count: 5
      interval: 1s
      note: Close sessions to prevent auto-reconnect
  T0829__loss_of_view__s7comm_read_flood:
    title: T0829 – Loss of View — S7comm diagnostic flood blocks WinCC
    description: Saturates the S7 communication CPU with rapid SZL-Read requests for large diagnostic blocks. The S7 communication layer serialises all requests; WinCC data-read cycles are delayed indefinitely behind the attacker's diagnostic flood. The SCADA display shows stale values; WinCC raises 'connection timeout' alarms masking the real cause.
    tactic: Impact
    technique: T0829
    steps:
    - type: pcap
      proto: s7comm
      technique: T0829
      style: szl_read
      count: 30
      interval: 0.02s
      note: SZL diagnostic flood blocking WinCC read cycles
    - type: pcap
      proto: s7comm
      technique: T0829
      style: read_all_dbs
      count: 10
      interval: 0.05s
      note: DB read saturation to compound the blockage
  T0827__loss_of_control__bacnet:
    title: T0827 – Loss of Control — BACnet DeviceCommunicationControl disable
    description: Sends a BACnet DeviceCommunicationControl request with 'disable-initiation' to prevent a field controller from accepting further commands. The controller continues executing its last programme but ignores all incoming WriteProperty and commandable object requests. The BAS operator loses the ability to adjust setpoints or issue commands for the disable duration.
    tactic: Impact
    technique: T0827
    steps:
    - type: pcap
      proto: bacnet
      technique: T0827
      style: device_comm_control
      count: 1
      interval: 0s
