      technique: T0856
      style: write_multiple_registers
      count: 3
      interval: 0.5s
      note: Modbus multi-register value spoof
  T0856__spoof_reporting__s7comm_db:
    title: T0856 – Spoof Reporting Message — S7comm data block status spoofing
    description: Overwrites S7 data block cells used by the SCADA polling cycle with falsified process values before the poll occurs. The SCADA system reads the manipulated DB instead of the real process image, reporting false equipment status.
    tactic: Impair Process Control
    technique: T0856
    steps:
    - type: pcap
      proto: s7comm
      technique: T0856
      style: write_db
      count: 4
      interval: 0.5s
      note: S7comm DB write-before-poll spoof
    - type: pcap
      proto: s7comm
      technique: T0856
      style: read_db
      count: 2
      interval: 0.3s
      note: S7comm verify spoof in place
  T0856__spoof_reporting__enip_write_tag:
    title: T0856 – Spoof Reporting Message — EtherNet/IP tag value spoofing
    description: Writes false values to Logix controller input tags and status structures. When the HMI or SCADA reads these tags on the next poll cycle, it receives the injected values, presenting a false process picture.
    tactic: Impair Process Control
    technique: T0856
    steps:
