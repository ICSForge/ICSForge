    - type: pcap
      proto: enip
      technique: T0861
      style: read_tag
      count: 10
      interval: 0.3s
      note: Enumerate tag database entries
  T0861__point_tag_id__iec104_interrogation:
    title: T0861 – Point & Tag Identification — IEC-104 general interrogation
    description: 'Sends IEC-104 General Interrogation (C_IC_NA_1) which forces the RTU to transmit the current value of every configured information object: single-point status, double-point status, measured values, and counters. The response is a complete point-list dump — every IEC-104 information object address and its current value in a single sweep.'
    tactic: Collection
