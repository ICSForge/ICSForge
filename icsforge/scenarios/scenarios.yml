      proto: iec104
      technique: T0806
      style: setpoint_float
      count: 10
      interval: 0.05s
      note: Rapid setpoint sweep through full engineering range
  T0806__brute_force_io__iec61850:
    title: T0806 – Brute Force I/O — IEC 61850 GOOSE rapid trip/close cycling
    description: Sends alternating GOOSE trip (stNum++) and reset frames at high rate to IEDs configured to act on GOOSE-based interlocking. Circuit breakers and isolators receive alternating trip and close commands from the GOOSE source — each accepted as a genuine state change based on stNum ordering. Rapid mechanical cycling of high-voltage switchgear causes significant damage.
