  T0839__module_firmware__dnp3:
    title: T0839 – Module Firmware — DNP3 firmware file transfer
    description: Uses DNP3 file transfer services to upload a modified firmware or configuration file to a field RTU. Several major RTU vendors (SEL, GE Grid Solutions, Schneider) support firmware download via DNP3 file transfer as an alternative to serial BOOTP. The attacker uploads a modified firmware binary, which activates on the next device restart.
    tactic: Impair Process Control
    technique: T0839
    steps:
    - type: pcap
