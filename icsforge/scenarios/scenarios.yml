      technique: T0888
      style: report_block
      count: 5
      interval: 0.3s
      note: Modbus FC43 Device ID systematic sweep
  T0888__remote_sys_info__iec104_capability:
    title: T0888 – Remote System Information Discovery — IEC-104 RTU capability probe
    description: Uses IEC 60870-5-104 STARTDT and Test Frame to verify RTU connectivity, then reads data object ranges via General Interrogation to enumerate all supported information objects and their current values.
    tactic: Discovery
    technique: T0888
    steps:
