# ICSForge Receiver configuration

# TCP listeners — one per ICS protocol
listen:
  modbus:  502
  s7comm:  102
  dnp3:    20000
  iec104:  2404
  opcua:   4840
  enip:    44818
  mqtt:    1883

# UDP listeners — protocols using datagram transport
udp_listen:
  bacnet:  47808

# Layer-2 listeners (Linux AF_PACKET, requires root/CAP_NET_RAW)
# Set the interface name for the NIC connected to the OT network segment.
# Leave blank or comment out to disable (PROFINET traffic will not be captured).
# Can also be overridden at runtime: icsforge-receiver --l2-iface eth0
l2_listen:
  profinet_dcp: ""    # e.g. "eth0" or "ens3"

log:
  receipts: ./receiver_out/receipts.jsonl

# Sender callback — when set, receiver HTTP POSTs each receipt to sender for live UI updates.
# Set via config or CLI: --callback-url http://sender-ip:8080/api/receiver/callback
# The sender's /api/config/receiver_ip endpoint can push this URL to the receiver at runtime.
callback:
  url: ""          # e.g. "http://10.0.0.10:8080/api/receiver/callback"
  timeout: 2       # seconds

safety:
  max_payload: 8192
